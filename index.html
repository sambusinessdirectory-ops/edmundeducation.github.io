<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>Edmund 英文學習平台</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    @font-face {
      font-family: "Noto Serif TC Local";
      src: url("fonts/NotoSerifTC-VariableFont_wght.ttf") format("truetype");
      font-weight: 200 900;
      font-style: normal;
      font-display: swap;
    }

    * { box-sizing: border-box; }

    :root {
      --video-opacity: 0.38;
      --video-cover: rgba(245,245,247,0.50);
    }

    html {
      scroll-behavior: smooth;
    }

    html, body, a, button { cursor: none; }

    body {
      margin: 0;
      min-height: 100vh;
      background: #f5f5f7;
      color: #1d1d1f;
      overflow-x: hidden;
      font-family: "Noto Serif TC Local", "Noto Serif TC", "Source Han Serif TC", "Songti TC", "PMingLiU", serif;
      font-weight: 600;
    }

    .custom-cursor {
      position: fixed;
      top: 0;
      left: 0;
      width: 42px;
      height: 42px;
      z-index: 9999;
      pointer-events: none;
      opacity: 0;
      transform: translate(-50%, -50%);
      transition: opacity 0.18s ease;
    }

    .video-background {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
      pointer-events: none;
      background:
        linear-gradient(rgba(245,245,247,0.18), rgba(245,245,247,0.18)),
        url("Static Images/Homepage Video Poster.jpg") center / cover no-repeat,
        #f5f5f7;
    }

    .bg-video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0;
      filter: saturate(1.15) contrast(1.05);
      transition: opacity 1.2s ease;
    }

    .bg-video.is-active { opacity: var(--video-opacity); }

    html.video-enabled .video-background {
      background: #f5f5f7;
    }

    html.video-light-mode .bg-video {
      display: none;
    }

    .video-background::after {
      content: "";
      position: absolute;
      inset: 0;
      background: var(--video-cover);
      transition: background 1.2s ease;
    }

    .topbar,
    main {
      position: relative;
      z-index: 1;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      width: 100%;
      height: 10vh;
      min-height: 82px;
      max-height: 116px;
      background: #F7E7CE;
      border-bottom: 1px solid rgba(0,0,0,0.06);
      backdrop-filter: blur(18px);
      transition: background 0.35s ease, border-color 0.35s ease, backdrop-filter 0.35s ease;
    }

    .topbar-inner {
      position: relative;
      width: 100%;
      height: 100%;
      padding: 0 clamp(28px, 5vw, 132px);
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 24px;
    }

    .brand {
      position: absolute;
      top: 50%;
      display: block;
      text-decoration: none;
      transform: translateY(-50%);
      transition: opacity 0.42s ease, transform 0.42s ease, filter 0.42s ease;
    }

    .brand img {
      display: block;
      height: clamp(76px, 9.4vh, 112px);
      width: auto;
      max-width: min(760px, 44vw);
      object-fit: contain;
    }

    .brand-left {
      left: clamp(28px, 5vw, 132px);
      opacity: 1;
    }

    .header-title-image {
      position: absolute;
      top: 0;
      right: 0;
      z-index: 3;
      height: 100%;
      width: auto;
      max-width: none;
      object-fit: contain;
      object-position: right top;
      filter: drop-shadow(0 12px 22px rgba(0,0,0,0.12));
      pointer-events: none;
    }

    .topnav {
      position: relative;
      z-index: 2;
      display: none;
      gap: 26px;
      overflow-x: auto;
      scrollbar-width: none;
      transition: opacity 0.28s ease;
    }

    .topnav::-webkit-scrollbar { display: none; }

    .topnav a {
      color: #1d1d1f;
      text-decoration: none;
      font-size: 13px;
      font-weight: 800;
      white-space: nowrap;
    }

    .topnav a:hover { color: #0071e3; }

    .store {
      position: relative;
      width: 100%;
      padding: 62px 0 42px var(--category-page-pad);
      min-height: 980px;
      --category-page-pad: clamp(28px, 5vw, 132px);
      --category-card-width: clamp(290px, 15.5vw, 340px);
      --category-focus-card-width: clamp(348px, 18.6vw, 408px);
      --category-card-height: clamp(176px, 9.2vw, 212px);
      --category-focus-card-height: clamp(211px, 11.04vw, 254px);
      --category-gap: clamp(16px, 1.6vw, 28px);
      --category-logo-width: min(450px, 34vw);
      --category-logo-gap: clamp(56px, 6vw, 118px);
    }

    .hero-row {
      padding-right: var(--category-page-pad);
      max-width: calc(100% - var(--category-logo-width) - clamp(34px, 5vw, 88px));
      display: flex;
      align-items: flex-start;
      gap: clamp(24px, 3vw, 52px);
      flex-wrap: wrap;
    }

    h1 {
      margin: 0;
      max-width: 980px;
      font-size: clamp(46px, 6vw, 76px);
      line-height: 1.04;
      font-weight: 900;
      letter-spacing: 0;
      background: linear-gradient(95deg, #55c7ff 0%, #0071e3 42%, #062b84 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .company-logo {
      position: absolute;
      top: 62px;
      right: var(--category-page-pad);
      width: var(--category-logo-width);
      aspect-ratio: 1 / 1;
      object-fit: contain;
      border-radius: 28px;
      background: #fff;
      box-shadow: 0 12px 34px rgba(0,0,0,0.08);
      transition: transform 0.28s ease, box-shadow 0.28s ease;
    }

    .company-logo:hover {
      transform: scale(1.05);
      box-shadow: 0 18px 50px rgba(0,113,227,0.20);
    }

    .social-links {
      position: relative;
      z-index: 3;
      display: flex;
      align-items: center;
      gap: clamp(22px, 2.8vw, 52px);
      padding-top: 0.2em;
    }

    .social-link {
      width: auto;
      height: auto;
      display: grid;
      place-items: center;
      border-radius: 0;
      background: transparent;
      border: 0;
      box-shadow: none;
      transition: transform 0.22s ease, filter 0.22s ease;
    }

    .social-link:hover {
      transform: translateY(-5px) scale(1.04);
      filter: drop-shadow(0 16px 22px rgba(0,113,227,0.18));
    }

    .social-link img {
      max-width: 78px;
      max-height: 78px;
      display: block;
      object-fit: contain;
    }

    .social-link.carousell {
      width: auto;
      border-radius: 0;
    }

    .social-link.carousell img {
      max-width: 150px;
      max-height: 54px;
    }

    .category-strip {
      counter-reset: category-card;
      display: flex;
      flex-wrap: wrap;
      align-items: stretch;
      gap: var(--category-gap);
      margin-top: 78px;
      padding: 0 0 24px;
      overflow: visible;
      scrollbar-width: none;
      width: calc(100vw - (var(--category-page-pad) * 2) - var(--category-logo-width) - var(--category-logo-gap));
      max-width: 100%;
    }

    .category-strip::-webkit-scrollbar { display: none; }

    .category-row-break {
      flex: 0 0 100%;
      width: 100%;
      height: 0;
      overflow: hidden;
      pointer-events: none;
    }

    .category {
      counter-increment: category-card;
      position: relative;
      flex: 0 0 var(--category-card-width);
      width: var(--category-card-width);
      min-height: var(--category-card-height);
      height: auto;
      min-width: 0;
      padding: clamp(8px, 0.8vw, 12px);
      text-align: left;
      text-decoration: none;
      color: #fff;
      border-radius: 24px;
      background: var(--category-gradient, linear-gradient(135deg, #4366d8 0%, #74b8ef 56%, #e39ad2 100%));
      box-shadow: 0 22px 52px rgba(61,91,188,0.20);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      transition:
        background 0.32s ease,
        transform 0.32s ease,
        box-shadow 0.32s ease;
    }

    .category::before {
      content: counter(category-card, decimal-leading-zero);
      position: absolute;
      top: clamp(12px, 1.1vw, 18px);
      right: clamp(14px, 1.25vw, 20px);
      z-index: 2;
      color: rgba(52,60,76,0.30);
      font-size: clamp(26px, 2.9vw, 44px);
      line-height: 1;
      font-weight: 900;
      pointer-events: none;
    }

    .category:nth-child(-n + 3) {
      flex-basis: var(--category-focus-card-width);
      width: var(--category-focus-card-width);
      min-height: var(--category-focus-card-height);
    }

    .category::after {
      content: "";
      position: absolute;
      right: clamp(18px, 1.7vw, 28px);
      bottom: clamp(18px, 1.7vw, 28px);
      width: clamp(42px, 3.8vw, 62px);
      height: clamp(42px, 3.8vw, 62px);
      border: 1px solid rgba(255,255,255,0.34);
      border-radius: 50%;
      opacity: 0.7;
      display: none;
      transition: transform 0.32s ease, opacity 0.32s ease;
    }

    .category:hover,
    .category:focus-visible {
      background: var(--category-gradient-hover, linear-gradient(135deg, #365ad0 0%, #68afeb 56%, #d98fca 100%));
      transform: translateY(-6px);
      box-shadow: 0 30px 74px rgba(61,91,188,0.30);
      outline: 0;
    }

    .category:hover::after,
    .category:focus-visible::after {
      opacity: 1;
      transform: scale(1.08);
    }

    .category-visual {
      display: none;
    }

    .category-mark {
      width: auto;
      height: auto;
      display: inline-block;
      border-radius: 0;
      color: white;
      font-size: clamp(12px, 1vw, 15px);
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      background: transparent !important;
      opacity: 0.78;
    }

    .live {
      --category-gradient: linear-gradient(135deg, #0f7b5f 0%, #2fbf71 54%, #b6e27b 100%);
      --category-gradient-hover: linear-gradient(135deg, #0b6a52 0%, #26ad66 54%, #a7d96f 100%);
    }

    .video {
      --category-gradient: linear-gradient(135deg, #12623f 0%, #35b779 54%, #71d6b2 100%);
      --category-gradient-hover: linear-gradient(135deg, #0e5536 0%, #2ea76d 54%, #63cda7 100%);
    }

    .notes {
      --category-gradient: linear-gradient(135deg, #235f4b 0%, #61b86b 52%, #d0c36a 100%);
      --category-gradient-hover: linear-gradient(135deg, #1b503e 0%, #55aa61 52%, #c5b75d 100%);
    }

    .resources-card {
      --category-gradient: linear-gradient(135deg, #5f102a 0%, #9e173f 48%, #ef4444 100%);
      --category-gradient-hover: linear-gradient(135deg, #4f0d23 0%, #8c1337 48%, #df3438 100%);
    }

    .forum-card {
      --category-gradient: linear-gradient(135deg, #f0d099 0%, #d8bb75 44%, #8aae6f 100%);
      --category-gradient-hover: linear-gradient(135deg, #e7c286 0%, #ccb065 44%, #7fa263 100%);
    }

    .vs-card {
      --category-gradient: linear-gradient(135deg, #674420 0%, #a87935 48%, #f0bf5f 100%);
      --category-gradient-hover: linear-gradient(135deg, #563719 0%, #95682d 48%, #e2ad4f 100%);
    }

    .about-card {
      --category-gradient: linear-gradient(135deg, #ffb347 0%, #f7c35f 48%, #f59e0b 100%);
      --category-gradient-hover: linear-gradient(135deg, #f7a732 0%, #efb84c 48%, #e89105 100%);
    }

    .about-card .category-badge {
      position: absolute;
      top: clamp(10px, 0.85vw, 15px);
      left: clamp(12px, 1vw, 18px);
      z-index: 4;
      width: clamp(42px, 2.9vw, 56px);
      height: clamp(42px, 2.9vw, 56px);
      display: block;
      filter: drop-shadow(0 10px 16px rgba(82,50,8,0.18));
    }

    .about-card .category-badge img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    .review-card::after {
      content: "❤️";
      position: absolute;
      top: clamp(11px, 0.95vw, 16px);
      left: clamp(12px, 1vw, 18px);
      z-index: 4;
      width: clamp(34px, 2.7vw, 46px);
      height: clamp(34px, 2.7vw, 46px);
      border: 0;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: rgba(255,255,255,0.30);
      box-shadow: 0 14px 30px rgba(109,74,122,0.18);
      font-size: clamp(18px, 1.35vw, 24px);
      line-height: 1;
      opacity: 1;
      transition: transform 0.32s ease, background 0.32s ease;
    }

    .review-card:hover::after,
    .review-card:focus-visible::after {
      transform: scale(1.08);
      background: rgba(255,255,255,0.42);
    }

    .category-name {
      display: block;
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: none;
      min-height: clamp(126px, 7vw, 166px);
      margin-top: clamp(50px, 4.1vw, 70px);
      padding: clamp(17px, 1.25vw, 23px);
      color: #1d1d1f;
      border-radius: 18px;
      background: rgba(255,255,255,0.96);
      box-shadow: 0 14px 34px rgba(32,54,112,0.10);
      font-size: clamp(26px, 1.48vw, 32px);
      line-height: 1.08;
      font-weight: 900;
      letter-spacing: 0;
      text-shadow: none;
      opacity: 1;
      transform: none;
      transition: opacity 0.28s ease 0.06s, transform 0.28s ease 0.06s;
    }

    .category:hover .category-name,
    .category:focus-visible .category-name {
      opacity: 1;
      transform: translateY(0);
    }

    .offerings {
      width: 100%;
      padding: 28px 0 80px clamp(28px, 5vw, 132px);
    }

    .offer-section + .offer-section { margin-top: 72px; }

    .offer-section {
      scroll-margin-top: 132px;
    }

    .section-title {
      margin: 0 0 22px;
      padding-right: clamp(28px, 5vw, 132px);
      font-size: clamp(36px, 3.6vw, 50px);
      line-height: 1.15;
      font-weight: 900;
      color: #1d1d1f;
    }

    .section-title span { color: #0071e3; }

    .offer-row-shell {
      position: relative;
      width: 100%;
    }

    .offer-row {
      display: flex;
      gap: 18px;
      overflow-x: auto;
      scroll-behavior: smooth;
      scroll-snap-type: x proximity;
      padding: 4px 0 18px;
      scrollbar-width: none;
    }

    .offer-row::-webkit-scrollbar { display: none; }

    .offer-card {
      flex: 0 0 410px;
      position: relative;
      min-height: 565px;
      padding: 28px;
      border-radius: 18px;
      overflow: hidden;
      background:
        radial-gradient(140% 100% at 12% 0%, rgba(129, 92, 255, 0.28), transparent 52%),
        radial-gradient(120% 100% at 88% 16%, rgba(255, 171, 145, 0.34), transparent 56%),
        radial-gradient(110% 95% at 46% 94%, rgba(255, 236, 205, 0.48), transparent 58%),
        linear-gradient(135deg, rgba(255,255,255,0.94), rgba(250,244,255,0.91) 46%, rgba(255,247,239,0.93));
      color: #1d1d1f;
      text-decoration: none;
      scroll-snap-align: start;
      border: 1px solid rgba(255,255,255,0.74);
      box-shadow: 0 12px 34px rgba(97,78,136,0.13);
      display: flex;
      flex-direction: column;
      transition: transform 0.22s ease, box-shadow 0.22s ease;
    }

    .offer-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 18px 46px rgba(111,82,166,0.22);
    }

    .offer-card.is-gold-chrome {
      background:
        linear-gradient(180deg,
          #6b5b00 0%,
          #b59200 13%,
          #ffe875 24%,
          #fff8c8 28%,
          #c7a300 34%,
          #49430d 52%,
          #806b00 64%,
          #f0c600 78%,
          #fff0a1 87%,
          #6c5d08 100%);
      color: #fff7cc;
      border-color: rgba(255,246,180,0.72);
      box-shadow: 0 18px 48px rgba(128,96,0,0.30), inset 0 1px 0 rgba(255,255,255,0.52);
      text-shadow: 0 2px 12px rgba(0,0,0,0.35);
    }

    .offer-card.is-gold-chrome:hover {
      box-shadow: 0 24px 62px rgba(154,118,0,0.38), inset 0 1px 0 rgba(255,255,255,0.62);
    }

    .offer-card.is-gold-chrome .offer-new,
    .offer-card.is-gold-chrome .offer-desc,
    .offer-card.is-gold-chrome .offer-price {
      color: #fff8cf;
    }

    .offer-new {
      color: #bf4800;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .offer-title {
      margin: 0;
      font-size: 23px;
      line-height: 1.12;
      font-weight: 900;
      display: -webkit-box;
      -webkit-line-clamp: 4;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .offer-desc {
      margin: 12px 0 0;
      font-size: 15px;
      line-height: 1.25;
      font-weight: 700;
      color: #3f3f46;
    }

    .offer-price {
      margin: 12px 0 0;
      font-size: 15px;
      color: #1d1d1f;
      font-weight: 700;
    }

    .offer-art {
      margin-top: auto;
      min-height: 230px;
      border-radius: 16px;
      display: grid;
      place-items: center;
      background:
        radial-gradient(120% 100% at 0% 0%, rgba(127,86,255,0.32), transparent 54%),
        radial-gradient(120% 100% at 100% 10%, rgba(255,178,135,0.38), transparent 56%),
        linear-gradient(145deg, #f6edff, #ffe7d6);
      color: #0756d8;
      font-size: 34px;
      font-weight: 900;
      overflow: hidden;
    }

    .offer-card.is-gold-chrome .offer-art {
      background:
        linear-gradient(180deg, #493f00 0%, #ffe24f 26%, #fff8bd 32%, #594d00 54%, #e9be00 82%, #655600 100%);
      color: #fff7c4;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.48), inset 0 -28px 50px rgba(0,0,0,0.22);
    }

    .offer-art.has-image { background: #fff; }

    .offer-art.has-image img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      background: #fff;
    }

    .carousel-button {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 52px;
      height: 52px;
      border: 0;
      border-radius: 50%;
      background: rgba(210,210,215,0.9);
      color: #5f6368;
      font-size: 42px;
      line-height: 1;
      cursor: none;
      z-index: 5;
    }

    .carousel-button:hover { background: rgba(185,185,190,0.95); }

    .carousel-button.prev { left: -18px; }
    .carousel-button.next { right: 24px; }
    .carousel-button[hidden] { display: none; }

    .student-comments {
      position: relative;
      width: 100%;
      padding: 48px clamp(22px, 5vw, 132px) 120px;
      overflow: hidden;
      scroll-margin-top: 126px;
    }

    .student-comments-heading {
      max-width: 960px;
      margin: 0 0 72px;
    }

    .student-comments-heading h2 {
      margin: 0;
      font-size: clamp(36px, 5vw, 70px);
      line-height: 1.02;
      font-weight: 900;
      letter-spacing: 0;
      color: #1d1d1f;
    }

    .student-comments-heading p {
      margin: 18px 0 0;
      font-size: clamp(18px, 2vw, 26px);
      line-height: 1.24;
      font-weight: 800;
      color: #0071e3;
    }

    .student-comments-list {
      display: grid;
      gap: clamp(48px, 7vw, 92px);
      overflow: hidden;
      padding: 6px 0 24px;
    }

    .student-comment-row {
      display: flex;
      width: 100%;
    }

    .student-comment-row.from-left { justify-content: flex-start; }
    .student-comment-row.from-right { justify-content: flex-end; }

    .student-comment-card {
      width: min(820px, calc(100vw - 44px));
      border-radius: 38px;
      padding: 8px;
      background:
        radial-gradient(130% 90% at 12% 2%, rgba(58, 88, 199, 0.96), transparent 58%),
        radial-gradient(120% 100% at 46% 6%, rgba(118, 201, 246, 0.96), transparent 58%),
        radial-gradient(120% 105% at 76% 8%, rgba(244, 180, 222, 0.95), transparent 62%),
        radial-gradient(115% 115% at 100% 0%, rgba(205, 74, 145, 0.98), transparent 64%),
        linear-gradient(115deg, #4257c5 0%, #82d0f5 38%, #f2b4dd 70%, #cc4f99 100%);
      box-shadow: 0 28px 68px rgba(59, 77, 162, 0.24);
      opacity: 0;
      will-change: transform, opacity;
      transition: transform 0.9s cubic-bezier(0.2, 0.8, 0.2, 1), opacity 0.65s ease;
    }

    .student-comment-row.from-left .student-comment-card {
      transform: translateX(calc(-100vw - 120px));
    }

    .student-comment-row.from-right .student-comment-card {
      transform: translateX(calc(100vw + 120px));
    }

    .student-comment-row .student-comment-card.is-visible {
      opacity: 1;
      transform: translateX(0);
    }

    .student-comment-header {
      min-height: 82px;
      padding: 18px 22px 18px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      color: white;
    }

    .student-comment-label {
      display: inline-flex;
      align-items: center;
      gap: 14px;
      min-width: 0;
      font-size: clamp(18px, 2vw, 27px);
      line-height: 1.1;
      font-weight: 900;
      letter-spacing: 0.01em;
      text-transform: none;
      text-shadow: 0 2px 12px rgba(17, 28, 92, 0.24);
    }

    .student-comment-spark {
      width: 26px;
      height: 26px;
      flex: 0 0 auto;
      display: inline-grid;
      place-items: center;
      border-radius: 50%;

    function hourlyPrice(price) {
      return price.includes("|") ? price : `${price} | 小時`;
    }

    function shuffle(items) {
      const copy = [...items];
      for (let i = copy.length - 1; i > 0; i--) {
        const randomIndex = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[randomIndex]] = [copy[randomIndex], copy[i]];
      }
      return copy;
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, character => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        "\"": "&quot;",
        "'": "&#039;"
      }[character]));
    }

    function studentCommentLabel(file) {
      const filename = file.split("/").pop().replace(/\.[^.]+$/, "");
      const numberMatch = filename.match(/Comment\s+(\d+)/i);
      const sourceMatch = filename.match(/(?:from|form)\s+(.+)$/i);
      const number = numberMatch ? numberMatch[1] : "";
      const source = sourceMatch ? sourceMatch[1] : filename;
      const translatedSource = source
        .replace(/^Student\b/i, "學生")
        .replace(/^Parent\b/i, "家長")
        .replace(/\(Immigrated\)/i, "(已移民)");

      return number ? `評價 #${number} - ${translatedSource}` : `評價 - ${translatedSource}`;
    }

    function commentEmojiChips() {
      return shuffle(studentCommentEmojis).slice(0, 2).map(emoji => `

    function setupStudentCommentMotion() {
      const cards = document.querySelectorAll("[data-student-comment-card]");
      const rows = document.querySelectorAll(".student-comment-row");
      const finalMessage = document.querySelector("[data-student-comments-final]");
      if (!cards.length && !finalMessage) return;

      cards.forEach(card => {
        const image = card.querySelector("img");
        if (!image) return;

        if (image.complete) {
          card.classList.add("image-loaded");
        } else {
          image.addEventListener("load", () => card.classList.add("image-loaded"), { once: true });
        }
      });

      const observer = new IntersectionObserver(entries => {
        entries.forEach(entry => {
          const card = entry.target.matches("[data-student-comment-card]")
            ? entry.target
            : entry.target.querySelector("[data-student-comment-card]");
          const target = card || entry.target;

          target.classList.toggle("is-visible", entry.isIntersecting);
        });
      }, {
        threshold: 0.28,
        rootMargin: "0px 0px -8% 0px"
      });

      rows.forEach(row => observer.observe(row));
      if (finalMessage) observer.observe(finalMessage);
    }

      return `
        <a class="${cardClass}" href="course.html?id=${item.id}"${videoAttribute}>
          <span class="offer-new">NEW</span>
          <h3 class="offer-title">${item.title}</h3>
          <p class="offer-desc">${item.desc}</p>
          <p class="offer-price">${hourlyPrice(item.price)}</p>

    function setupCarousels() {
      document.querySelectorAll("[data-carousel-shell]").forEach(shell => {
        const row = shell.querySelector(".offer-row");
        const prev = shell.querySelector("[data-carousel-prev]");
        const next = shell.querySelector("[data-carousel-next]");

        if (!row || !prev || !next) return;

        function scrollAmount() {
          return Math.min(row.clientWidth * 0.85, 920);
        }

        function updateButtons() {
          prev.hidden = row.scrollLeft < 20;
          next.hidden = row.scrollLeft + row.clientWidth >= row.scrollWidth - 20;
        }

        prev.addEventListener("click", () => row.scrollBy({ left: -scrollAmount(), behavior: "smooth" }));
        next.addEventListener("click", () => row.scrollBy({ left: scrollAmount(), behavior: "smooth" }));
        row.addEventListener("scroll", updateButtons);
        window.addEventListener("resize", updateButtons);
        updateButtons();
      });
    }

    const bgVideos = Array.from(document.querySelectorAll(".bg-video"));
    let activeBgVideoIndex = 0;
    let currentVideoSet = null;
    let currentVideoIndex = 0;
    let videosAreEnabled = false;
    let backgroundVideoLoadToken = 0;

    function shouldUseLightweightVideoMode() {
      const connection = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
      const effectiveType = connection?.effectiveType || "";
      const isMobileLike = window.matchMedia("(max-width: 900px), (hover: none), (pointer: coarse)").matches;
      const isSlowConnection = ["slow-2g", "2g", "3g"].includes(effectiveType);
      const isCellular = connection?.type === "cellular";

      return Boolean(connection?.saveData || isMobileLike || isSlowConnection || isCellular);
    }

    const useLightweightVideoMode = shouldUseLightweightVideoMode();

    if (useLightweightVideoMode) {
      document.documentElement.classList.add("video-light-mode");
    }

    function canUseBackgroundVideo() {
      return !useLightweightVideoMode && bgVideos.length;
    }

    function enableBackgroundVideos() {
      if (!canUseBackgroundVideo()) return false;
      if (!videosAreEnabled) {
        videosAreEnabled = true;
      }
      return true;
    }

    function setVideoStrength(set) {
      document.documentElement.style.setProperty("--video-opacity", set.opacity);
      document.documentElement.style.setProperty("--video-cover", set.cover);
    }

    function playBackgroundSource(src) {
      if (!enableBackgroundVideos()) return;

      const currentVideo = bgVideos[activeBgVideoIndex];
      const hasCurrentSource = Boolean(currentVideo.getAttribute("src"));
      const nextIndex = hasCurrentSource ? 1 - activeBgVideoIndex : activeBgVideoIndex;
      const nextVideo = bgVideos[nextIndex];
      const loadToken = ++backgroundVideoLoadToken;
      let hasRevealed = false;

      nextVideo.classList.remove("is-active");
      nextVideo.src = src;
      nextVideo.currentTime = 0;
      nextVideo.load();

      function revealPreparedVideo() {
        if (hasRevealed || loadToken !== backgroundVideoLoadToken) return;
        hasRevealed = true;

        const playPromise = nextVideo.play();
        if (playPromise) playPromise.catch(() => {});

        document.documentElement.classList.add("video-enabled");
        nextVideo.classList.add("is-active");

        if (nextVideo !== currentVideo) {
          currentVideo.classList.remove("is-active");
        }

        activeBgVideoIndex = nextIndex;
      }

      nextVideo.addEventListener("loadeddata", revealPreparedVideo, { once: true });
      nextVideo.addEventListener("canplay", revealPreparedVideo, { once: true });
      nextVideo.addEventListener("error", () => {
        if (loadToken === backgroundVideoLoadToken) {
          nextVideo.classList.remove("is-active");
        }
      }, { once: true });

      if (nextVideo.readyState >= 2) {
        window.requestAnimationFrame(revealPreparedVideo);
      }
    }

    function switchVideoSet(name) {
      if (!canUseBackgroundVideo()) return;
      if (currentVideoSet === name) return;

      const set = videoSets[name];
      if (!set) return;

      currentVideoSet = name;
      currentVideoIndex = 0;
      setVideoStrength(set);
      playBackgroundSource(set.sources[currentVideoIndex]);
    }

    function scheduleInitialBackgroundVideo() {
      setVideoStrength(videoSets.hongKong);
      if (!canUseBackgroundVideo()) return;

      const startVideo = () => {
        window.setTimeout(() => switchVideoSet("hongKong"), 1400);
      };

      if ("requestIdleCallback" in window) {
        window.requestIdleCallback(startVideo, { timeout: 3200 });
      } else {
        window.addEventListener("load", startVideo, { once: true });
      }
    }

    bgVideos.forEach(video => {
      video.addEventListener("ended", () => {
        if (video !== bgVideos[activeBgVideoIndex]) return;

        const set = videoSets[currentVideoSet];
        if (!set) return;

        currentVideoIndex = (currentVideoIndex + 1) % set.sources.length;
        playBackgroundSource(set.sources[currentVideoIndex]);
      });
    });

        cursor.style.opacity = "1";
      });

      });
