<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>Edmund 學生考試寫作練習系統</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, maximum-scale=5.0">

  <style>
    @font-face {
      font-family: "Noto Serif TC Local";
      src: url("fonts/NotoSerifTC-VariableFont_wght.ttf") format("truetype");
      font-weight: 200 900;
      font-style: normal;
      font-display: swap;
    }

    * { box-sizing: border-box; }

    :root {
      --ink: #172033;
      --muted: #627085;
      --blue: #2f80ed;
      --blue-dark: #1559a8;
      --panel: rgba(255,255,255,0.92);
      --panel-border: rgba(47,128,237,0.18);
      --locked: #263142;
      --green: #16a34a;
      --red: #dc2626;
      --orange: #f97316;
      --orange-dark: #c2410c;
      --shadow: rgba(17,43,85,0.14);
      --writing-bg-start: #a96f44;
      --writing-bg-end: #f2ecb6;
    }

    html { scroll-behavior: smooth; }
    html, body, a, button, input, textarea { cursor: none; }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        linear-gradient(135deg, rgba(255,255,255,0.56) 0%, rgba(255,255,255,0.34) 44%, rgba(255,255,255,0.18) 100%),
        linear-gradient(135deg, var(--writing-bg-start) 0%, #d1ad75 46%, var(--writing-bg-end) 100%);
      color: var(--ink);
      font-family: "Noto Serif TC Local", "Noto Serif TC", "Source Han Serif TC", "Songti TC", "PMingLiU", serif;
      font-weight: 760;
      overflow-x: hidden;
    }

    body.admin-background-active {
      background: url("assets/writing-practice/control-panel.jpg") center center / cover no-repeat fixed;
    }

    body.dashboard-background-active {
      background: url("assets/writing-practice/front-page.jpg") center center / cover no-repeat fixed;
    }

    .custom-cursor {
      position: fixed;
      top: 0;
      left: 0;
      width: 42px;
      height: 42px;
      z-index: 9999;
      pointer-events: none;
      opacity: 0;
      transform: translate(-50%, -50%);
      transition: opacity 0.18s ease;
    }

    .flash-shell {
      width: min(1480px, calc(100vw - 40px));
      margin: 0 auto;
      padding: 28px 0 64px;
    }

    .topbar {
      position: relative;
      min-height: 76px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 28px;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: clamp(12px, 2vw, 28px);
      text-decoration: none;
    }

    .brand-main,
    .brand-learning {
      height: auto;
      display: block;
      object-fit: contain;
    }

    .brand-main {
      width: min(360px, 42vw);
    }

    .brand-learning {
      width: min(220px, 22vw);
      max-height: 78px;
    }

    .topbar-mascot {
      position: absolute;
      left: 50%;
      top: 50%;
      width: min(260px, 18vw);
      max-height: 150px;
      display: none;
      object-fit: contain;
      pointer-events: none;
      transform: translate(-50%, -50%);
      filter: drop-shadow(0 16px 24px rgba(17,43,85,0.16));
      z-index: 1;
    }

    body.app-active .topbar-mascot {
      display: block;
    }

    .nav-actions {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .sync-pill {
      min-height: 40px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(47,128,237,0.18);
      border-radius: 999px;
      padding: 0 14px;
      background: rgba(255,255,255,0.78);
      color: #2b425f;
      box-shadow: 0 10px 20px rgba(17,43,85,0.08);
      font-size: 13px;
      line-height: 1.2;
      font-weight: 900;
      white-space: nowrap;
    }

    .sync-pill.live {
      border-color: rgba(22,163,74,0.26);
      background: rgba(220,252,231,0.92);
      color: #166534;
    }

    .sync-pill.warning {
      border-color: rgba(245,158,11,0.30);
      background: rgba(255,251,235,0.94);
      color: #92400e;
    }

    .sync-pill.error {
      border-color: rgba(220,38,38,0.22);
      background: rgba(254,226,226,0.92);
      color: #991b1b;
    }

    .hero {
      position: relative;
      display: grid;
      grid-template-columns: minmax(0, 1.02fr) minmax(360px, 0.50fr);
      gap: clamp(36px, 6vw, 96px);
      align-items: center;
      min-height: calc(100vh - 150px);
    }

    .hero-learning-logo {
      width: min(360px, 62vw);
      height: auto;
      display: block;
      margin: 0 0 26px;
      transform: rotate(-20deg);
      transform-origin: 42% 52%;
      filter: drop-shadow(0 18px 24px rgba(17,43,85,0.16));
    }

    .hero-mascot {
      position: absolute;
      left: 45%;
      top: 8%;
      width: min(460px, 28vw);
      max-height: 450px;
      object-fit: contain;
      pointer-events: none;
      transform: translateX(-50%);
      filter: drop-shadow(0 24px 34px rgba(17,43,85,0.18));
      z-index: 1;
    }

    .hero-copy h1 {
      margin: 0;
      color: #0e2d55;
      font-size: clamp(42px, 6vw, 86px);
      line-height: 0.98;
      font-weight: 900;
      letter-spacing: 0;
    }

    .hero-copy p,
    .section-head p,
    .note-text {
      color: var(--muted);
      line-height: 1.45;
      font-weight: 820;
    }

    .hero-copy p {
      max-width: none;
      margin: 22px 0 0;
      font-size: clamp(18px, 1.4vw, 24px);
      white-space: nowrap;
    }

    .login-card,
    .panel-card {
      border: 1px solid var(--panel-border);
      border-radius: 28px;
      background: var(--panel);
      box-shadow:
        inset 0 2px 0 rgba(255,255,255,0.82),
        0 28px 52px var(--shadow);
      backdrop-filter: blur(12px);
    }

    .login-card {
      position: relative;
      z-index: 2;
      padding: 38px;
    }

    .panel-card {
      padding: clamp(22px, 3vw, 36px);
    }

    .app-view.admin-page-bg {
      position: relative;
      min-height: calc(100vh - 138px);
      padding: clamp(18px, 2.2vw, 32px);
      border-radius: 0;
      overflow: visible;
    }

    .app-view.admin-page-bg .admin-control-card {
      border: 0;
      background: transparent;
      box-shadow: none;
      backdrop-filter: none;
    }

    h2,
    .login-card h2,
    .panel-card h2 {
      margin: 0 0 18px;
      color: #0e2d55;
      font-size: clamp(28px, 2.6vw, 42px);
      line-height: 1.1;
      font-weight: 900;
    }

    h3 {
      margin: 0 0 10px;
      color: #0e2d55;
      font-size: 22px;
      line-height: 1.12;
      font-weight: 900;
    }

    .field {
      display: grid;
      gap: 8px;
      margin-top: 16px;
    }

    label {
      color: #1c3f6e;
      font-size: 14px;
      line-height: 1.2;
      font-weight: 900;
    }

    input {
      width: 100%;
      min-height: 52px;
      border: 1px solid rgba(47,128,237,0.22);
      border-radius: 16px;
      padding: 0 16px;
      background: rgba(255,255,255,0.94);
      color: var(--ink);
      font: inherit;
      font-weight: 820;
      outline: 0;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.84);
    }

    .password-field {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      align-items: center;
    }

    .password-field input {
      min-width: 0;
    }

    .form-row {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .pill-button,
    .primary-button,
    .secondary-button {
      min-height: 48px;
      border-radius: 999px;
      padding: 0 18px;
      font: inherit;
      font-weight: 900;
      transition: transform 0.16s ease, box-shadow 0.16s ease, background 0.16s ease;
    }

    .pill-button,
    .secondary-button {
      border: 1px solid rgba(47,128,237,0.24);
      background: rgba(255,255,255,0.92);
      color: var(--blue-dark);
      box-shadow: 0 12px 26px rgba(47,128,237,0.12);
    }

    .primary-button {
      border: 0;
      background: linear-gradient(135deg, #3b82f6, #1559a8);
      color: #fff;
      box-shadow: 0 8px 0 #0f4583, 0 22px 34px rgba(47,128,237,0.28);
    }

    .pill-button:hover,
    .primary-button:hover,
    .secondary-button:hover {
      transform: translateY(-2px);
    }

    .primary-button:active,
    .secondary-button:active,
    .pill-button:active {
      transform: translateY(3px);
    }

    .pill-button.danger,
    .mini-button.danger {
      border-color: rgba(220,38,38,0.22);
      color: #b91c1c;
    }

    .status {
      min-height: 24px;
      margin: 16px 0 0;
      color: #b42318;
      font-size: 14px;
      line-height: 1.35;
      font-weight: 900;
    }

    .app-view {
      display: grid;
      gap: 26px;
    }

    .section-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 18px;
      flex-wrap: wrap;
      margin-bottom: 22px;
    }

    .section-head p {
      margin: 8px 0 0;
      font-size: 16px;
    }

    .welcome-message {
      align-self: center;
      margin-left: auto;
      padding: 12px 18px;
      border: 1px solid rgba(5,150,105,0.18);
      border-radius: 999px;
      background: rgba(240,253,244,0.82);
      color: #0e2d55;
      font-size: clamp(17px, 1.5vw, 23px);
      line-height: 1.2;
      font-weight: 900;
      box-shadow: 0 14px 26px rgba(5,150,105,0.10);
    }

    .welcome-message span {
      color: #059669;
    }

    .admin-grid {
      display: grid;
      grid-template-columns: minmax(320px, 0.7fr) minmax(0, 1.3fr);
      gap: 18px;
    }

    .student-list {
      display: grid;
      gap: 10px;
      margin-top: 14px;
    }

    .student-row {
      min-height: 68px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 14px 12px 18px;
      border: 1px solid rgba(47,128,237,0.16);
      border-radius: 16px;
      background: rgba(255,255,255,0.74);
      color: #173153;
      font-weight: 900;
    }

    .student-row-actions,
    .access-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .mini-button {
      min-height: 46px;
      border: 0;
      border-radius: 999px;
      padding: 0 18px;
      background: #dbeafe;
      color: #1559a8;
      font: inherit;
      font-size: 15px;
      line-height: 1;
      font-weight: 900;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.78), 0 6px 0 #bfdbfe;
    }

    .mini-button.danger {
      background: #fee2e2;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.78), 0 6px 0 #fecaca;
    }

    .profile-card {
      display: grid;
      gap: 18px;
      padding: 18px;
      border-radius: 22px;
      background: rgba(255,255,255,0.70);
      border: 1px solid rgba(47,128,237,0.16);
    }

    .profile-facts,
    .password-log {
      display: grid;
      gap: 10px;
    }

    .fact-row,
    .log-row {
      display: grid;
      grid-template-columns: minmax(120px, 0.35fr) minmax(0, 1fr);
      gap: 12px;
      padding: 10px 12px;
      border-radius: 14px;
      background: rgba(255,255,255,0.78);
      border: 1px solid rgba(47,128,237,0.12);
      font-size: 14px;
      line-height: 1.35;
    }

    .access-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      margin-top: 12px;
    }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      min-height: 48px;
      padding: 10px 12px;
      border-radius: 14px;
      border: 1px solid rgba(47,128,237,0.14);
      background: rgba(255,255,255,0.78);
      color: #173153;
      font-size: 14px;
      font-weight: 900;
    }

    .toggle-row input {
      width: 22px;
      min-height: 22px;
      accent-color: var(--blue);
    }

    .admin-control-card {
      position: relative;
      overflow: hidden;
    }

    .admin-control-card > :not(.admin-bg) {
      position: relative;
      z-index: 1;
    }

    .admin-bg {
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: 0.18;
      background-size: cover;
      background-position: center;
    }

    .admin-bg-left {
      clip-path: polygon(0 0, 50% 0, 44% 100%, 0 100%);
      background-image: url("assets/flashcards/admin-control-left.jpg");
    }

    .admin-bg-right {
      clip-path: polygon(56% 0, 100% 0, 100% 100%, 50% 100%);
      background-image: url("assets/flashcards/admin-control-right.jpg");
    }

    .enter-student-view-button {
      min-width: min(270px, 100%);
      min-height: 120px;
      border: 0;
      border-radius: 26px;
      overflow: hidden;
      background: url("assets/flashcards/enter-student-view.jpg") center / cover no-repeat;
      color: #fff;
      font: inherit;
      font-size: clamp(22px, 2.2vw, 34px);
      font-weight: 900;
      text-shadow: 0 2px 10px rgba(0,0,0,0.42);
      box-shadow: 0 18px 36px rgba(17,43,85,0.18);
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }

    .enter-student-view-button:hover {
      transform: translateY(-3px);
      box-shadow: 0 24px 44px rgba(17,43,85,0.24);
    }

    .admin-switch-modal {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: grid;
      place-items: center;
      padding: 24px;
      background: rgba(15,23,42,0.38);
    }

    .admin-switch-card {
      width: min(620px, 100%);
      max-height: min(760px, calc(100vh - 48px));
      overflow: auto;
      border: 1px solid rgba(47,128,237,0.22);
      border-radius: 28px;
      padding: 24px;
      background: rgba(255,255,255,0.96);
      box-shadow: 0 28px 62px rgba(17,43,85,0.26);
    }

    .admin-switch-head {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      align-items: center;
      margin-bottom: 12px;
    }

    .admin-switch-list {
      display: grid;
      gap: 10px;
      margin-top: 14px;
    }

    .admin-switch-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 14px;
      border: 1px solid rgba(47,128,237,0.14);
      border-radius: 16px;
      background: rgba(239,246,255,0.82);
      color: #0e2d55;
      font-weight: 900;
    }

    .admin-switch-row button {
      min-height: 40px;
      border: 0;
      border-radius: 999px;
      padding: 0 16px;
      background: #2f80ed;
      color: #fff;
      font: inherit;
      font-size: 14px;
      font-weight: 900;
    }

    .dashboard-title-row {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .writing-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
      align-items: stretch;
    }

    .tile {
      min-height: 150px;
      border: 0;
      border-radius: 18px;
      padding: 18px;
      display: grid;
      align-content: end;
      gap: 8px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.28) 0%, rgba(255,255,255,0.06) 36%, rgba(255,255,255,0) 37%),
        linear-gradient(180deg, #3f91f7 0%, #2f80ed 55%, #2472d8 100%);
      color: #fff;
      font: inherit;
      font-size: clamp(22px, 2vw, 34px);
      line-height: 1.05;
      font-weight: 900;
      text-align: left;
      box-shadow:
        inset 0 2px 0 rgba(255,255,255,0.30),
        inset 0 -10px 18px rgba(21,89,168,0.13),
        0 8px 0 #1559a8,
        0 20px 30px rgba(47,128,237,0.18);
      transition: transform 0.16s ease, box-shadow 0.16s ease, background 0.16s ease, opacity 0.16s ease;
    }

    .tile small {
      display: block;
      color: rgba(255,255,255,0.82);
      font-size: 12px;
      line-height: 1.35;
      font-weight: 850;
    }

    .tile.locked {
      background: var(--locked);
      color: #cbd5e1;
      box-shadow:
        inset 0 2px 0 rgba(255,255,255,0.08),
        0 8px 0 #111827,
        0 18px 28px rgba(17,24,39,0.20);
    }

    .tile:not(.locked):hover {
      transform: translateY(-2px);
      box-shadow:
        inset 0 2px 0 rgba(255,255,255,0.25),
        0 10px 0 #1559a8,
        0 26px 36px rgba(47,128,237,0.24);
    }

    .tile.emerald-tile:not(.locked) {
      background:
        linear-gradient(180deg, rgba(255,255,255,0.28) 0%, rgba(255,255,255,0.06) 36%, rgba(255,255,255,0) 37%),
        linear-gradient(180deg, #10b981 0%, #059669 58%, #047857 100%);
      box-shadow:
        inset 0 2px 0 rgba(255,255,255,0.28),
        inset 0 -10px 18px rgba(4,120,87,0.14),
        0 8px 0 #047857,
        0 20px 30px rgba(5,150,105,0.20);
    }

    .tile.orange-tile:not(.locked) {
      background:
        linear-gradient(180deg, rgba(255,255,255,0.30) 0%, rgba(255,255,255,0.08) 36%, rgba(255,255,255,0) 37%),
        linear-gradient(180deg, #fb923c 0%, #f97316 58%, #ea580c 100%);
      box-shadow:
        inset 0 2px 0 rgba(255,255,255,0.30),
        inset 0 -10px 18px rgba(194,65,12,0.16),
        0 8px 0 #c2410c,
        0 20px 30px rgba(249,115,22,0.20);
    }

    .tile.red-tile:not(.locked) {
      background:
        linear-gradient(180deg, rgba(255,255,255,0.32) 0%, rgba(255,255,255,0.08) 36%, rgba(255,255,255,0) 37%),
        linear-gradient(180deg, #9f1239 0%, #881337 58%, #6f102c 100%);
      box-shadow:
        inset 0 2px 0 rgba(255,255,255,0.30),
        inset 0 -10px 18px rgba(76,5,25,0.18),
        0 8px 0 #4c0519,
        0 20px 30px rgba(136,19,55,0.22);
    }

    .tile-label {
      display: grid;
      gap: 2px;
      min-width: 0;
    }

    .tile-line {
      display: block;
      overflow-wrap: normal;
      word-break: normal;
      hyphens: none;
      text-wrap: balance;
    }

    .tile-subline {
      font-size: 0.68em;
      line-height: 1.12;
      opacity: 0.95;
    }

    .exercise-panel {
      display: grid;
      gap: 18px;
    }

    .exercise-kicker {
      display: inline-flex;
      width: fit-content;
      min-height: 34px;
      align-items: center;
      border: 1px solid rgba(5,150,105,0.22);
      border-radius: 999px;
      padding: 0 12px;
      background: rgba(220,252,231,0.86);
      color: #047857;
      font-size: 13px;
      line-height: 1.2;
      font-weight: 900;
    }

    .exercise-title-block {
      display: grid;
      gap: 10px;
    }

    .essay-tabs,
    .practice-mode-grid,
    .practice-actions,
    .paragraph-actions,
    .mistake-legend,
    .review-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    .essay-tab {
      min-height: 44px;
      border: 1px solid rgba(47,128,237,0.18);
      border-radius: 999px;
      padding: 0 14px;
      background: rgba(255,255,255,0.82);
      color: #1559a8;
      font: inherit;
      font-size: 14px;
      line-height: 1.15;
      font-weight: 900;
      box-shadow: 0 10px 20px rgba(47,128,237,0.08);
      transition: transform 0.16s ease, background 0.16s ease, color 0.16s ease;
    }

    .essay-tab.active,
    .essay-tab:hover {
      transform: translateY(-1px);
      background: #1559a8;
      color: #fff;
    }

    .practice-strip {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      flex-wrap: wrap;
      padding: 14px;
      border: 1px solid rgba(5,150,105,0.16);
      border-radius: 18px;
      background: rgba(240,253,244,0.80);
    }

    .practice-strip strong,
    .mode-summary strong,
    .result-stat strong {
      color: #0e2d55;
      font-weight: 900;
    }

    .essay-content,
    .practice-card,
    .mode-page,
    .result-history {
      border: 1px solid rgba(47,128,237,0.14);
      border-radius: 20px;
      background: rgba(255,255,255,0.76);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.86), 0 14px 28px rgba(17,43,85,0.08);
    }

    .essay-content {
      padding: clamp(18px, 2.4vw, 28px);
    }

    .essay-content p,
    .practice-text p,
    .translation-paragraph {
      margin: 0 0 18px;
      color: #172033;
      font-size: clamp(17px, 1.25vw, 20px);
      line-height: 1.72;
      font-weight: 760;
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function exactDateTime(value) {
      if (!value) return "未曾";
      return new Date(value).toLocaleString("en-HK", {
        year: "numeric",
        month: "short",
        day: "numeric",
        hour: "2-digit",
        minute: "2-digit"
      });
    }

    function defaultAccess() {

    function normalizeStudent(student) {
      return {
        id: student.id || "",
        name: String(student.name || "").trim(),
        password: String(student.password || "Protected - use Change Password to reset"),
        createdAt: student.createdAt || Date.now(),
        access: { ...defaultAccess(), ...(student.access || {}) }
      };

    function readJson(key, fallback) {
      try {
        return JSON.parse(localStorage.getItem(key) || JSON.stringify(fallback));
      } catch {
        return fallback;
      }
    }

    function writeJson(key, value) {
      localStorage.setItem(key, JSON.stringify(value));
    }

    function isBlankPart(part) {
      return Boolean(part && typeof part === "object" && part.answer);
    }

    function prepareWritingExercises() {
      Object.values(writingExercises).forEach(exercise => {
        let blankNumber = 0;
        exercise.paragraphs.forEach((paragraph, paragraphIndex) => {
          paragraph.sentences.forEach((sentence, sentenceIndex) => {
            sentence.key = `${paragraphIndex}-${sentenceIndex}`;
            sentence.paragraphIndex = paragraphIndex;
            sentence.sentenceIndex = sentenceIndex;
            sentence.parts.forEach(part => {
              if (!isBlankPart(part)) return;
              blankNumber += 1;
              part.id = `${exercise.id}-q${blankNumber}`;
              part.number = blankNumber;
              part.paragraphIndex = paragraphIndex;
              part.sentenceIndex = sentenceIndex;
              part.sentenceKey = sentence.key;
              part.paragraphLabel = paragraph.label;
            });
          });
        });
        exercise.questionCount = blankNumber;
      });
    }

    function plainSentence(sentence) {
      return sentence.parts.map(part => isBlankPart(part) ? part.answer : part).join("");
    }

    function plainParagraph(paragraph) {
      return paragraph.sentences.map(plainSentence).join(" ");
    }

    function exerciseBySection(sectionKey) {
      return writingExercises[sectionKey] || null;
    }

    function currentExercise() {
      return exerciseBySection(currentExerciseSectionKey);
    }

    function allParagraphIndexes(exercise) {
      return exercise.paragraphs.map((_, index) => index);
    }

    function normalizeSelectedParagraphs(exercise, selectedParagraphs) {
      const valid = new Set(allParagraphIndexes(exercise));
      const selected = (selectedParagraphs || [])
        .map(Number)
        .filter(index => valid.has(index));
      return selected.length ? [...new Set(selected)] : allParagraphIndexes(exercise);
    }

    function getExerciseBlanks(exercise, options = {}) {
      const selectedParagraphs = options.selectedParagraphs
        ? new Set(normalizeSelectedParagraphs(exercise, options.selectedParagraphs))
        : null;
      const sentenceKeys = options.sentenceKeys ? new Set(options.sentenceKeys) : null;
      const blanks = [];

      exercise.paragraphs.forEach((paragraph, paragraphIndex) => {
        if (selectedParagraphs && !selectedParagraphs.has(paragraphIndex)) return;
        paragraph.sentences.forEach(sentence => {
          if (sentenceKeys && !sentenceKeys.has(sentence.key)) return;
          sentence.parts.forEach(part => {
            if (!isBlankPart(part)) return;
            blanks.push({
              ...part,
              paragraphLabel: paragraph.label,
              sentenceText: plainSentence(sentence)
            });
          });
        });
      });

      return blanks;
    }

    function getPracticeTargets(exercise) {
      if (!practiceState) return [];
      return getExerciseBlanks(exercise, {
        selectedParagraphs: practiceState.selectedParagraphs,
        sentenceKeys: practiceState.sentenceKeys || null
      });
    }

    function getPracticeSentenceKeys(exercise) {
      if (!practiceState) return [];
      if (practiceState.sentenceKeys?.length) return practiceState.sentenceKeys;
      const selected = new Set(normalizeSelectedParagraphs(exercise, practiceState.selectedParagraphs));
      return exercise.paragraphs.flatMap((paragraph, paragraphIndex) => {
        if (!selected.has(paragraphIndex)) return [];
        return paragraph.sentences
          .filter(sentence => sentence.parts.some(isBlankPart))
          .map(sentence => sentence.key);
      });
    }

    function normalizeAnswer(value) {
      return String(value || "")
        .replaceAll("’", "'")
        .replaceAll("‘", "'")
        .replaceAll("“", '"')
        .replaceAll("”", '"')
        .replace(/[.,!?;:]+$/g, "")
        .replace(/\s+/g, " ")
        .trim()
        .toLowerCase();
    }

    function answerKey(value) {
      return normalizeAnswer(value).replace(/[-–—]/g, " ");
    }

    function withoutLeadingArticle(value) {
      return normalizeAnswer(value).replace(/^(a|an|the)\s+/i, "");
    }

    function isMissingArticle(userAnswer, correctAnswer) {
      const correct = normalizeAnswer(correctAnswer);
      const user = normalizeAnswer(userAnswer);
      const match = correct.match(/^(a|an|the)\s+(.+)$/);
      return Boolean(match && user === match[2]);
    }

    function isMissingPluralS(userAnswer, correctAnswer) {
      const correct = answerKey(correctAnswer);
      const user = answerKey(userAnswer);
      if (!user || !correct.endsWith("s")) return false;
      if (`${user}s` === correct) return true;

      const words = user.split(" ");
      if (!words.length) return false;
      words[words.length - 1] = `${words[words.length - 1]}s`;
      return words.join(" ") === correct;
    }

    function levenshteinDistance(a, b) {
      const left = String(a || "");
      const right = String(b || "");
      const matrix = Array.from({ length: left.length + 1 }, () => Array(right.length + 1).fill(0));

      for (let i = 0; i <= left.length; i += 1) matrix[i][0] = i;
      for (let j = 0; j <= right.length; j += 1) matrix[0][j] = j;

      for (let i = 1; i <= left.length; i += 1) {
        for (let j = 1; j <= right.length; j += 1) {
          const cost = left[i - 1] === right[j - 1] ? 0 : 1;
          matrix[i][j] = Math.min(
            matrix[i - 1][j] + 1,
            matrix[i][j - 1] + 1,
            matrix[i - 1][j - 1] + cost
          );
        }
      }

      return matrix[left.length][right.length];
    }

    function isLikelySpellingMistake(userAnswer, correctAnswer) {
      const user = answerKey(userAnswer);
      const correct = answerKey(correctAnswer);
      if (!user || !correct) return false;
      if (Math.abs(user.length - correct.length) > 3) return false;

      const userWords = user.split(" ");
      const correctWords = correct.split(" ");
      if (userWords.length === correctWords.length) {
        const closeWords = userWords.filter((word, index) => {
          const expected = correctWords[index];
          const distance = levenshteinDistance(word, expected);
          return distance <= (expected.length <= 5 ? 1 : 2);
        });
        if (closeWords.length === correctWords.length) return true;
      }

      const distance = levenshteinDistance(user, correct);
      return distance <= (correct.length <= 6 ? 1 : 2);
    }

    function classifyAnswer(userAnswer, correctAnswer) {
      const user = normalizeAnswer(userAnswer);
      const correct = normalizeAnswer(correctAnswer);
      if (!user) return { ok: false, type: "missing", label: "Missing answer" };
      if (user === correct || answerKey(user) === answerKey(correct)) return { ok: true, type: "correct", label: "Correct" };
      if (isMissingArticle(userAnswer, correctAnswer)) return { ok: false, type: "article", label: "Missing article" };
      if (isMissingPluralS(userAnswer, correctAnswer)) return { ok: false, type: "plural", label: "Missing s for plural" };
      if (withoutLeadingArticle(userAnswer) === withoutLeadingArticle(correctAnswer) && normalizeAnswer(userAnswer) !== normalizeAnswer(correctAnswer)) {
        return { ok: false, type: "article", label: "Missing article" };
      }
      if (isLikelySpellingMistake(userAnswer, correctAnswer)) return { ok: false, type: "spelling", label: "Wrong spelling" };
      return { ok: false, type: "wrong", label: "Wrong word" };
    }

    function mistakeClass(type) {
      return {
        missing: "mistake-missing",
        wrong: "mistake-wrong",
        spelling: "mistake-spelling",
        article: "mistake-article",
        plural: "mistake-plural"
      }[type] || "";
    }

    function modeLabel(mode) {
      return {
        blank: "Standard mode",
        start: "Reveal starting letter",
        end: "Reveal ending letter",
        both: "Reveal both letters",
        sentence: "Fill in sentence mode"
      }[mode] || "Practice";
    }

    function maskWord(word, mode) {
      const letters = [...String(word || "")];
      if (!letters.length) return "";
      if (mode === "start") return `${letters[0]}${"_".repeat(Math.max(0, letters.length - 1))}`;
      if (mode === "end") return `${"_".repeat(Math.max(0, letters.length - 1))}${letters[letters.length - 1]}`;
      if (mode === "both") {
        if (letters.length === 1) return letters[0];
        return `${letters[0]}${"_".repeat(Math.max(0, letters.length - 2))}${letters[letters.length - 1]}`;
      }
      return "_____________";
    }

    function answerHint(answer, mode) {
      const clean = String(answer || "").trim();
      if (!clean) return "_____________";
      if (!["start", "end", "both"].includes(mode)) return "_____________";
      return clean
        .split(/([\s-])/)
        .map(part => part === " " || part === "-" ? part : maskWord(part, mode))
        .join("");
    }

    function blankInputWidth(answer) {
      const length = String(answer || "").length;
      return Math.min(260, Math.max(118, length * 13 + 48));
    }

    function resultByBlankId() {
      const result = practiceState?.lastResult;
      if (!result?.mistakes) return new Map();
      return new Map(result.mistakes.map(mistake => [mistake.blankId, mistake]));

    function renderPracticeInput(part, targetIds) {
      if (!targetIds.has(part.id)) return escapeHtml(part.answer);

      const mistakeMap = resultByBlankId();
      const mistake = mistakeMap.get(part.id);
      const value = practiceState?.answers?.[part.id] || "";
      const disabled = practiceState?.submitted ? "disabled" : "";
      const classes = ["inline-answer"];
      if (mistake) classes.push(mistakeClass(mistake.type));
      const resultLabel = mistake
        ? `<span class="inline-result">${escapeHtml(mistake.label)} | ${escapeHtml(part.answer)}</span>`
        : "";

      return `<span class="blank-number">(${escapeHtml(part.number)})</span><input class="${classes.join(" ")}" style="width:${blankInputWidth(part.answer)}px" type="text" data-answer-id="${escapeHtml(part.id)}" value="${escapeHtml(value)}" placeholder="${escapeHtml(answerHint(part.answer, practiceState?.mode))}" autocomplete="off" ${disabled}>${resultLabel}`;
    }

    function renderPracticeSentence(sentence, targetIds, heading = "") {
      const sentenceHtml = sentence.parts.map(part => {
        if (isBlankPart(part)) return renderPracticeInput(part, targetIds);
        return escapeHtml(part);
      }).join("");

      return `
        <div class="sentence-card">
          ${heading ? `<strong>${escapeHtml(heading)}</strong>` : ""}
          <p>${sentenceHtml}</p>
        </div>
      `;
    }

    function renderPracticeBody(exercise, targets) {
      const targetIds = new Set(targets.map(target => target.id));
      const selectedParagraphs = new Set(normalizeSelectedParagraphs(exercise, practiceState.selectedParagraphs));
      const sentenceMode = practiceState.round > 1 || practiceState.mode === "sentence";

      if (sentenceMode) {
        const sentenceKeys = new Set(getPracticeSentenceKeys(exercise));
        const cards = [];
        exercise.paragraphs.forEach(paragraph => {
          paragraph.sentences.forEach(sentence => {
            if (!sentenceKeys.has(sentence.key)) return;
            cards.push(renderPracticeSentence(sentence, targetIds, `${paragraph.label} | Sentence ${sentence.sentenceIndex + 1}`));
          });
        });
        return `<div class="sentence-grid">${cards.join("")}</div>`;
      }

      return `
        <div class="practice-text">
          ${exercise.paragraphs.map((paragraph, paragraphIndex) => {
            if (!selectedParagraphs.has(paragraphIndex)) return "";
            const paragraphHtml = paragraph.sentences.map(sentence => sentence.parts.map(part => {
              if (isBlankPart(part)) return renderPracticeInput(part, targetIds);
              return escapeHtml(part);
            }).join("")).join(" ");
            return `<div class="practice-paragraph"><p>${paragraphHtml}</p></div>`;
          }).join("")}
        </div>
      `;
    }

    function renderResultPanel(result) {
      if (!result) return "";
      return `
        <div class="result-panel">
          <div class="result-stats">
            <div class="result-stat"><span>${escapeHtml(result.total)}</span><strong>Questions</strong></div>
            <div class="result-stat"><span>${escapeHtml(result.correct)}</span><strong>Correct</strong></div>
            <div class="result-stat"><span>${escapeHtml(result.mistakes.length)}</span><strong>Mistakes</strong></div>
            <div class="result-stat"><span>${escapeHtml(result.mistakeRate)}%</span><strong>Mistake percentage</strong></div>
          </div>
          <div class="mistake-legend">
            <span class="missing">Missing answer</span>
            <span class="wrong">Wrong word</span>
            <span class="spelling">Wrong spelling</span>
            <span class="article">Missing article</span>
            <span class="plural">Missing s for plural</span>
          </div>
          <div class="mistake-list">
            ${result.mistakes.length ? result.mistakes.map(mistake => `
              <div class="mistake-row">
                <div><span class="mistake-chip ${escapeHtml(mistake.type)}">${escapeHtml(mistake.label)}</span></div>
                <strong>Q${escapeHtml(mistake.number)} | ${escapeHtml(mistake.paragraphLabel)}</strong>
                <span>Your answer: ${escapeHtml(mistake.userAnswer || "(blank)")}</span>
                <span>Correct answer: ${escapeHtml(mistake.correctAnswer)}</span>
                <span>Sentence: ${escapeHtml(mistake.sentenceText)}</span>
              </div>
            `).join("") : `<p class="note-text">All correct. This exercise is complete.</p>`}
          </div>
          <div class="review-actions">
            ${result.mistakes.length ? `<button class="primary-button" type="button" data-next-practice-round>Start Round ${escapeHtml(practiceState.round + 1)}</button>` : ""}
            <button class="secondary-button" type="button" data-restart-practice>Try Again</button>
            <button class="secondary-button" type="button" data-back-essay>Back to Essay</button>
          </div>
        </div>
      `;
    }

    function renderPracticeRound(exercise) {
      const targets = getPracticeTargets(exercise);
      return `
        ${renderExerciseHeader(exercise, practiceState.round > 1 ? "Only sentences containing previous mistakes are drawn for this round." : modeLabel(practiceState.mode))}
        <form class="practice-card" data-practice-form>
          <div class="practice-head">
            <div>
              <span class="practice-round-pill">Round ${escapeHtml(practiceState.round)} | ${escapeHtml(modeLabel(practiceState.mode))}</span>
              <p class="note-text">${escapeHtml(targets.length)} questions in this round. Click each blank space and type your answer.</p>
            </div>
            <button class="secondary-button" type="button" data-back-practice-mode>Change Mode</button>
          </div>
          ${practiceState.submitted ? renderResultPanel(practiceState.lastResult) : ""}
          ${renderPracticeBody(exercise, targets)}
          ${practiceState.submitted ? "" : `<button class="primary-button" type="submit">Submit</button>`}
        </form>
        ${renderResultHistory(exercise)}
      `;
    }

    function renderExerciseView() {
      const panel = document.querySelector("[data-exercise-view]");
      if (!panel) return;
      const exercise = currentExercise();

      if (!exercise) {
        panel.innerHTML = `
          <div class="section-head">
            <div>
              <h2>Coming Soon</h2>
              <p>This writing section has not been added yet.</p>
            </div>
            <button class="secondary-button" type="button" data-back-dashboard>Writing Selection</button>
          </div>
        `;
        return;
      }

      if (practiceState?.screen === "mode") {
        panel.innerHTML = renderModePage(exercise);
        return;
      }

      if (practiceState?.screen === "practice") {
        panel.innerHTML = renderPracticeRound(exercise);
        return;
      }

      panel.innerHTML = renderExerciseContent(exercise);
    }

    function showExercise(sectionKey) {
      currentExerciseSectionKey = sectionKey;
      currentEssayTab = "essay";
      practiceState = null;
      showAppPanel("exercise");
    }

    function startPracticeSetup() {
      const exercise = currentExercise();
      if (!exercise) return;
      practiceState = defaultPracticeState(exercise);
      renderExerciseView();
    }

    function startPracticeMode(mode) {
      const exercise = currentExercise();
      if (!exercise || !practiceState) return;
      const selectedParagraphs = normalizeSelectedParagraphs(exercise, practiceState.selectedParagraphs);
      const targets = getExerciseBlanks(exercise, { selectedParagraphs });
      if (!targets.length) return;
      practiceState = {
        ...practiceState,
        screen: "practice",
        mode,
        round: 1,
        selectedParagraphs,
        sentenceKeys: null,
        answers: {},
        submitted: false,
        lastResult: null
      };
      renderExerciseView();
    }

    function submitPracticeRound() {
      const exercise = currentExercise();
      if (!exercise || !practiceState) return;
      const targets = getPracticeTargets(exercise);
      const answers = {};
      document.querySelectorAll("[data-answer-id]").forEach(input => {
        answers[input.getAttribute("data-answer-id")] = input.value;
      });

      const mistakes = [];
      targets.forEach(target => {
        const userAnswer = answers[target.id] || "";
        const classification = classifyAnswer(userAnswer, target.answer);
        if (!classification.ok) {
          mistakes.push({
            blankId: target.id,
            number: target.number,
            type: classification.type,
            label: classification.label,
            userAnswer,
            correctAnswer: target.answer,
            paragraphLabel: target.paragraphLabel,
            sentenceKey: target.sentenceKey,
            sentenceText: target.sentenceText
          });
        }
      });

      const result = {
        id: `${exercise.id}-${Date.now()}-${practiceState.round}`,
        exerciseId: exercise.id,
        exerciseTitle: exercise.title,
        studentName: currentUser?.name || "Guest",
        round: practiceState.round,
        mode: practiceState.mode,
        modeLabel: modeLabel(practiceState.mode),
        total: targets.length,
        correct: Math.max(0, targets.length - mistakes.length),
        mistakes,
        mistakeRate: targets.length ? Math.round((mistakes.length / targets.length) * 100) : 0,
        completed: mistakes.length === 0,
        createdAt: Date.now()
      };

      savePracticeResult({
        ...result,
        mistakes: mistakes.length,
        mistakeDetails: mistakes
      });

      practiceState = {
        ...practiceState,
        answers,
        submitted: true,
        lastResult: result
      };
      renderExerciseView();
    }

    function startNextPracticeRound() {
      const exercise = currentExercise();
      const mistakes = practiceState?.lastResult?.mistakes || [];
      if (!exercise || !mistakes.length) return;
      const sentenceKeys = [...new Set(mistakes.map(mistake => mistake.sentenceKey))];
      practiceState = {
        ...practiceState,
        screen: "practice",
        round: practiceState.round + 1,
        mode: "sentence",
        sentenceKeys,
        answers: {},
        submitted: false,
        lastResult: null
      };
      renderExerciseView();
    }

    function updatePracticeParagraph(index, checked) {
      const exercise = currentExercise();
      if (!exercise || !practiceState) return;
      const selected = new Set(normalizeSelectedParagraphs(exercise, practiceState.selectedParagraphs));
      if (checked) selected.add(index);
      else selected.delete(index);
      if (!selected.size) selected.add(index);
      practiceState.selectedParagraphs = [...selected].sort((a, b) => a - b);
      renderExerciseView();
    }

    function updateSupabaseStatus(message, tone = "") {
      const status = document.querySelector("[data-sync-status]");
      if (!status) return;
      status.textContent = message;
      status.className = `sync-pill ${tone}`.trim();
    }

    async function ensureSupabaseSession() {
      const sessionResult = await supabaseClient.auth.getSession();
      let session = sessionResult.data?.session || null;
      if (!session) {
        const signInResult = await supabaseClient.auth.signInAnonymously();
        if (signInResult.error) throw signInResult.error;
        session = signInResult.data?.session || null;
      }
      if (!session?.user?.id) throw new Error("No Supabase user session was created.");
    }

    async function callSupabaseRpc(name, args = {}) {
      if (!supabaseClient) throw new Error("Supabase client is not available.");
      await ensureSupabaseSession();
      const { data, error } = await supabaseClient.rpc(name, args);
      if (error) throw error;
      return data;
    }

    function studentFromSupabase(row) {
      return normalizeStudent({
        id: row.id,
        name: row.name,
        password: "Protected - use Change Password to reset",
        createdAt: row.created_at ? new Date(row.created_at).getTime() : Date.now(),
        access: row.access || defaultAccess()
      });
    }

    async function initSupabaseState() {
      if (!supabaseClient) {
        updateSupabaseStatus("Supabase: local backup", "warning");
        return;
      }

      updateSupabaseStatus("Supabase: connecting", "warning");
      try {
        await ensureSupabaseSession();
        updateSupabaseStatus("Supabase: live", "live");
        if (currentUser?.role === "admin" && adminPasswordForSession) {
          await loadStudentsFromSupabase();
        }
      } catch (error) {
        console.warn("Supabase anonymous session failed:", error);
        updateSupabaseStatus("Supabase: enable Auth", "error");
      }
    }

    async function loadStudentsFromSupabase() {
      if (!adminPasswordForSession) return [];
      try {
        const rows = await callSupabaseRpc("writing_admin_list_students", {
          p_admin_name: ADMIN_NAME,
          p_admin_password: adminPasswordForSession
        });
        studentsCache = (rows || []).map(studentFromSupabase);
        studentsLoadedFromSupabase = true;
        renderStudents();
        renderStudentProfile();
        return studentsCache;
      } catch (error) {
        console.warn("Could not load Supabase writing students:", error);
        updateSupabaseStatus("Supabase: writing SQL needed", "error");
        studentsLoadedFromSupabase = false;
        return getStudents();
      }
    }

    async function loadPasswordLogsFromSupabase(studentName) {
      if (!studentName || !adminPasswordForSession) return;
      try {
        const rows = await callSupabaseRpc("writing_admin_get_password_logs", {
          p_admin_name: ADMIN_NAME,
          p_admin_password: adminPasswordForSession,
          p_student_name: studentName
        });
        studentPasswordLogsCache[studentName] = (rows || []).map(row => ({
          studentName: row.student_name,
          changedBy: row.changed_by,
          changedAt: row.changed_at ? new Date(row.changed_at).getTime() : Date.now()
        }));
      } catch (error) {
        console.warn("Could not load writing password logs:", error);
      }
    }

    function getStudents() {
      if (studentsLoadedFromSupabase) return studentsCache.map(normalizeStudent);
      return readJson(STUDENTS_KEY, []).map(normalizeStudent).filter(student => student.name);
    }

    function saveStudents(students) {
      if (studentsLoadedFromSupabase) {
        studentsCache = students.map(normalizeStudent);
        return;
      }
      writeJson(STUDENTS_KEY, students.map(normalizeStudent));
    }

    function getSelectedStudent() {
      return getStudents().find(student => student.name === selectedStudentName) || null;
    }

    function getPasswordLogs() {
      if (selectedStudentName && studentPasswordLogsCache[selectedStudentName]) {
        return studentPasswordLogsCache[selectedStudentName];
      }
      return readJson(PASSWORD_LOG_KEY, []);
    }

    function savePasswordLogs(logs) {
      writeJson(PASSWORD_LOG_KEY, logs);
    }

    function setSession(user) {
      currentUser = user;
      writeJson(SESSION_KEY, user);
      if (user?.role === "admin" && adminPasswordForSession) {
        localStorage.setItem(ADMIN_SESSION_PASSWORD_KEY, adminPasswordForSession);
      }
    }

    function restoreSession() {
      const session = readJson(SESSION_KEY, null);
      if (!session?.name || !session?.role) return false;
      currentUser = session;
      if (session.role === "admin") {
        adminPasswordForSession = localStorage.getItem(ADMIN_SESSION_PASSWORD_KEY) || "";
      }
      if (session.role === "student") {
        studentSessionToken = session.sessionToken || "";
      }
      return true;
    }

    function isAdmin() {
      return currentUser?.role === "admin";
    }

    function canAccess(sectionKey) {
      if (isAdmin()) return true;
      return currentUser?.access?.[sectionKey] !== false;
    }

    function updateNavActions() {
      document.querySelector("[data-logout]")?.classList.toggle("hidden", !currentUser);
      document.querySelector("[data-admin-panel-shortcut]")?.classList.toggle("hidden", !currentUser?.impersonatedByAdmin);
      document.querySelector("[data-return-admin]")?.classList.toggle("hidden", !currentUser?.impersonatedByAdmin);
      document.querySelector("[data-admin-switch]")?.classList.toggle("hidden", !isAdmin());
    }

    function showLogin() {
      currentUser = null;
      currentView = "login";
      studentSessionToken = "";
      selectedStudentName = "";
      currentExerciseSectionKey = "";
      practiceState = null;
      localStorage.removeItem(SESSION_KEY);
      localStorage.removeItem(ADMIN_SESSION_PASSWORD_KEY);
      document.body.classList.remove("app-active", "admin-background-active", "dashboard-background-active");
      document.querySelector("[data-login-view]")?.classList.remove("hidden");
      document.querySelector("[data-app-view]")?.classList.add("hidden");
      document.querySelector("[data-admin-panel]")?.classList.add("hidden");
      document.querySelector("[data-dashboard]")?.classList.add("hidden");
      document.querySelector("[data-exercise-view]")?.classList.add("hidden");
      closeAdminSwitchModal();
      updateNavActions();
    }

    function showAppPanel(view) {
      currentView = view;
      document.querySelector("[data-login-view]")?.classList.add("hidden");
      document.querySelector("[data-app-view]")?.classList.remove("hidden");
      document.querySelector("[data-admin-panel]")?.classList.toggle("hidden", view !== "admin-panel");
      document.querySelector("[data-dashboard]")?.classList.toggle("hidden", view !== "dashboard");
      document.querySelector("[data-exercise-view]")?.classList.toggle("hidden", view !== "exercise");
      document.body.classList.add("app-active");
      document.body.classList.toggle("admin-background-active", view === "admin-panel");
      document.body.classList.toggle("dashboard-background-active", view === "dashboard" && currentUser?.impersonatedByAdmin);
      updateNavActions();

      if (view === "admin-panel") {
        renderStudents();
        renderStudentProfile();
      }
      if (view === "dashboard") renderDashboard();
      if (view === "exercise") renderExerciseView();
    }

    async function login(username, password) {
      const trimmedName = username.trim();
      if (supabaseClient) {
        try {
          if (trimmedName === ADMIN_NAME) {
            const adminRows = await callSupabaseRpc("writing_admin_login", {
              p_name: trimmedName,
              p_password: password
            });
            if (Array.isArray(adminRows) && adminRows.length) {
              adminPasswordForSession = password;
              setSession({ name: ADMIN_NAME, role: "admin", access: defaultAccess(), createdAt: Date.now() });
              await loadStudentsFromSupabase();
              showAppPanel("admin-panel");
              updateSupabaseStatus("Supabase: live", "live");
              return true;
            }
          }

          const studentRows = await callSupabaseRpc("writing_student_login", {
            p_name: trimmedName,
            p_password: password
          });
          if (Array.isArray(studentRows) && studentRows.length) {
            const student = studentRows[0];
            studentSessionToken = student.session_token;
            currentUser = {
              id: student.id,
              name: student.name,
              role: "student",
              access: { ...defaultAccess(), ...(student.access || {}) },
              createdAt: student.created_at ? new Date(student.created_at).getTime() : Date.now(),
              sessionToken: studentSessionToken
            };
            setSession(currentUser);
            showAppPanel("dashboard");
            updateSupabaseStatus("Supabase: live", "live");
            return true;
          }
        } catch (error) {
          console.warn("Supabase writing login failed:", error);
          updateSupabaseStatus("Supabase: writing SQL needed", "error");
        }
      }

      const student = getStudents().find(item => item.name === trimmedName && item.password === password);
      if (student) {
        setSession({ name: student.name, role: "student", access: student.access, createdAt: student.createdAt });
        showAppPanel("dashboard");
        return true;
      }

      return false;
    }

    function sectionToggleLabelHtml(section) {
      return `<span>${escapeHtml(section.label)}<br>${escapeHtml(section.subline)}</span>`;
    }

    function tileHtml(section) {
      const locked = !canAccess(section.key);
      const classes = ["tile"];
      if (locked) classes.push("locked");
      if (section.tone === "emerald") classes.push("emerald-tile");
      if (section.tone === "orange") classes.push("orange-tile");
      if (section.tone === "red") classes.push("red-tile");
      return `
        <button class="${classes.join(" ")}" type="button" data-writing-section="${escapeHtml(section.key)}" ${locked ? "aria-disabled=\"true\"" : ""}>
          <span class="tile-label">
            <span class="tile-line">${escapeHtml(section.label)}</span>
            <span class="tile-line tile-subline">${escapeHtml(section.subline)}</span>
          </span>
          ${locked ? "<small>尚未開放</small>" : ""}
        </button>
      `;
    }

    function renderDashboard() {
      const label = document.querySelector("[data-user-label]");
      if (label) label.textContent = `${currentUser?.name || "Student"} | ${isAdmin() ? "Admin mode" : "Student mode"}`;
      const welcome = document.querySelector("[data-welcome-message]");
      if (welcome) welcome.innerHTML = `Welcome back! <span>${escapeHtml(currentUser?.name || "Student")}</span>~`;
      const grid = document.querySelector("[data-writing-grid]");
      if (grid) grid.innerHTML = writingSections.map(tileHtml).join("");
    }

    function renderStudents() {
      const list = document.querySelector("[data-student-list]");
      if (!list) return;

      const students = getStudents();
      list.innerHTML = students.length
        ? students.map(student => `
          <div class="student-row">
            <span>${escapeHtml(student.name)}</span>
            <div class="student-row-actions">
              <button class="mini-button" type="button" data-select-student="${escapeHtml(student.name)}">Profile</button>
              <button class="mini-button danger" type="button" data-remove-student="${escapeHtml(student.name)}">Remove</button>
            </div>
          </div>
        `).join("")
        : `<p class="note-text">No student accounts yet.</p>`;
    }

    function renderStudentProfile() {
      const panel = document.querySelector("[data-student-profile]");
      if (!panel) return;

      const student = getSelectedStudent();
      if (!student) {
        panel.innerHTML = `
          <h2>Student Profile</h2>
          <p class="note-text">Choose a student account to manage access and password recovery.</p>
        `;
        return;
      }

      const logs = getPasswordLogs()
        .filter(log => log.studentName === student.name)
        .sort((a, b) => (b.changedAt || 0) - (a.changedAt || 0));

      panel.innerHTML = `
        <h2>${escapeHtml(student.name)}</h2>
        <div class="profile-facts">
          <div class="fact-row"><strong>Created</strong><span>${exactDateTime(student.createdAt)}</span></div>
          <div class="fact-row"><strong>Password</strong><span>${escapeHtml(student.password || "Protected - use Change Password to reset")}</span></div>
        </div>

        <form data-password-form="${escapeHtml(student.name)}">
          <div class="field">
            <label for="change-password">Change password</label>
            <div class="password-field">
              <input id="change-password" name="newPassword" type="password" required>
              <button class="secondary-button" type="button" data-toggle-password="#change-password">Open Eye</button>
            </div>
          </div>
          <div class="field">
            <button class="primary-button" type="submit">Change Password</button>
          </div>
        </form>

        <div>
          <h3>Access Control</h3>
          <div class="access-actions">
            <button class="secondary-button" type="button" data-set-all-access="true">全部開啟</button>
            <button class="secondary-button" type="button" data-set-all-access="false">全部取消</button>
          </div>
          <div class="access-grid">
            ${writingSections.map(section => `
              <label class="toggle-row">
                ${sectionToggleLabelHtml(section)}
                <input type="checkbox" data-toggle-access="${escapeHtml(section.key)}" ${student.access[section.key] !== false ? "checked" : ""}>
              </label>
            `).join("")}
          </div>
        </div>

        <div>
          <h3>Password Change Log</h3>
          <div class="password-log">
            ${logs.length ? logs.map(log => `
              <div class="log-row">
                <strong>${exactDateTime(log.changedAt)}</strong>
                <span>Changed by: ${escapeHtml(log.changedBy || ADMIN_NAME)}</span>
              </div>
            `).join("") : `<p class="note-text">No password changes yet.</p>`}
          </div>
        </div>
      `;
    }

    async function saveStudentAccessToSupabase(student) {
      if (!student || !adminPasswordForSession) return false;
      try {
        const rows = await callSupabaseRpc("writing_admin_set_student_access", {
          p_admin_name: ADMIN_NAME,
          p_admin_password: adminPasswordForSession,
          p_student_name: student.name,
          p_access: student.access
        });
        const updated = Array.isArray(rows) && rows[0] ? studentFromSupabase(rows[0]) : student;
        studentsCache = getStudents().map(item => item.name === updated.name ? updated : item);
        studentsLoadedFromSupabase = true;
        updateSupabaseStatus("Supabase: live", "live");
        return true;
      } catch (error) {
        console.warn("Could not save writing student access:", error);
        updateSupabaseStatus("Supabase: access save failed", "error");
        return false;
      }
    }

    async function setAllAccess(value) {
      const student = getSelectedStudent();
      if (!student) return;
      const students = getStudents();
      const target = students.find(item => item.name === student.name);
      if (!target) return;
      writingSections.forEach(section => {
        target.access[section.key] = value;
      });
      if (studentsLoadedFromSupabase) {
        const ok = await saveStudentAccessToSupabase(target);
        if (!ok) return;
      } else {
        saveStudents(students);
      }
      renderStudentProfile();
    }

    async function saveAccessChange(sectionKey, checked) {
      const student = getSelectedStudent();
      if (!student) return;
      const students = getStudents();
      const target = students.find(item => item.name === student.name);
      if (!target) return;
      target.access[sectionKey] = checked;
      if (studentsLoadedFromSupabase) {
        const ok = await saveStudentAccessToSupabase(target);
        if (!ok) return;
      } else {
        saveStudents(students);
      }
      renderStudentProfile();
    }

    function renderAdminSwitchModal() {
      const list = document.querySelector("[data-admin-switch-list]");
      if (!list) return;
      const students = getStudents();
      list.innerHTML = students.length
        ? students.map(student => `
          <div class="admin-switch-row">
            <span>${escapeHtml(student.name)}</span>
            <button type="button" data-admin-switch-student="${escapeHtml(student.name)}">進入</button>
          </div>
        `).join("")
        : `<p class="note-text">暫時未有學生帳戶。</p>`;
    }

    async function openAdminSwitchModal() {
      if (adminPasswordForSession) {
        try {
          await loadStudentsFromSupabase();
        } catch (error) {
          console.warn("Could not refresh writing students:", error);
        }
      }
      renderAdminSwitchModal();
      document.querySelector("[data-admin-switch-modal]")?.classList.remove("hidden");
    }

    function closeAdminSwitchModal() {
      document.querySelector("[data-admin-switch-modal]")?.classList.add("hidden");
    }

    async function switchAdminToStudent(studentName) {
      const student = getStudents().find(item => item.name === studentName);
      if (!student) return;
      studentSessionToken = "";
      currentUser = {
        id: student.id || "",
        name: student.name,
        role: "student",
        access: student.access || defaultAccess(),
        createdAt: student.createdAt || Date.now(),
        impersonatedByAdmin: true
      };
      setSession(currentUser);
      closeAdminSwitchModal();
      showAppPanel("dashboard");
    }

    function returnToAdminAccount() {
      if (!adminPasswordForSession) return;
      currentUser = {
        name: ADMIN_NAME,
        role: "admin",
        access: defaultAccess(),
        createdAt: Date.now()
      };
      studentSessionToken = "";
      selectedStudentName = "";
      closeAdminSwitchModal();
      setSession(currentUser);
      showAppPanel("admin-panel");
    }

    function setupCustomCursor() {
      const cursor = document.querySelector(".custom-cursor");
      if (!cursor || !window.matchMedia("(pointer: fine)").matches) return;

      window.addEventListener("mousemove", event => {
        cursor.style.left = `${event.clientX}px`;
        cursor.style.top = `${event.clientY}px`;
        cursor.style.opacity = "1";
      });

      window.addEventListener("mouseleave", () => {
        cursor.style.opacity = "0";
      });
    }

    function setupEvents() {
      document.querySelector("[data-login-form]")?.addEventListener("submit", async event => {
        event.preventDefault();
        const status = document.querySelector("[data-login-status]");
        const formData = new FormData(event.currentTarget);
        if (status) status.textContent = "Checking login...";
        const ok = await login(String(formData.get("username") || ""), String(formData.get("password") || ""));
        if (!ok && status) status.textContent = "Wrong user name or password.";
        if (ok && status) status.textContent = "";
      });

      document.querySelector("[data-student-form]")?.addEventListener("submit", async event => {
        event.preventDefault();
        const status = document.querySelector("[data-admin-status]");
        const formData = new FormData(event.currentTarget);
        const name = String(formData.get("studentName") || "").trim();
        const password = String(formData.get("studentPassword") || "").trim();
        if (!name || !password) return;

        if (status) status.textContent = "Saving to Supabase...";
        if (studentsLoadedFromSupabase) {
          try {
            await callSupabaseRpc("writing_admin_upsert_student", {
              p_admin_name: ADMIN_NAME,
              p_admin_password: adminPasswordForSession,
              p_student_name: name,
              p_student_password: password,
              p_access: defaultAccess()
            });
            await loadStudentsFromSupabase();
          } catch (error) {
            console.warn("Could not add writing student:", error);
            if (status) status.textContent = "Could not save this student to Supabase. Please run the writing SQL.";
            updateSupabaseStatus("Supabase: account save failed", "error");
            return;
          }
        } else {
          const students = getStudents().filter(student => student.name !== name);
          students.push({ name, password, createdAt: Date.now(), access: defaultAccess() });
          saveStudents(students);
        }
        selectedStudentName = name;
        event.currentTarget.reset();
        if (status) status.textContent = `Added ${name}.`;
        renderStudents();
        renderStudentProfile();
      });

      document.addEventListener("submit", async event => {
        const passwordForm = event.target.closest("[data-password-form]");
        if (!passwordForm) return;
        event.preventDefault();
        const studentName = passwordForm.getAttribute("data-password-form");
        const formData = new FormData(passwordForm);
        const newPassword = String(formData.get("newPassword") || "").trim();
        if (!newPassword) return;

        if (studentsLoadedFromSupabase) {
          try {
            const changed = await callSupabaseRpc("writing_admin_change_student_password", {
              p_admin_name: ADMIN_NAME,
              p_admin_password: adminPasswordForSession,
              p_student_name: studentName,
              p_new_password: newPassword
            });
            if (!changed) throw new Error("Supabase did not change the password.");
            await loadPasswordLogsFromSupabase(studentName);
            passwordForm.reset();
            renderStudentProfile();
            return;
          } catch (error) {
            console.warn("Could not change writing student password:", error);
            updateSupabaseStatus("Supabase: password save failed", "error");
            return;
          }
        }

        const students = getStudents();
        const target = students.find(student => student.name === studentName);
        if (!target) return;
        const oldPassword = target.password;
        target.password = newPassword;
        saveStudents(students);
        savePasswordLogs([
          ...getPasswordLogs(),
          { studentName, oldPassword, newPassword, changedAt: Date.now(), changedBy: ADMIN_NAME }
        ]);
        passwordForm.reset();
        renderStudentProfile();
      });

      document.addEventListener("submit", event => {
        const practiceForm = event.target.closest("[data-practice-form]");
        if (!practiceForm) return;
        event.preventDefault();
        submitPracticeRound();
      });

      document.addEventListener("click", async event => {
        const togglePassword = event.target.closest("[data-toggle-password]");
        if (togglePassword) {
          const input = document.querySelector(togglePassword.getAttribute("data-toggle-password"));
          if (input) input.type = input.type === "password" ? "text" : "password";
        }

        if (event.target.closest("[data-logout]")) {
          showLogin();
        }

        if (event.target.closest("[data-open-dashboard]")) {
          showAppPanel("dashboard");
        }

        const writingSectionButton = event.target.closest("[data-writing-section]");
        if (writingSectionButton) {
          const sectionKey = writingSectionButton.getAttribute("data-writing-section");
          if (writingSectionButton.getAttribute("aria-disabled") === "true" || !canAccess(sectionKey)) return;
          showExercise(sectionKey);
          return;
        }

        if (event.target.closest("[data-back-dashboard]")) {
          currentExerciseSectionKey = "";
          practiceState = null;
          showAppPanel("dashboard");
          return;
        }

        if (event.target.closest("[data-back-essay]")) {
          practiceState = null;
          currentEssayTab = "essay";
          renderExerciseView();
          return;
        }

        if (event.target.closest("[data-open-practice]")) {
          startPracticeSetup();
          return;
        }

        if (event.target.closest("[data-select-full-essay]")) {
          const exercise = currentExercise();
          if (exercise && practiceState) {
            practiceState.selectedParagraphs = allParagraphIndexes(exercise);
            renderExerciseView();
          }
          return;
        }

        if (event.target.closest("[data-toggle-paragraph-selector]")) {
          if (practiceState) {
            practiceState.selectorOpen = !practiceState.selectorOpen;
            renderExerciseView();
          }
          return;
        }

        const essayTabButton = event.target.closest("[data-essay-tab]");
        if (essayTabButton) {
          currentEssayTab = essayTabButton.getAttribute("data-essay-tab") || "essay";
          renderExerciseView();
          return;
        }

        const modeButton = event.target.closest("[data-start-practice-mode]");
        if (modeButton) {
          startPracticeMode(modeButton.getAttribute("data-start-practice-mode") || "blank");
          return;
        }

        if (event.target.closest("[data-back-practice-mode]")) {
          const exercise = currentExercise();
          if (exercise && practiceState) {
            practiceState = {
              ...defaultPracticeState(exercise),
              selectedParagraphs: normalizeSelectedParagraphs(exercise, practiceState.selectedParagraphs),
              selectorOpen: practiceState.selectorOpen
            };
            renderExerciseView();
          }
          return;
        }

        if (event.target.closest("[data-next-practice-round]")) {
          startNextPracticeRound();
          return;
        }

        if (event.target.closest("[data-restart-practice]")) {
          startPracticeSetup();
          return;
        }

        if (event.target.closest("[data-admin-panel-shortcut]")) {
          showAppPanel("admin-panel");
        }

        if (event.target.closest("[data-return-admin]")) {
          returnToAdminAccount();
        }

        if (event.target.closest("[data-admin-switch]")) {
          await openAdminSwitchModal();
        }

        if (event.target.closest("[data-close-admin-switch]")) {
          closeAdminSwitchModal();
        }

        if (event.target === document.querySelector("[data-admin-switch-modal]")) {
          closeAdminSwitchModal();
        }

        const adminSwitchStudentButton = event.target.closest("[data-admin-switch-student]");
        if (adminSwitchStudentButton) {
          await switchAdminToStudent(adminSwitchStudentButton.getAttribute("data-admin-switch-student"));
        }

        const selectButton = event.target.closest("[data-select-student]");
        if (selectButton) {
          selectedStudentName = selectButton.getAttribute("data-select-student");
          if (studentsLoadedFromSupabase) await loadPasswordLogsFromSupabase(selectedStudentName);
          renderStudentProfile();
        }

        const removeButton = event.target.closest("[data-remove-student]");
        if (removeButton) {
          const name = removeButton.getAttribute("data-remove-student");
          if (!window.confirm(`確定要移除學生帳戶「${name}」嗎？`)) return;
          if (studentsLoadedFromSupabase) {
            try {
              const deleted = await callSupabaseRpc("writing_admin_delete_student", {
                p_admin_name: ADMIN_NAME,
                p_admin_password: adminPasswordForSession,
                p_student_name: name
              });
              if (!deleted) throw new Error("Supabase did not delete the student.");
              await loadStudentsFromSupabase();
            } catch (error) {
              console.warn("Could not remove writing student:", error);
              updateSupabaseStatus("Supabase: delete failed", "error");
              return;
            }
          } else {
            saveStudents(getStudents().filter(student => student.name !== name));
          }
          if (selectedStudentName === name) selectedStudentName = "";
          renderStudents();
          renderStudentProfile();
        }

        const setAllButton = event.target.closest("[data-set-all-access]");
        if (setAllButton) {
          await setAllAccess(setAllButton.getAttribute("data-set-all-access") === "true");
        }
      });

      document.addEventListener("change", async event => {
        const accessToggle = event.target.closest("[data-toggle-access]");
        if (accessToggle) {
          await saveAccessChange(accessToggle.getAttribute("data-toggle-access"), accessToggle.checked);
        }

        const paragraphToggle = event.target.closest("[data-practice-paragraph]");
        if (paragraphToggle) {
          updatePracticeParagraph(Number(paragraphToggle.getAttribute("data-practice-paragraph")), paragraphToggle.checked);
        }
      });
    }

    async function init() {
      prepareWritingExercises();
      setupCustomCursor();
      setupEvents();
      const restored = restoreSession();
      await initSupabaseState();
      if (restored && currentUser) {
        showAppPanel(currentUser.role === "admin" ? "admin-panel" : "dashboard");
      } else {
        showLogin();
      }
    }

    init();
  </script>
</body>
</html>
