<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>Edmund 學生考試寫作練習系統</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, maximum-scale=5.0">

  <style>
    @font-face {
      font-family: "Noto Serif TC Local";
      src: url("fonts/NotoSerifTC-VariableFont_wght.ttf") format("truetype");
      font-weight: 200 900;
      font-style: normal;
      font-display: swap;
    }

    * { box-sizing: border-box; }

    :root {
      --ink: #172033;
      --muted: #627085;
      --blue: #2f80ed;
      --blue-dark: #1559a8;
      --panel: rgba(255,255,255,0.92);
      --panel-border: rgba(47,128,237,0.18);
      --locked: #263142;
      --green: #16a34a;
      --red: #dc2626;
      --orange: #f97316;
      --orange-dark: #c2410c;
      --shadow: rgba(17,43,85,0.14);
      --writing-bg-start: #a96f44;
      --writing-bg-end: #f2ecb6;
    }

    html { scroll-behavior: smooth; }
    html, body, a, button, input, textarea { cursor: none; }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        linear-gradient(135deg, rgba(255,255,255,0.56) 0%, rgba(255,255,255,0.34) 44%, rgba(255,255,255,0.18) 100%),
        linear-gradient(135deg, var(--writing-bg-start) 0%, #d1ad75 46%, var(--writing-bg-end) 100%);
      color: var(--ink);
      font-family: "Noto Serif TC Local", "Noto Serif TC", "Source Han Serif TC", "Songti TC", "PMingLiU", serif;
      font-weight: 760;
      overflow-x: hidden;
    }

    body.admin-background-active {
      background: url("assets/writing-practice/control-panel.jpg") center center / cover no-repeat fixed;
    }

    .custom-cursor {
      position: fixed;
      top: 0;
      left: 0;
      width: 42px;
      height: 42px;
      z-index: 9999;
      pointer-events: none;
      opacity: 0;
      transform: translate(-50%, -50%);
      transition: opacity 0.18s ease;
    }

    .flash-shell {
      width: min(1480px, calc(100vw - 40px));
      margin: 0 auto;
      padding: 28px 0 64px;
    }

    .topbar {
      position: relative;
      min-height: 76px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 28px;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: clamp(12px, 2vw, 28px);
      text-decoration: none;
    }

    .brand-main,
    .brand-learning {
      height: auto;
      display: block;
      object-fit: contain;
    }

    .brand-main {
      width: min(360px, 42vw);
    }

    .brand-learning {
      width: min(220px, 22vw);
      max-height: 78px;
    }

    .topbar-mascot {
      position: absolute;
      left: 50%;
      top: 50%;
      width: min(260px, 18vw);
      max-height: 150px;
      display: none;
      object-fit: contain;
      pointer-events: none;
      transform: translate(-50%, -50%);
      filter: drop-shadow(0 16px 24px rgba(17,43,85,0.16));
      z-index: 1;
    }

    body.app-active .topbar-mascot {
      display: block;
    }

    .nav-actions {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .sync-pill {
      min-height: 40px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(47,128,237,0.18);
      border-radius: 999px;
      padding: 0 14px;
      background: rgba(255,255,255,0.78);
      color: #2b425f;
      box-shadow: 0 10px 20px rgba(17,43,85,0.08);
      font-size: 13px;
      line-height: 1.2;
      font-weight: 900;
      white-space: nowrap;
    }

    .sync-pill.live {
      border-color: rgba(22,163,74,0.26);
      background: rgba(220,252,231,0.92);
      color: #166534;
    }

    .sync-pill.warning {
      border-color: rgba(245,158,11,0.30);
      background: rgba(255,251,235,0.94);
      color: #92400e;
    }

    .sync-pill.error {
      border-color: rgba(220,38,38,0.22);
      background: rgba(254,226,226,0.92);
      color: #991b1b;
    }

    .breadcrumbs {
      width: 100%;
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: nowrap;
      margin: -8px 0 -4px;
      padding: 12px 14px;
      overflow-x: auto;
      border: 1px solid rgba(47,128,237,0.14);
      border-radius: 18px;
      background: rgba(255,255,255,0.70);
      box-shadow: 0 14px 28px rgba(17,43,85,0.08);
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
    }

    .breadcrumbs::-webkit-scrollbar {
      display: none;
    }

    .crumb-button,
    .crumb-current,
    .crumb-separator {
      flex: 0 0 auto;
    }

    .crumb-button {
      min-height: 34px;
      border: 0;
      border-radius: 999px;
      padding: 0 12px;
      background: rgba(219,234,254,0.86);
      color: #1559a8;
      font: inherit;
      font-size: 13px;
      line-height: 1.2;
      font-weight: 900;
      transition: transform 0.16s ease, background 0.16s ease, color 0.16s ease;
    }

    .crumb-button:hover,
    .crumb-button:focus-visible {
      transform: translateY(-1px);
      background: #2f80ed;
      color: #fff;
    }

    .crumb-current {
      min-height: 34px;
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 0 12px;
      background: #0e2d55;
      color: #fff;
      font-size: 13px;
      line-height: 1.2;
      font-weight: 900;
    }

    .crumb-separator {
      color: #5b6678;
      font-size: 14px;
      font-weight: 900;
    }

    .hero {
      position: relative;
      display: grid;
      grid-template-columns: minmax(0, 1.02fr) minmax(360px, 0.50fr);
      gap: clamp(36px, 6vw, 96px);
      align-items: center;
      min-height: calc(100vh - 150px);
    }

    .hero-learning-logo {
      width: min(360px, 62vw);
      height: auto;
      display: block;
      margin: 0 0 26px;
      transform: rotate(-20deg);
      transform-origin: 42% 52%;
      filter: drop-shadow(0 18px 24px rgba(17,43,85,0.16));
    }

    .hero-mascot {
      position: absolute;
      left: 45%;
      top: 8%;
      width: min(460px, 28vw);
      max-height: 450px;
      object-fit: contain;
      pointer-events: none;
      transform: translateX(-50%);
      filter: drop-shadow(0 24px 34px rgba(17,43,85,0.18));
      z-index: 1;
    }

    .hero-copy h1 {
      margin: 0;
      color: #0e2d55;
      font-size: clamp(42px, 6vw, 86px);
      line-height: 0.98;
      font-weight: 900;
      letter-spacing: 0;
    }

    .hero-copy p,
    .section-head p,
    .note-text {
      color: var(--muted);
      line-height: 1.45;
      font-weight: 820;
    }

    .hero-copy p {
      max-width: none;
      margin: 22px 0 0;
      font-size: clamp(18px, 1.4vw, 24px);
      white-space: nowrap;
    }

    .login-card,
    .panel-card {
      border: 1px solid var(--panel-border);
      border-radius: 28px;
      background: var(--panel);
      box-shadow:
        inset 0 2px 0 rgba(255,255,255,0.82),
        0 28px 52px var(--shadow);
      backdrop-filter: blur(12px);
    }

    .login-card {
      position: relative;
      z-index: 2;
      padding: 38px;
    }

    .panel-card {
      padding: clamp(22px, 3vw, 36px);
    }

    .app-view.admin-page-bg {
      position: relative;
      min-height: calc(100vh - 138px);
      padding: clamp(18px, 2.2vw, 32px);
      border-radius: 0;
      overflow: visible;
    }

    .app-view.admin-page-bg .admin-control-card {
      border: 0;
      background: transparent;
      box-shadow: none;
      backdrop-filter: none;
    }

    h2,
    .login-card h2,
    .panel-card h2 {
      margin: 0 0 18px;
      color: #0e2d55;
      font-size: clamp(28px, 2.6vw, 42px);
      line-height: 1.1;
      font-weight: 900;
    }

    h3 {
      margin: 0 0 10px;
      color: #0e2d55;
      font-size: 22px;
      line-height: 1.12;
      font-weight: 900;
    }

    .field {
      display: grid;
      gap: 8px;
      margin-top: 16px;
    }

    label {
      color: #1c3f6e;
      font-size: 14px;
      line-height: 1.2;
      font-weight: 900;
    }

    input {
      width: 100%;
      min-height: 52px;
      border: 1px solid rgba(47,128,237,0.22);
      border-radius: 16px;
      padding: 0 16px;
      background: rgba(255,255,255,0.94);
      color: var(--ink);
      font: inherit;
      font-weight: 820;
      outline: 0;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.84);
    }

    .password-field {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      align-items: center;
    }

    .password-field input {
      min-width: 0;
    }

    .form-row {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .pill-button,
    .primary-button,
    .secondary-button {
      min-height: 48px;
      border-radius: 999px;
      padding: 0 18px;
      font: inherit;
      font-weight: 900;
      transition: transform 0.16s ease, box-shadow 0.16s ease, background 0.16s ease;
    }

    .pill-button,
    .secondary-button {
      border: 1px solid rgba(47,128,237,0.24);
      background: rgba(255,255,255,0.92);
      color: var(--blue-dark);
      box-shadow: 0 12px 26px rgba(47,128,237,0.12);
    }

    .primary-button {
      border: 0;
      background: linear-gradient(135deg, #3b82f6, #1559a8);
      color: #fff;
      box-shadow: 0 8px 0 #0f4583, 0 22px 34px rgba(47,128,237,0.28);
    }

    .pill-button:hover,
    .primary-button:hover,
    .secondary-button:hover {
      transform: translateY(-2px);
    }

    .primary-button:active,
    .secondary-button:active,
    .pill-button:active {
      transform: translateY(3px);
    }

    .pill-button.danger,
    .mini-button.danger {
      border-color: rgba(220,38,38,0.22);
      color: #b91c1c;
    }

    .status {
      min-height: 24px;
      margin: 16px 0 0;
      color: #b42318;
      font-size: 14px;
      line-height: 1.35;
      font-weight: 900;
    }

    .app-view {
      display: grid;
      gap: 26px;
    }

    .section-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 18px;
      flex-wrap: wrap;
      margin-bottom: 22px;
    }

    .section-head p {
      margin: 8px 0 0;
      font-size: 16px;
    }

    .welcome-message {
      align-self: center;
      margin-left: auto;
      padding: 12px 18px;
      border: 1px solid rgba(5,150,105,0.18);
      border-radius: 999px;
      background: rgba(240,253,244,0.82);
      color: #0e2d55;
      font-size: clamp(17px, 1.5vw, 23px);
      line-height: 1.2;
      font-weight: 900;
      box-shadow: 0 14px 26px rgba(5,150,105,0.10);
    }

    .welcome-message span {
      color: #059669;
    }

    .admin-grid {
      display: grid;
      grid-template-columns: minmax(320px, 0.7fr) minmax(0, 1.3fr);
      gap: 18px;
    }

    .student-list {
      display: grid;
      gap: 10px;
      margin-top: 14px;
    }

    .student-row {
      min-height: 68px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 14px 12px 18px;
      border: 1px solid rgba(47,128,237,0.16);
      border-radius: 16px;
      background: rgba(255,255,255,0.74);
      color: #173153;
      font-weight: 900;
    }

    .student-row-actions,
    .access-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .mini-button {
      min-height: 46px;
      border: 0;
      border-radius: 999px;
      padding: 0 18px;
      background: #dbeafe;
      color: #1559a8;
      font: inherit;
      font-size: 15px;
      line-height: 1;
      font-weight: 900;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.78), 0 6px 0 #bfdbfe;
    }

    .mini-button.danger {
      background: #fee2e2;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.78), 0 6px 0 #fecaca;
    }

    .profile-card {
      display: grid;
      gap: 18px;
      padding: 18px;
      border-radius: 22px;
      background: rgba(255,255,255,0.70);
      border: 1px solid rgba(47,128,237,0.16);
    }

    .profile-facts,
    .password-log {
      display: grid;
      gap: 10px;
    }

    .fact-row,
    .log-row {
      display: grid;
      grid-template-columns: minmax(120px, 0.35fr) minmax(0, 1fr);
      gap: 12px;
      padding: 10px 12px;
      border-radius: 14px;
      background: rgba(255,255,255,0.78);
      border: 1px solid rgba(47,128,237,0.12);
      font-size: 14px;
      line-height: 1.35;
    }

    .access-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      margin-top: 12px;
    }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      min-height: 48px;
      padding: 10px 12px;
      border-radius: 14px;
      border: 1px solid rgba(47,128,237,0.14);
      background: rgba(255,255,255,0.78);
      color: #173153;
      font-size: 14px;
      font-weight: 900;
    }

    .toggle-row input {
      width: 22px;
      min-height: 22px;
      accent-color: var(--blue);
    }

    .admin-control-card {
      position: relative;
      overflow: hidden;
    }

    .admin-control-card > :not(.admin-bg) {
      position: relative;
      z-index: 1;
    }

    .admin-bg {
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: 0.18;
      background-size: cover;
      background-position: center;
    }

    .admin-bg-left {
      clip-path: polygon(0 0, 50% 0, 44% 100%, 0 100%);
      background-image: url("assets/flashcards/admin-control-left.jpg");
    }

    .admin-bg-right {
      clip-path: polygon(56% 0, 100% 0, 100% 100%, 50% 100%);
      background-image: url("assets/flashcards/admin-control-right.jpg");
    }

    .enter-student-view-button {
      min-width: min(270px, 100%);
      min-height: 120px;
      border: 0;
      border-radius: 26px;
      overflow: hidden;
      background: url("assets/flashcards/enter-student-view.jpg") center / cover no-repeat;
      color: #fff;
      font: inherit;
      font-size: clamp(22px, 2.2vw, 34px);
      font-weight: 900;
      text-shadow: 0 2px 10px rgba(0,0,0,0.42);
      box-shadow: 0 18px 36px rgba(17,43,85,0.18);
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }

    .enter-student-view-button:hover {
      transform: translateY(-3px);
      box-shadow: 0 24px 44px rgba(17,43,85,0.24);
    }

    .admin-switch-modal {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: grid;
      place-items: center;
      padding: 24px;
      background: rgba(15,23,42,0.38);
    }

    .admin-switch-card {
      width: min(620px, 100%);
      max-height: min(760px, calc(100vh - 48px));
      overflow: auto;
      border: 1px solid rgba(47,128,237,0.22);
      border-radius: 28px;
      padding: 24px;
      background: rgba(255,255,255,0.96);
      box-shadow: 0 28px 62px rgba(17,43,85,0.26);
    }

    .admin-switch-head {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      align-items: center;
      margin-bottom: 12px;
    }

    .admin-switch-list {
      display: grid;
      gap: 10px;
      margin-top: 14px;
    }

    .admin-switch-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 14px;
      border: 1px solid rgba(47,128,237,0.14);
      border-radius: 16px;
      background: rgba(239,246,255,0.82);
      color: #0e2d55;
      font-weight: 900;
    }

    .admin-switch-row button {
      min-height: 40px;
      border: 0;
      border-radius: 999px;
      padding: 0 16px;
      background: #2f80ed;
      color: #fff;
      font: inherit;
      font-size: 14px;
      font-weight: 900;
    }

    .dashboard-title-row {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .writing-search-area {
      max-width: 900px;
      margin: 0 0 24px;
    }

    .writing-dashboard-search {
      display: grid;
      gap: 8px;
    }

    .writing-dashboard-search input {
      min-height: 52px;
    }

    .writing-search-results {
      display: grid;
      gap: 7px;
      margin-top: 10px;
    }

    .writing-search-result-wrap {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 54px;
      gap: 9px;
      align-items: stretch;
    }

    .writing-search-section-label {
      margin-top: 5px;
      color: #1559a8;
      font-size: 12px;
      font-weight: 900;
      letter-spacing: 0.08em;
    }

    .writing-search-result {
      width: 100%;
      min-height: 65px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      border: 1px solid rgba(47,128,237,0.16);
      border-radius: 16px;
      padding: 12px 15px;
      color: var(--ink);
      text-align: left;
      background: rgba(255,255,255,0.86);
      font: inherit;
      cursor: pointer;
      box-shadow: 0 9px 20px rgba(17,43,85,0.06);
    }

    .writing-search-result > span {
      display: grid;
      min-width: 0;
    }

    .writing-search-result strong {
      color: var(--blue-dark);
    }

    .writing-search-result small,
    .writing-search-empty {
      color: var(--muted);
      font-size: 12px;
    }

    .writing-search-result em {
      flex: 0 0 auto;
      color: #047857;
      font-size: 12px;
      font-style: normal;
      font-weight: 900;
    }

    .writing-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
      align-items: stretch;
    }

    .tile {
      min-height: 150px;
      border: 0;
      border-radius: 18px;
      padding: 18px;
      display: grid;
      align-content: end;
      gap: 8px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.28) 0%, rgba(255,255,255,0.06) 36%, rgba(255,255,255,0) 37%),
        linear-gradient(180deg, #3f91f7 0%, #2f80ed 55%, #2472d8 100%);
      color: #fff;
      font: inherit;
      font-size: clamp(22px, 2vw, 34px);
      line-height: 1.05;
      font-weight: 900;
      text-align: left;
      box-shadow:
        inset 0 2px 0 rgba(255,255,255,0.30),
        inset 0 -10px 18px rgba(21,89,168,0.13),
        0 8px 0 #1559a8,
        0 20px 30px rgba(47,128,237,0.18);
      transition: transform 0.16s ease, box-shadow 0.16s ease, background 0.16s ease, opacity 0.16s ease;
    }

    .tile small {
      display: block;
      color: rgba(255,255,255,0.82);
      font-size: 12px;
      line-height: 1.35;
      font-weight: 850;
    }

    .tile.locked {
      background: var(--locked);
      color: #cbd5e1;
      box-shadow:
        inset 0 2px 0 rgba(255,255,255,0.08),
        0 8px 0 #111827,
        0 18px 28px rgba(17,24,39,0.20);
    }

    .tile:not(.locked):hover {
      transform: translateY(-2px);
      box-shadow:
        inset 0 2px 0 rgba(255,255,255,0.25),
        0 10px 0 #1559a8,
        0 26px 36px rgba(47,128,237,0.24);
    }

    .tile.emerald-tile:not(.locked) {
      background:
        linear-gradient(180deg, rgba(255,255,255,0.28) 0%, rgba(255,255,255,0.06) 36%, rgba(255,255,255,0) 37%),
        linear-gradient(180deg, #10b981 0%, #059669 58%, #047857 100%);
      box-shadow:
        inset 0 2px 0 rgba(255,255,255,0.28),
        inset 0 -10px 18px rgba(4,120,87,0.14),
        0 8px 0 #047857,
        0 20px 30px rgba(5,150,105,0.20);
    }

    .tile.orange-tile:not(.locked) {
      background:
        linear-gradient(180deg, rgba(255,255,255,0.30) 0%, rgba(255,255,255,0.08) 36%, rgba(255,255,255,0) 37%),
        linear-gradient(180deg, #fb923c 0%, #f97316 58%, #ea580c 100%);
      box-shadow:
        inset 0 2px 0 rgba(255,255,255,0.30),
        inset 0 -10px 18px rgba(194,65,12,0.16),
        0 8px 0 #c2410c,
        0 20px 30px rgba(249,115,22,0.20);
    }

    .tile.red-tile:not(.locked) {
      background:
        linear-gradient(180deg, rgba(255,255,255,0.32) 0%, rgba(255,255,255,0.08) 36%, rgba(255,255,255,0) 37%),

urn = 幫助他們回到\nExcerpt: help them return to work\n（幫助他們回到。）\nStudent example: Proper breaks help students return to study with more focus.\n（適當休息幫助學生帶著更多專注力回到學習。）\n\nreturn to work with = 帶著……回到工作\nExcerpt: return to work with sharper concentration\n（帶著……回到工作。）\nStudent example: After a holiday, workers may return to work with fresh energy.\n（假期後，員工可能帶著新的精力回到工作。）\n\nmanage routines = 管理日常安排\nExcerpt: manage their own routines\n（管理日常安排。）\nStudent example: Successful students manage their routines carefully.\n（成功的學生會小心管理自己的日常安排。）\n\nmay mean setting = 可能意味著設定\nExcerpt: may mean setting fixed times\n（可能意味著設定。）\nStudent example: Better health may mean sleeping earlier.\n（更好的健康可能意味著更早睡覺。）\n\nsetting fixed times = 設定固定時間\nExcerpt: setting fixed times\n（設定固定時間。）\nStudent example: Setting fixed times for revision can reduce exam stress.\n（設定固定溫習時間可以減少考試壓力。）\n\ntreating commitments seriously = 認真對待承諾\nExcerpt: treating these commitments seriously\n（認真對待承諾。）\nStudent example: Treating exercise seriously can improve long-term health.\n（認真對待運動可以改善長期健康。）\n\nbe sacrificed = 被犧牲\nExcerpt: personal life becomes the first thing to be sacrificed\n（被犧牲。）\nStudent example: When students are too busy, sleep is often sacrificed.\n（當學生太忙時，睡眠往往被犧牲。）\n\ncan be overcome = 可以被克服\nExcerpt: It can be overcome when organisations create more humane working conditions.\n（可以被克服。）\nStudent example: Communication problems can be overcome through patience.\n（溝通問題可以透過耐心克服。）\n\ncreate humane working conditions = 創造人性化工作條件\nExcerpt: create more humane working conditions\n（創造人性化工作條件。）\nStudent example: Good leaders create humane working conditions for their teams.\n（好的領導者為團隊創造人性化工作條件。）\n\ndraw a clearer line = 劃出更清晰的界線\nExcerpt: Individuals draw a clearer line between their jobs and the rest of their lives.\n（劃出更清晰的界線。）\nStudent example: Students should draw a clearer line between study time and leisure time.\n（學生應該在學習時間和休閒時間之間劃出更清晰的界線。）"

arper = 更敏銳的；更清晰的\nExample: Good rest allows workers to return with sharper concentration.\n（良好的休息讓員工帶著更敏銳的專注力回到工作。）\n\nbetter = 更好的\nExample: Better judgement often comes from a well-rested mind.\n（更好的判斷力通常來自休息充足的大腦。）\n\nfixed = 固定的\nExample: Fixed times for meals and sleep can protect family life.\n（固定的用餐和睡眠時間可以保護家庭生活。）\n\npoor = 差劣的\nExample: Poor work-life balance is a serious social problem.\n（差劣的工作與生活平衡是一個嚴重的社會問題。）\n\nhumane = 人性化的\nExample: Humane working conditions support both productivity and wellbeing.\n（人性化的工作條件同時支持生產力和身心健康。）\n\nAdverbs 副詞\n\nusually = 通常\nExample: This problem is usually caused by unrealistic workplace expectations.\n（這個問題通常由不切實際的職場期望造成。）\n\nconstantly = 持續地；不斷地\nExample: Many employees are expected to be constantly available.\n（許多員工被期望持續候命。）\n\nphysically = 身體上\nExample: A person may be physically with their family.\n（一個人可能身體上和家人在一起。）\n\nmentally = 精神上；心理上\nExample: The same person may be mentally still at their desk.\n（同一個人精神上可能仍然停留在辦公桌前。）\n\nstill = 仍然\nExample: Even at home, some workers are still thinking about deadlines.\n（即使在家中，一些員工仍然在想截止日期。）\n\noften = 經常；往往\nExample: People often accept overtime because of financial pressure.\n（人們往往因財政壓力而接受加班。）\n\nless = 較少；較不\nExample: Tired workers may perform less efficiently.\n（疲倦的員工可能工作效率較低。）\n\nmore = 更多；更\nExample: They may need more time to finish tasks.\n（他們可能需要更多時間完成任務。）\n\neven = 甚至；更加\nExample: They may lose even more of their personal lives.\n（他們甚至可能失去更多個人生活。）\n\nsimply = 僅僅；只是\nExample: These measures do not simply make employees happier.\n（這些措施不僅僅令員工更快樂。）\n\ndeliberately = 有意識地；刻意地\nExample: Individuals need to protect their time deliberately.\n（個人需要有意識地保護自己的時間。）\n\nfirmly = 堅定地\nExample: Workers should manage their routines more firmly.\n（員工應該更堅定地管理自己的日常安排。）\n\nseriously = 認真地\nExample: Family and sleep commitments should be treated seriously.\n（家庭和睡眠安排應該被認真對待。）\n\nmainly = 主要地\nExample: Poor work-life balance is mainly the result of constant connectivity.\n（差劣的工作與生活平衡主要是持續連接造成的結果。）"

                  "title": "Grammar and Sentence Structures",

                  "tone": "blue",
                  "text": "V1 = base verb 原形動詞 e.g. protect, set, give\nV2 = past tense 過去式 e.g. expanded, caused, weakened\nV3 = past participle 過去分詞 e.g. caused, reduced, sacrificed\nV-ing = -ing form 動名詞 / 現在分詞 e.g. working, setting, treating\nGrammar involved 概覽\n\n1. In many + plural noun\n在許多……\nIn the essay: In many modern societies\n（在許多現代社會中。）\nExample: In many modern societies, work has expanded beyond the office.\n（在許多現代社會中，工作已經擴展到辦公室之外。）\n\n2. Present perfect: has + V3\nIn the essay: 現在完成式：has + 過去分詞 work has expanded\n（工作已經擴展。）\nExample: Work has expanded beyond the office.\n（工作已經擴展到辦公室之外。）\n用途：\nUsed to show a change that began in the past and continues to affect the present.\n（用來表示一個從過去開始、現在仍有影響的變化。）\n\n3. beyond + noun\nIn the essay: 超出…… beyond the office\n（超出辦公室。）\nExample: Work has expanded beyond the office.\n（工作已經擴展到辦公室之外。）\n\n4. begin to + V1\nIn the essay: 開始做某事 begun to crowd out\n（開始擠走。）\nExample: Work has begun to crowd out family, rest and personal growth.\n（工作已經開始擠走家庭、休息和個人成長。）\n\n5. crowd out + noun\nIn the essay: 擠走…… crowd out family, rest and personal growth\n（擠走家庭、休息和個人成長。）\nExample: Excessive work can crowd out personal time.\n（過度工作可以擠走個人時間。）\n\n6. be caused by + noun phrase\nIn the essay: 由……造成 is usually caused by unrealistic workplace expectations\n（通常由不切實際的職場期望造成。）\nExample: This problem is usually caused by unrealistic workplace expectations.\n（這個問題通常由不切實際的職場期望造成。）\n\n7. be reduced if + clause\n如果……可以被減少\nIn the essay: It can be reduced if employers design healthier systems\n（如果僱主設計更健康的制度，它可以被減少。）\nExample: This problem can be reduced if employers design healthier systems.\n（如果僱主設計更健康的制度，這個問題可以被減少。）\n\n8. if + present simple, modal verb + V1\nIn the essay: 條件句：如果……就可以…… if employers design healthier systems, the problem can be reduced\n（如果僱主設計更健康制度，問題可以被減少。）\nExample: If individuals protect their time, they can improve their work-life balance.\n（如果個人保護自己的時間，他們可以改善工作與生活平衡。）\n\n9. learn to + V1\nIn the essay: 學會做某事 learn to protect their time\n（學會保護自己的時間。）\nExample: Individuals need to learn to protect their time deliberately.\n（個人需要學會有意識地保護自己的時間。）\n\n10. One major reason is that + clause\n一個主要原因是……\nIn the essay: One major reason is that many employees are expected to be constantly available.\n（一個主要原因是許多員工被期望隨時候命。）\n用途：\nUseful for introducing the first cause in a problem-solution essay.\n（適合在問題解決型文章中引入第一個原因。）\n\n11. be expected to + V1\nIn the essay: 被期望做某事 are expected to be constantly available\n（被期望隨時候命。）\nExample: Many employees are expected to be constantly available.\n（許多員工被期望隨時候命。）\n\n12. allow + object + to + V1\nIn the essay: 允許某物 / 某人做某事 allow work to follow people home\n（讓工作跟著人回家。）\nExample: Emails and messaging apps allow work to follow people home.\n（電郵和通訊應用程式讓工作跟著人回家。）\n\n13. no longer + verb\nIn the essay: 不再…… no longer feels like a real end\n（不再感覺像真正的結束。）\nExample: The end of the working day no longer feels like a real end.\n（工作日的結束不再感覺像真正的結束。）\n\n14. As a result, + clause\n因此，……\nIn the essay: As a result, a person may be physically with their family...\n（因此，一個人可能身體和家人在一起……）\nExample: As a result, employees may find it difficult to rest.\n（因此，員工可能發現自己難以休息。）\n\n15. may + V1\nIn the essay: 可能…… may be physically with their family\n（可能身體和家人在一起。）\nExample: A person may be physically with their family but mentally still at their desk.\n（一個人可能身體和家人在一起，但精神仍在辦公桌前。）\n\n16. physically... but mentally...\nIn the essay: 身體上……但精神上…… physically with their family but mentally still at their desk\n（身體和家人在一起，但精神仍在辦公桌前。）\nExample: A worker may be physically at home but mentally still in the office.\n（一名員工可能身體在家中，但精神仍在辦公室。）\n\n17. Another cause is + noun phrase\n另一個原因是……\nIn the essay: Another cause is financial pressure.\n（另一個原因是財政壓力。）\n用途：\nUseful for introducing the second cause clearly.\n（適合清楚引入第二個原因。）\n\n18. When + clause, main clause\n當……時，……\nIn the essay: When housing, childcare and daily expenses are high, people often accept overtime.\n（當住房、育兒和日常開支高昂時，人們往往接受加班。）\n\n19. often + V1\nIn the essay: 往往 / 經常做某事 people often accept overtime\n（人們往往接受加班。）\nExample: People often accept heavier workloads under financial pressure.\n（人們在財政壓力下往往接受更重的工作量。）\n\n20. even when + clause\nIn the essay: 即使當…… even when these choices damage their health\n（即使這些選擇損害他們的健康。）\nExample: Some workers continue to work late even when they are exhausted.\n（一些員工即使筋疲力盡，仍然繼續工作到很晚。）\n\n21. Over time, + clause\n隨著時間過去，……\nIn the essay: Over time, this creates a cycle.\n（隨著時間過去，這形成一個循環。）\n用途：\nUsed to show a gradual long-term effect.\n（用來表示逐漸形成的長期影響。）\n\n22. a cycle in which + clause\nIn the essay: 一個……的循環 a cycle in which tired workers perform less efficiently\n（一個疲倦員工效率較低的循環。）\nExample: This creates a cycle in which tired workers need more time to finish tasks.\n（這形成一個循環，在這個循環中，疲倦的員工需要更多時間完成任務。）\n\n23. less + adverb\nIn the essay: 較不…… perform less efficiently\n（效率較低地工作。）\nExample: Tired workers perform less efficiently.\n（疲倦的員工工作效率較低。）\n\n24. need more time to + V1\nIn the essay: 需要更多時間做某事 need more time to finish tasks\n（需要更多時間完成任務。）\nExample: Exhausted employees need more time to finish tasks.\n（疲憊的員工需要更多時間完成任務。）\n\n25. The most effective solution is for + noun + to + V1\n最有效的解決方法是讓……做某事\nIn the essay: The most effective solution is for employers to set clearer limits on work.\n（最有效的解決方法是讓僱主為工作設定更清晰的限制。）\n用途：\nUseful for introducing a main solution in an IELTS essay.\n（適合在 IELTS 文章中引入主要解決方法。）\n\n26. set limits on + noun\nIn the essay: 為……設定限制 set clearer limits on work\n（為工作設定更清晰的限制。）\nExample: Companies should set limits on after-hours communication.\n（公司應該為下班後通訊設定限制。）\n\n27. For instance, + clause\n例如，……\nIn the essay: For instance, companies can discourage non-urgent messages after office hours.\n（例如，公司可以不鼓勵辦公時間後發送非緊急訊息。）\n\n28. can + V1\nIn the essay: 可以…… companies can discourage non-urgent messages\n（公司可以不鼓勵非緊急訊息。）\nExample: Employers can monitor excessive overtime.\n（僱主可以監察過度加班。）\n\n29. discourage + noun\nIn the essay: 不鼓勵…… discourage non-urgent messages\n（不鼓勵非緊急訊息。 ng these commitments as seriously as meetings with clients\n（像對待客戶會議一樣認真對待這些承諾。）\nExample: People should treat family time as seriously as professional duties.\n（人們應該像對待職業責任一樣認真對待家庭時間。）\n\n40. as + adverb + as\nIn the essay: 像……一樣…… as seriously as meetings with clients\n（像客戶會議一樣認真。）\nExample: Sleep should be protected as seriously as work deadlines.\n（睡眠應該像工作截止日期一樣被認真保護。）\n\n41. Without + noun, clause\n沒有……，……\nIn the essay: Without such boundaries, personal life becomes the first thing to be sacrificed.\n（沒有這樣的界線，個人生活就成為第一個被犧牲的東西。）\n\n42. become + noun phrase\nIn the essay: 變成…… personal life becomes the first thing to be sacrificed\n（個人生活變成第一個被犧牲的東西。）\nExample: Without limits, rest becomes the first thing to disappear.\n（沒有界線，休息就會成為第一個消失的東西。）\n\n43. to be + V3\nIn the essay: 被…… to be sacrificed\n（被犧牲。）\nExample: Personal time should not be the first thing to be sacrificed.\n（個人時間不應成為第一個被犧牲的東西。）\n\n44. In conclusion, + clause\n總而言之，……\nIn the essay: In conclusion, poor work-life balance is mainly the result of constant connectivity...\n（總而言之，差劣的工作與生活平衡主要是持續連接的結果……）\n\n45. mainly the result of + noun phrase\nIn the essay: 主要是……的結果 mainly the result of constant connectivity, high workplace demands and financial pressure\n（主要是持續連接、高工作要求和財政壓力的結果。）\n\n46. can be overcome when + clause\nIn the essay: 當……時可以被克服 it can be overcome when organisations create more humane working conditions\n（當組織創造更人性化的工作條件時，它可以被克服。）\n\n47. create + noun phrase\nIn the essay: 創造 / 建立 / 造成…… create more humane working conditions\n（創造更人性化的工作條件。）\nExample: Employers should create healthier working conditions.\n（僱主應該創造更健康的工作條件。）\n\n48. draw a line between A and B\nIn the essay: 在 A 和 B 之間劃出界線 draw a clearer line between their jobs and the rest of their lives\n（在工作和生活其他部分之間劃出更清晰的界線。）\nExample: Workers need to draw a clear line between work and home.\n（員工需要在工作和家庭之間劃出清晰界線。）"

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function exactDateTime(value) {
      if (!value) return "未曾";
      return new Date(value).toLocaleString("en-HK", {
        year: "numeric",
        month: "short",
        day: "numeric",
        hour: "2-digit",
        minute: "2-digit"
      });
    }

        password: String(student.password || "已保護 - 請使用更改密碼重設"),
        createdAt: student.createdAt || Date.now(),
        access: { ...defaultAccess(), ...(student.access || {}) }
      };

    function readJson(key, fallback) {
      try {
        return JSON.parse(localStorage.getItem(key) || JSON.stringify(fallback));
      } catch {
        return fallback;
      }
    }

    function writeJson(key, value) {
      localStorage.setItem(key, JSON.stringify(value));
    }

    function writingStateAccountKey(user = currentUser) {
      if (!user?.name || user.role !== "student") return "";
      if (user.id) return `id:${String(user.id)}`;
      return `name:${String(user.name).normalize("NFKC").trim().toLowerCase()}`;
    }

    function writingLocalStateRoot() {
      const stored = readJson(WRITING_STATE_KEY, {});
      return {
        version: 1,
        accounts: stored?.accounts && typeof stored.accounts === "object" ? stored.accounts : {}
      };
    }

    function getWritingLocalAccountState(accountKey = writingStateAccountKey()) {
      const account = writingLocalStateRoot().accounts?.[accountKey] || {};
      return {
        bookmarks: Array.isArray(account.bookmarks) ? account.bookmarks : [],
        paragraphMastery: account.paragraphMastery && typeof account.paragraphMastery === "object"
          ? account.paragraphMastery
          : {},
        pendingBookmarks: Boolean(account.pendingBookmarks),
        pendingMastery: Boolean(account.pendingMastery)
      };
    }

    function saveWritingLocalAccountState(accountKey, accountState) {
      if (!accountKey) return;
      const root = writingLocalStateRoot();
      root.accounts[accountKey] = {
        bookmarks: accountState.bookmarks || [],
        paragraphMastery: accountState.paragraphMastery || {},
        pendingBookmarks: Boolean(accountState.pendingBookmarks),
        pendingMastery: Boolean(accountState.pendingMastery)
      };
      writeJson(WRITING_STATE_KEY, root);
    }

    function normalizeWritingBookmarks(value) {
      const raw = Array.isArray(value) ? value : value?.exerciseIds;
      if (!Array.isArray(raw)) return [];
      return [...new Set(raw.map(id => String(id || "").trim()).filter(id => id && exerciseById(id)))]
        .slice(0, MAX_WRITING_BOOKMARKS);
    }

    function normalizeWritingParagraphMastery(value) {
      const raw = value?.exercises && typeof value.exercises === "object" ? value.exercises : value;
      if (!raw || typeof raw !== "object" || Array.isArray(raw)) return {};
      const normalized = {};
      Object.entries(raw).forEach(([exerciseId, indexes]) => {
        const exercise = exerciseById(exerciseId);
        if (!exercise || !Array.isArray(indexes)) return;
        const valid = [...new Set(indexes.map(Number).filter(index => Number.isInteger(index) && index >= 0 && index < exercise.paragraphs.length))]
          .sort((a, b) => a - b);
        if (valid.length) normalized[exerciseId] = valid;
      });
      return normalized;
    }

    function mergeWritingParagraphMastery(...maps) {
      const merged = {};
      maps.forEach(map => {
        Object.entries(normalizeWritingParagraphMastery(map)).forEach(([exerciseId, indexes]) => {
          merged[exerciseId] = [...new Set([...(merged[exerciseId] || []), ...indexes])].sort((a, b) => a - b);
        });
      });
      return merged;
    }

    function writingStateContext() {
      const accountKey = writingStateAccountKey();
      if (!accountKey) return null;
      if (currentUser?.impersonatedByAdmin && adminPasswordForSession) {
        return {
          type: "admin",
          accountKey,
          studentName: currentUser.name,
          adminPassword: adminPasswordForSession
        };
      }
      const token = studentSessionToken || currentUser?.sessionToken || "";
      if (currentUser?.role === "student" && token) {
        return { type: "student", accountKey, token };
      }
      return null;
    }

    async function fetchWritingStudentState(context) {
      if (context.type === "admin") {
        return callSupabaseRpc("writing_admin_get_student_state", {
          p_admin_name: ADMIN_NAME,
          p_admin_password: context.adminPassword,
          p_student_name: context.studentName
        });
      }
      return callSupabaseRpc("writing_student_get_state", { p_token: context.token });
    }

    async function upsertWritingStudentState(context, key, value) {
      if (context.type === "admin") {
        return callSupabaseRpc("writing_admin_upsert_student_state", {
          p_admin_name: ADMIN_NAME,
          p_admin_password: context.adminPassword,
          p_student_name: context.studentName,
          p_key: key,
          p_value: value
        });
      }
      return callSupabaseRpc("writing_student_upsert_state", {
        p_token: context.token,
        p_key: key,
        p_value: value
      });
    }

    function writingStatePayload(key) {
      if (key === WRITING_BOOKMARKS_STATE_KEY) return { exerciseIds: [...writingBookmarks] };
      if (key === WRITING_PARAGRAPH_MASTERY_STATE_KEY) return { exercises: { ...writingParagraphMastery } };
      return {};
    }

    function saveWritingRuntimeLocally({ pendingBookmarks, pendingMastery } = {}) {
      const accountKey = writingStateAccountKey();
      if (!accountKey) return;
      const previous = getWritingLocalAccountState(accountKey);
      saveWritingLocalAccountState(accountKey, {
        bookmarks: [...writingBookmarks],
        paragraphMastery: { ...writingParagraphMastery },
        pendingBookmarks: pendingBookmarks ?? previous.pendingBookmarks,
        pendingMastery: pendingMastery ?? previous.pendingMastery
      });
    }

    function queueWritingStateSave(key) {
      const context = writingStateContext();
      const payload = writingStatePayload(key);
      const pendingName = key === WRITING_BOOKMARKS_STATE_KEY ? "pendingBookmarks" : "pendingMastery";
      if (!context || !supabaseClient) {
        updateSupabaseStatus("Supabase: local backup", "warning");
        return Promise.resolve(false);
      }

      writingStateSaveChain = writingStateSaveChain
        .catch(() => false)
        .then(async () => {
          const saved = await upsertWritingStudentState(context, key, payload);
          if (saved !== true) throw new Error(`Writing state save rejected for ${key}`);
          const localState = getWritingLocalAccountState(context.accountKey);
          const currentPayload = context.accountKey === writingStateAccountKey() ? writingStatePayload(key) : null;
          const stillCurrent = currentPayload && JSON.stringify(currentPayload) === JSON.stringify(payload);
          saveWritingLocalAccountState(context.accountKey, {
            ...localState,
            [pendingName]: stillCurrent ? false : localState[pendingName]
          });
          if (context.accountKey === writingStateAccountKey()) updateSupabaseStatus("Supabase: live", "live");
          return true;
        })
        .catch(error => {
          console.warn("Could not save writing student state:", error);
          if (context.accountKey === writingStateAccountKey()) updateSupabaseStatus("Supabase: saved on this device", "warning");
          return false;
        });
      return writingStateSaveChain;
    }

    function resetWritingPersonalState() {
      writingBookmarks = [];
      writingParagraphMastery = {};
      writingStudentStateLoaded = false;
      syncWritingBookmarkButtons();

    async function loadWritingStudentState() {
      resetWritingPersonalState();
      const accountKey = writingStateAccountKey();
      if (!accountKey) return;

      const localState = getWritingLocalAccountState(accountKey);
      writingBookmarks = normalizeWritingBookmarks(localState.bookmarks);
      writingParagraphMastery = normalizeWritingParagraphMastery(localState.paragraphMastery);
      const context = writingStateContext();
      if (!context || !supabaseClient) {
        writingStudentStateLoaded = true;
        syncWritingBookmarkButtons();
        return;
      }

      let retryBookmarks = localState.pendingBookmarks;
      let retryMastery = localState.pendingMastery;
      try {
        const rows = await fetchWritingStudentState(context);
        const remote = new Map((rows || []).map(row => [row.key, row.value]));
        if (!localState.pendingBookmarks && remote.has(WRITING_BOOKMARKS_STATE_KEY)) {
          writingBookmarks = normalizeWritingBookmarks(remote.get(WRITING_BOOKMARKS_STATE_KEY));
        } else if (!remote.has(WRITING_BOOKMARKS_STATE_KEY) && writingBookmarks.length) {
          retryBookmarks = true;
        }

        const remoteMastery = normalizeWritingParagraphMastery(remote.get(WRITING_PARAGRAPH_MASTERY_STATE_KEY));
        const mergedMastery = mergeWritingParagraphMastery(writingParagraphMastery, remoteMastery);
        retryMastery = retryMastery
          || !remote.has(WRITING_PARAGRAPH_MASTERY_STATE_KEY) && Object.keys(mergedMastery).length > 0
          || JSON.stringify(mergedMastery) !== JSON.stringify(remoteMastery);
        writingParagraphMastery = mergedMastery;
      } catch (error) {
        console.warn("Could not load writing student state:", error);
        updateSupabaseStatus("Supabase: using device backup", "warning");
      }

      saveWritingLocalAccountState(accountKey, {
        bookmarks: writingBookmarks,
        paragraphMastery: writingParagraphMastery,
        pendingBookmarks: retryBookmarks,
        pendingMastery: retryMastery
      });
      writingStudentStateLoaded = true;
      syncWritingBookmarkButtons();
      if (retryBookmarks) queueWritingStateSave(WRITING_BOOKMARKS_STATE_KEY);
      if (retryMastery) queueWritingStateSave(WRITING_PARAGRAPH_MASTERY_STATE_KEY);
    }

    }

    function markWritingParagraphsMastered(exerciseId, paragraphIndexes) {
      const id = String(exerciseId || "");
      const exercise = exerciseById(id);
      if (!exercise) return;
      const existing = writingParagraphMastery[id] || [];
      const valid = paragraphIndexes
        .map(Number)
        .filter(index => Number.isInteger(index) && index >= 0 && index < exercise.paragraphs.length);
      const next = [...new Set([...existing, ...valid])].sort((a, b) => a - b);
      if (next.length === existing.length && next.every((value, index) => value === existing[index])) return;
      writingParagraphMastery = { ...writingParagraphMastery, [id]: next };
      saveWritingRuntimeLocally({ pendingMastery: true });
      queueWritingStateSave(WRITING_PARAGRAPH_MASTERY_STATE_KEY);
    }

    function isBlankPart(part) {
      return Boolean(part && typeof part === "object" && part.answer);
    }

    function practiceDifficultySetsForExercise(exercise = currentExercise()) {
      if (!Array.isArray(exercise?.practiceDifficultySets)) return [];
      return exercise.practiceDifficultySets.filter(set => set && typeof set === "object" && String(set.key || "").trim());
    }

    function hasPracticeDifficultySets(exercise = currentExercise()) {
      return practiceDifficultySetsForExercise(exercise).length > 0;
    }

    function practiceDifficultyForExercise(exercise, difficultyKey = "") {
      const sets = practiceDifficultySetsForExercise(exercise);
      return sets.find(set => set.key === difficultyKey) || sets[0] || null;
    }

    function practiceParagraphsForExercise(exercise, difficultyKey = "") {
      const difficulty = practiceDifficultyForExercise(exercise, difficultyKey);
      return difficulty?.preparedParagraphs || exercise.paragraphs;
    }

    function practiceDifficultyLabel(exercise, difficultyKey = "") {
      const difficulty = practiceDifficultyForExercise(exercise, difficultyKey);
      return difficulty?.titleZh || difficulty?.title || "";
    }

    function practiceStyleLabel(exercise, state = practiceState) {
      const cueLabel = practiceModesForExercise(exercise)
        .find(mode => mode.key === state?.mode)?.title || modeLabel(state?.mode || "");
      const difficultyLabel = hasPracticeDifficultySets(exercise)
        ? practiceDifficultyLabel(exercise, state?.difficultyKey || "")
        : "";
      return [difficultyLabel, cueLabel].filter(Boolean).join(" · ") || "練習";
    }

    function splitSentenceByDifficultyAnswers(sentenceText, answers, answerState) {
      const parts = [];
      let textCursor = 0;
      while (answerState.index < answers.length) {
        const answer = String(answers[answerState.index] || "");
        if (!answer) throw new Error(`Empty difficulty answer at index ${answerState.index}`);
        const matchIndex = sentenceText.indexOf(answer, textCursor);
        if (matchIndex < 0) break;
        if (matchIndex > textCursor) parts.push(sentenceText.slice(textCursor, matchIndex));
        parts.push({ answer });
        textCursor = matchIndex + answer.length;
        answerState.index += 1;
      }
      if (textCursor < sentenceText.length) parts.push(sentenceText.slice(textCursor));
      return parts.length ? parts : [sentenceText];
    }

    function buildSentenceScopedDifficultyParagraphs(exercise, answers) {
      const answerState = { index: 0 };
      const paragraphs = exercise.paragraphs.map(paragraph => ({
        label: paragraph.label,
        sentences: paragraph.sentences.map(sentence => {
          const text = plainSentence(sentence);
          return { parts: splitSentenceByDifficultyAnswers(text, answers, answerState) };
        })
      }));
      return { paragraphs, answerState };
    }

    function buildParagraphScopedDifficultyParagraphs(exercise, answers) {
      const answerState = { index: 0 };
      const paragraphs = exercise.paragraphs.map(paragraph => {
        const text = plainParagraph(paragraph);
        return {
          label: paragraph.label,
          sentences: [{ parts: splitSentenceByDifficultyAnswers(text, answers, answerState) }]
        };
      });
      return { paragraphs, answerState };
    }

    function buildPracticeDifficultyParagraphs(exercise, difficulty) {
      const answers = Array.isArray(difficulty?.answers) ? difficulty.answers : [];
      let prepared = buildSentenceScopedDifficultyParagraphs(exercise, answers);

      // Some source worksheets intentionally make a single blank span two or
      // more complete sentences. Keep that grouping intact. Existing essays
      // remain sentence-scoped; only an affected difficulty falls back to one
      // prepared sentence container per source paragraph.
      if (prepared.answerState.index !== answers.length) {
        prepared = buildParagraphScopedDifficultyParagraphs(exercise, answers);
      }

      const { paragraphs, answerState } = prepared;
      if (answerState.index !== answers.length) {
        const missing = answers.slice(answerState.index, answerState.index + 3).join(" | ");
        throw new Error(`${exercise.id} ${difficulty.key}: ${answers.length - answerState.index} unmatched difficulty answer(s): ${missing}`);
      }
      const canonical = exercise.paragraphs.map(plainParagraph);
      const reconstructed = paragraphs.map(plainParagraph);
      if (JSON.stringify(canonical) !== JSON.stringify(reconstructed)) {
        throw new Error(`${exercise.id} ${difficulty.key}: difficulty text does not reconstruct the canonical essay`);
      }
      return paragraphs;
    }

    function annotatePracticeParagraphs(exercise, paragraphs, difficultyKey = "") {
      let blankNumber = 0;
      paragraphs.forEach((paragraph, paragraphIndex) => {
        paragraph.sentences.forEach((sentence, sentenceIndex) => {
          sentence.key = difficultyKey
            ? `${difficultyKey}-${paragraphIndex}-${sentenceIndex}`
            : `${paragraphIndex}-${sentenceIndex}`;
          sentence.paragraphIndex = paragraphIndex;
          sentence.sentenceIndex = sentenceIndex;
          sentence.parts.forEach(part => {
            if (!isBlankPart(part)) return;
            blankNumber += 1;
            part.id = difficultyKey
              ? `${exercise.id}-${difficultyKey}-q${blankNumber}`
              : `${exercise.id}-q${blankNumber}`;
            part.number = blankNumber;
            part.paragraphIndex = paragraphIndex;
            part.sentenceIndex = sentenceIndex;
            part.sentenceKey = sentence.key;
            part.paragraphLabel = paragraph.label;
            const synonymSource = Array.isArray(exercise.synonymGuide) ? exercise.synonymGuide : [];
            const synonymGuide = synonymSource.find(row => row.number === blankNumber);
            if (synonymGuide) {
              part.strongSynonyms = synonymGuide.strong || [];
              part.cautionSynonyms = synonymGuide.caution || [];
            }
          });
        });
      });
      return blankNumber;
    }

    function prepareWritingExercises() {
      Object.values(writingExercises).forEach(exercise => {
        const difficultySets = practiceDifficultySetsForExercise(exercise);
        if (difficultySets.length) {
          difficultySets.forEach(difficulty => {
            difficulty.preparedParagraphs = buildPracticeDifficultyParagraphs(exercise, difficulty);
            difficulty.questionCount = annotatePracticeParagraphs(exercise, difficulty.preparedParagraphs, difficulty.key);
          });
          exercise.questionCount = difficultySets[0].questionCount;
          exercise.maximumQuestionCount = Math.max(...difficultySets.map(difficulty => difficulty.questionCount));
          return;
        }
        exercise.questionCount = annotatePracticeParagraphs(exercise, exercise.paragraphs);
      });
    }

    function plainSentence(sentence) {
      return sentence.parts.map(part => isBlankPart(part) ? part.answer : part).join("");
    }

    function plainParagraph(paragraph) {
      return paragraph.sentences.map(plainSentence).join(" ");
    }

    function normalizePracticeTranslationText(value) {
      return String(value || "")
        .normalize("NFKC")
        .replace(/[“”]/g, '"')
        .replace(/[‘’]/g, "'")
        .replace(/[–—]/g, "-")
        .replace(/\s+/g, " ")
        .trim()
        .toLowerCase();
    }

    function practiceTranslationUnitEnglish(unit) {
      if (Array.isArray(unit)) return unit[1] || "";
      return unit?.english || unit?.en || unit?.source || "";
    }

    function practiceTranslationUnitChinese(unit) {
      if (Array.isArray(unit)) return unit[2] || "";
      return unit?.chinese || unit?.zh || unit?.translation || "";
    }

    function practiceTranslationSections(exercise) {
      return Array.isArray(exercise?.translationSections)
        ? exercise.translationSections.filter(section => Array.isArray(section?.items) && section.items.length)
        : [];
    }

    function practiceTranslationSectionForParagraph(exercise, paragraphIndex) {
      const sourceParagraph = exercise?.paragraphs?.[paragraphIndex];
      if (!sourceParagraph) return null;
      const sections = practiceTranslationSections(exercise);
      if (!sections.length) return null;

      const paragraphText = normalizePracticeTranslationText(plainParagraph(sourceParagraph));
      const exactTextMatch = sections.find(section => normalizePracticeTranslationText(
        section.items.map(practiceTranslationUnitEnglish).filter(Boolean).join(" ")
      ) === paragraphText);
      if (exactTextMatch) return exactTextMatch;

      const paragraphLabel = normalizePracticeTranslationText(sourceParagraph.label || "");
      const labelMatch = paragraphLabel
        ? sections.find(section => normalizePracticeTranslationText(section.title || "") === paragraphLabel)
        : null;
      if (labelMatch) return labelMatch;

      return sections.length === exercise.paragraphs.length ? sections[paragraphIndex] || null : null;
    }

    function cleanPracticeTranslationLines(lines) {
      return (Array.isArray(lines) ? lines : [lines])
        .map(line => String(line || "").trim())
        .filter(Boolean);
    }

    function practiceTranslationLinesForParagraph(exercise, paragraphIndex) {
      const section = practiceTranslationSectionForParagraph(exercise, paragraphIndex);
      const sectionLines = cleanPracticeTranslationLines(
        section?.items?.map(practiceTranslationUnitChinese) || []
      );
      if (sectionLines.length) return sectionLines;
      return cleanPracticeTranslationLines(exercise?.translation?.[paragraphIndex] || "");
    }

    function practiceTranslationLinesForSentence(exercise, paragraphIndex, sentence) {
      const section = practiceTranslationSectionForParagraph(exercise, paragraphIndex);
      const items = Array.isArray(section?.items) ? section.items : [];
      const sentenceText = normalizePracticeTranslationText(plainSentence(sentence));
      const exactMatch = items.find(unit => normalizePracticeTranslationText(practiceTranslationUnitEnglish(unit)) === sentenceText);
      if (exactMatch) return cleanPracticeTranslationLines(practiceTranslationUnitChinese(exactMatch));

      const sectionText = normalizePracticeTranslationText(
        items.map(practiceTranslationUnitEnglish).filter(Boolean).join(" ")
      );
      if (sectionText && sectionText === sentenceText) {
        return cleanPracticeTranslationLines(items.map(practiceTranslationUnitChinese));
      }

      return practiceTranslationLinesForParagraph(exercise, paragraphIndex);
    }

    function practiceTranslationLinesForEnglish(exercise, englishText) {
      const normalizedEnglish = normalizePracticeTranslationText(englishText);
      if (!normalizedEnglish) return [];
      const exactMatch = practiceTranslationSections(exercise)
        .flatMap(section => section.items)
        .find(unit => normalizePracticeTranslationText(practiceTranslationUnitEnglish(unit)) === normalizedEnglish);
      return exactMatch ? cleanPracticeTranslationLines(practiceTranslationUnitChinese(exactMatch)) : [];
    }

    function renderPracticeTranslation(lines) {
      if (!practiceState?.showTranslation) return "";
      const cleanLines = cleanPracticeTranslationLines(lines);
      if (!cleanLines.length) return "";
      return `
        <div class="practice-translation" data-practice-translation lang="zh-Hant">
          ${cleanLines.map(line => `<p>${escapeHtml(line)}</p>`).join("")}
        </div>
      `;
    }

    function renderPracticeTranslationToggle() {
      const visible = Boolean(practiceState?.showTranslation);
      const label = visible ? "隱藏中文翻譯" : "顯示中文翻譯";
      return `
        <button class="secondary-button practice-translation-toggle ${visible ? "is-active" : ""}" type="button" data-toggle-practice-translation aria-pressed="${visible}" aria-label="${label}">
          ${label}
        </button>
      `;
    }

    function hasWritingPathway(sectionKey) {
      return Boolean(writingPathways[sectionKey]);
    }

    function exerciseById(exerciseId) {
      return writingExercises[exerciseId] || null;
    }

    function exerciseBySection(sectionKey) {
      if (hasWritingPathway(sectionKey)) return currentExerciseId ? exerciseById(currentExerciseId) : null;
      return writingExercises[sectionKey] || null;
    }

    function currentExercise() {
      return exerciseBySection(currentExerciseSectionKey);
    }

    function resetDseWritingPathwayState() {
      currentDseWritingPart = "";
      currentDseWritingYear = "";
    }

    function resetGovernmentWritingPathwayState() {
      currentGovernmentDepartmentKey = "";
    }

    function practiceModesForExercise(exercise = currentExercise()) {
      const configured = Array.isArray(exercise?.practiceModes)
        ? new Set(exercise.practiceModes.map(mode => String(mode)))
        : null;
      const modes = configured
        ? practiceModeDefinitions.filter(mode => configured.has(mode.key))
        : practiceModeDefinitions;
      const availableModes = modes.length ? modes : practiceModeDefinitions;
      const details = exercise?.practiceModeDetails && typeof exercise.practiceModeDetails === "object"
        ? exercise.practiceModeDetails
        : {};
      return availableModes.map(mode => ({ ...mode, ...(details[mode.key] || {}) }));
    }

    function dseWritingQuestions(partKey, year) {
      if (partKey !== "part-b") return [];
      return dseWritingQuestionsByYear[String(year)] || [];
    }

    function dseWritingExerciseIdsForYear(partKey, year) {
      return dseWritingQuestions(partKey, year)
        .map(question => question.exerciseId)
        .filter(exerciseId => Boolean(exerciseId && exerciseById(exerciseId)));
    }

    function dseWritingExerciseIdsForPart(partKey) {
      return dseWritingYears.flatMap(year => dseWritingExerciseIdsForYear(partKey, year));
    }

    function currentDseWritingPartLabel() {
      return dseWritingParts.find(part => part.key === currentDseWritingPart)?.label || "DSE Writing";
    }

    function getPathwayTask(pathway, taskKey) {
      return pathway?.tasks?.find(task => task.key === taskKey) || null;
    }

    function getPathwayEssayType(pathway, essayTypeKey) {
      return pathway?.tasks
        ?.flatMap(task => task.essayTypes || [])
        .find(type => type.key === essayTypeKey) || null;
    }

    function exerciseIdsForPathwayItem(item) {
      if (!item) return [];
      if (Array.isArray(item.deckIds)) return item.deckIds;
      if (Array.isArray(item.essayTypes)) return item.essayTypes.flatMap(type => type.deckIds || []);
      return [];
    }

    function getGovernmentDepartment(pathway, departmentKey) {
      return pathway?.departments?.find(department => department.key === departmentKey) || null;
    }

    function writingExerciseAncestry(sectionKey, exerciseId) {
      const id = String(exerciseId || "");
      if (!id) return {};

      if (sectionKey === "dse-writing") {
        for (const [year, questions] of Object.entries(dseWritingQuestionsByYear)) {
          if ((questions || []).some(question => question.exerciseId === id)) {
            return { partKey: "part-b", year };
          }
        }
        return {};
      }

      const pathway = writingPathways[sectionKey];
      for (const task of pathway?.tasks || []) {
        if ((task.deckIds || []).includes(id)) return { taskKey: task.key };
        const essayType = (task.essayTypes || []).find(type => (type.deckIds || []).includes(id));
        if (essayType) return { taskKey: task.key, essayTypeKey: essayType.key };
      }

      const department = (pathway?.departments || []).find(item => (item.deckIds || []).includes(id));
      return department ? { departmentKey: department.key } : {};
    }

    function setWritingPathForExercise(sectionKey, exerciseId) {
      const ancestry = writingExerciseAncestry(sectionKey, exerciseId);
      currentPathwayLevel = hasWritingPathway(sectionKey) ? "" : "exercise";
      currentEssayTypeKey = "";
      resetDseWritingPathwayState();
      resetGovernmentWritingPathwayState();

      if (sectionKey === "dse-writing" && ancestry.partKey) {
        currentDseWritingPart = ancestry.partKey;
        currentDseWritingYear = ancestry.year || "";
        currentPathwayLevel = currentDseWritingYear ? "dse-questions" : "dse-years";
      } else if (sectionKey === "government-writing" && ancestry.departmentKey) {
        currentGovernmentDepartmentKey = ancestry.departmentKey;
        currentPathwayLevel = "government-department";
      } else if (ancestry.taskKey) {
        currentEssayTypeKey = ancestry.essayTypeKey || "";
        currentPathwayLevel = currentEssayTypeKey ? "category" : ancestry.taskKey;
      }
    }

    function writingBreadcrumbEntries() {
      if (currentView !== "exercise") return [];
      if (currentWritingUtilityView) {
        return [
          { label: "寫作首頁", route: { view: "dashboard" } },
          { label: currentWritingUtilityView === "bookmarks" ? "書簽" : "Edmund's Progression", route: null }
        ];
      }
      if (!currentExerciseSectionKey) return [];

      const section = writingSections.find(item => item.key === currentExerciseSectionKey);
      if (!section) return [];
      const pathway = writingPathways[currentExerciseSectionKey];
      const ancestry = currentExerciseId
        ? writingExerciseAncestry(currentExerciseSectionKey, currentExerciseId)
        : {};
      const entries = [
        { label: "寫作首頁", route: { view: "dashboard" } },
        {
          label: pathway?.title || `${section.label} ${section.subline}`,
          route: { view: "section", sectionKey: currentExerciseSectionKey }
        }
      ];

      if (currentExerciseSectionKey === "dse-writing") {
        const partKey = currentDseWritingPart || ancestry.partKey || "";
        const year = currentDseWritingYear || ancestry.year || "";
        const part = dseWritingParts.find(item => item.key === partKey);
        if (part) {
          entries.push({
            label: part.label,
            route: { view: "dse-part", sectionKey: currentExerciseSectionKey, partKey }
          });
        }
        if (year) {
          entries.push({
            label: year,
            route: { view: "dse-year", sectionKey: currentExerciseSectionKey, partKey, year }
          });
        }
      } else if (currentExerciseSectionKey === "government-writing") {
        const departmentKey = currentGovernmentDepartmentKey || ancestry.departmentKey || "";
        const department = getGovernmentDepartment(pathway, departmentKey);
        if (department) {
          entries.push({
            label: department.label,
            route: { view: "government-department", sectionKey: currentExerciseSectionKey, departmentKey }
          });
        }
      } else if (pathway?.tasks) {
        const taskKey = ancestry.taskKey
          || (["task-2", "category"].includes(currentPathwayLevel) || currentEssayTypeKey ? "task-2" : "");
        const task = getPathwayTask(pathway, taskKey);
        if (task) {
          entries.push({
            label: task.label,
            route: { view: "writing-task", sectionKey: currentExerciseSectionKey, taskKey }
          });
        }
        const essayTypeKey = currentEssayTypeKey || ancestry.essayTypeKey || "";
        const essayType = getPathwayEssayType(pathway, essayTypeKey);
        if (essayType) {
          entries.push({
            label: essayType.label,
            route: {
              view: "essay-type",
              sectionKey: currentExerciseSectionKey,
              taskKey: taskKey || "task-2",
              essayTypeKey
            }
          });
        }
      }

      const exercise = currentExercise();
      if (exercise) {
        entries.push({
          label: exercise.title || "文章",
          route: {
            view: "essay",
            sectionKey: currentExerciseSectionKey,
            exerciseId: currentExerciseId || ""
          }
        });
      }

      if (practiceState) {
        entries.push({
          label: practiceState.screen === "practice"
            ? `第 ${practiceState.round || 1} 輪練習`
            : "練習模式",
          route: null
        });
      }
      return entries;
    }

    function renderWritingBreadcrumbs() {
      const nav = document.querySelector("[data-writing-breadcrumbs]");
      if (!nav) return;
      const entries = writingBreadcrumbEntries();
      nav.classList.toggle("hidden", entries.length === 0);
      nav.innerHTML = entries.map((entry, index) => {
        const separator = index ? `<span class="crumb-separator" aria-hidden="true">/</span>` : "";
        const label = escapeHtml(entry.label || "寫作首頁");
        if (index === entries.length - 1 || !entry.route) {
          return `${separator}<span class="crumb-current" aria-current="page">${label}</span>`;
        }
        return `${separator}<button class="crumb-button" type="button" data-writing-breadcrumb-index="${index}">${label}</button>`;
      }).join("");
      nav._routes = entries.map(entry => entry.route);
      if (entries.length) requestAnimationFrame(() => { nav.scrollLeft = nav.scrollWidth; });
    }

    function navigateWritingBreadcrumb(index) {
      const nav = document.querySelector("[data-writing-breadcrumbs]");
      const route = nav?._routes?.[Number(index)];
      if (!route) return;

      stopEssayAudio();
      currentEssayTab = "essay";
      practiceState = null;

      if (route.view === "dashboard") {
        currentWritingUtilityView = "";
        currentExerciseSectionKey = "";
        currentPathwayLevel = "";
        currentEssayTypeKey = "";
        resetDseWritingPathwayState();
        resetGovernmentWritingPathwayState();
        currentExerciseId = "";
        showAppPanel("dashboard");
        window.scrollTo({ top: 0, behavior: "smooth" });
        return;
      }

      currentExerciseSectionKey = route.sectionKey || currentExerciseSectionKey;
      if (route.view === "section") {
        currentPathwayLevel = hasWritingPathway(currentExerciseSectionKey) ? "" : "exercise";
        currentEssayTypeKey = "";
        resetDseWritingPathwayState();
        resetGovernmentWritingPathwayState();
        currentExerciseId = "";
      } else if (route.view === "dse-part") {
        currentDseWritingPart = route.partKey || "";
        currentDseWritingYear = "";
        currentGovernmentDepartmentKey = "";
        currentEssayTypeKey = "";
        currentPathwayLevel = "dse-years";
        currentExerciseId = "";
      } else if (route.view === "dse-year") {
        currentDseWritingPart = route.partKey || "";
        currentDseWritingYear = route.year || "";
        currentGovernmentDepartmentKey = "";
        currentEssayTypeKey = "";
        currentPathwayLevel = "dse-questions";
        currentExerciseId = "";
      } else if (route.view === "government-department") {
        resetDseWritingPathwayState();
        currentEssayTypeKey = "";
        currentGovernmentDepartmentKey = route.departmentKey || "";
        currentPathwayLevel = "government-department";
        currentExerciseId = "";
      } else if (route.view === "writing-task") {
        resetDseWritingPathwayState();
        resetGovernmentWritingPathwayState();
        currentEssayTypeKey = "";
        currentPathwayLevel = route.taskKey === "task-2" ? "task-2" : "";
        currentExerciseId = "";
      } else if (route.view === "essay-type") {
        resetDseWritingPathwayState();
        resetGovernmentWritingPathwayState();
        currentEssayTypeKey = route.essayTypeKey || "";
        currentPathwayLevel = "category";
        currentExerciseId = "";
      } else if (route.view === "essay") {
        setWritingPathForExercise(currentExerciseSectionKey, route.exerciseId || "");
        currentExerciseId = route.exerciseId || "";
      }

      renderExerciseView();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function pathwayStats(exerciseIds = []) {
      const exercises = exerciseIds.map(exerciseById).filter(Boolean);
      const results = exercises.flatMap(exercise => getSavedPracticeResults(exercise.id));
      const latest = results.reduce((max, result) => Math.max(max, result.createdAt || 0), 0);
      const latestMistakes = exercises.reduce((total, exercise) => {
        const latestResult = getSavedPracticeResults(exercise.id)[0];
        return total + Number(latestResult?.mistakes || 0);
      }, 0);
      return {
        cards: exercises.reduce((total, exercise) => total + Number(exercise.questionCount || 0), 0),
        attempts: results.length,
        latest,
        red: latestMistakes
      };
    }

    function pathwayStatsHtml(stats) {
      return `
        <span>卡片：${escapeHtml(stats.cards)}</span>
        <span>嘗試：${escapeHtml(stats.attempts)}</span>
        <span>最近：${stats.latest ? escapeHtml(exactDateTime(stats.latest)) : "未曾"}</span>
        <span>練勻：0</span>
        <span>紅叉：${escapeHtml(stats.red)}</span>
      `;
    }

    function pathwayRowHtml({ label, subline = "", exerciseIds = [], action = "", locked = false, bookmarkExerciseId = "" }) {
      const stats = pathwayStats(exerciseIds);
      const disabled = locked || !exerciseIds.length && action.includes("deck");
      return `
        <div class="pathway-row-wrap">
          <button class="pathway-row ${disabled ? "locked" : ""}" type="button" ${action} ${disabled ? "aria-disabled=\"true\"" : ""}>
            <span class="pathway-row-title">${escapeHtml(label)}</span>
            ${subline ? `<span class="pathway-row-subtitle">${escapeHtml(subline)}</span>` : ""}
            <span class="pathway-stats">${pathwayStatsHtml(stats)}</span>
          </button>
          <div class="pathway-side-actions">
            ${bookmarkExerciseId ? `
              <button class="writing-bookmark-button ${isWritingBookmarked(bookmarkExerciseId) ? "active" : ""}" type="button" data-writing-bookmark="${escapeHtml(bookmarkExerciseId)}" aria-pressed="${isWritingBookmarked(bookmarkExerciseId)}" aria-label="${isWritingBookmarked(bookmarkExerciseId) ? "移除書簽" : "加入書簽"}">
                <span data-writing-bookmark-star aria-hidden="true">${isWritingBookmarked(bookmarkExerciseId) ? "★" : "☆"}</span>
              </button>
            ` : ""}
            <button class="pathway-reset" type="button" data-reset-writing-path="${escapeHtml(exerciseIds.join(","))}" ${exerciseIds.length ? "" : "disabled"}>重設紀錄</button>
          </div>
        </div>
      `;
    }

    function renderDseWritingPathwayView(pathway) {
      if (currentPathwayLevel === "dse-questions") {
        const questions = dseWritingQuestions(currentDseWritingPart, currentDseWritingYear);
        return `
          <div class="pathway-card">
            <div class="pathway-head">
              <div>
                <h2>DSE Writing ${escapeHtml(currentDseWritingPartLabel())} ${escapeHtml(currentDseWritingYear)}</h2>
                <p>選擇題目，再進入文章及填充練習。</p>
              </div>
              <button class="secondary-button" type="button" data-pathway-back>返回年份</button>
            </div>

    function allParagraphIndexes(exercise) {
      return exercise.paragraphs.map((_, index) => index);
    }

    function normalizeSelectedParagraphs(exercise, selectedParagraphs) {
      const valid = new Set(allParagraphIndexes(exercise));
      const selected = (selectedParagraphs || [])
        .map(Number)
        .filter(index => valid.has(index));
      return selected.length ? [...new Set(selected)] : allParagraphIndexes(exercise);
    }

    function getExerciseBlanks(exercise, options = {}) {
      const selectedParagraphs = options.selectedParagraphs
        ? new Set(normalizeSelectedParagraphs(exercise, options.selectedParagraphs))
        : null;
      const sentenceKeys = options.sentenceKeys ? new Set(options.sentenceKeys) : null;
      const paragraphs = practiceParagraphsForExercise(exercise, options.difficultyKey || "");
      const blanks = [];

      paragraphs.forEach((paragraph, paragraphIndex) => {
        if (selectedParagraphs && !selectedParagraphs.has(paragraphIndex)) return;
        paragraph.sentences.forEach(sentence => {
          if (sentenceKeys && !sentenceKeys.has(sentence.key)) return;
          sentence.parts.forEach(part => {
            if (!isBlankPart(part)) return;
            blanks.push({
              ...part,
              paragraphLabel: paragraph.label,
              paragraphIndex,
              sentenceText: plainSentence(sentence)
            });
          });
        });
      });

      return blanks;
    }

    function getPracticeTargets(exercise) {
      if (!practiceState) return [];
      const targets = getExerciseBlanks(exercise, {
        selectedParagraphs: practiceState.selectedParagraphs,
        sentenceKeys: practiceState.sentenceKeys || null,
        difficultyKey: practiceState.difficultyKey || ""
      });
      if (!practiceState.targetBlankIds?.length) return targets;
      const targetIds = new Set(practiceState.targetBlankIds);
      return targets.filter(target => targetIds.has(target.id));
    }

    function getPracticeSentenceKeys(exercise) {
      if (!practiceState) return [];
      if (practiceState.sentenceKeys?.length) return practiceState.sentenceKeys;
      const selected = new Set(normalizeSelectedParagraphs(exercise, practiceState.selectedParagraphs));
      const paragraphs = practiceParagraphsForExercise(exercise, practiceState.difficultyKey || "");
      return paragraphs.flatMap((paragraph, paragraphIndex) => {
        if (!selected.has(paragraphIndex)) return [];
        return paragraph.sentences
          .filter(sentence => sentence.parts.some(isBlankPart))
          .map(sentence => sentence.key);
      });
    }

    function normalizeAnswer(value) {
      return String(value || "")
        .replaceAll("’", "'")
        .replaceAll("‘", "'")
        .replaceAll("“", '"')
        .replaceAll("”", '"')
        .replace(/[.,!?;:]+$/g, "")
        .replace(/\s+/g, " ")
        .trim()
        .toLowerCase();
    }

    function answerKey(value) {
      return normalizeAnswer(value).replace(/[-–—]/g, " ");
    }

    function withoutLeadingArticle(value) {
      return normalizeAnswer(value).replace(/^(a|an|the)\s+/i, "");
    }

    function isMissingArticle(userAnswer, correctAnswer) {
      const correct = normalizeAnswer(correctAnswer);
      const user = normalizeAnswer(userAnswer);
      const match = correct.match(/^(a|an|the)\s+(.+)$/);
      return Boolean(match && user === match[2]);
    }

    function isMissingPluralS(userAnswer, correctAnswer) {
      const correct = answerKey(correctAnswer);
      const user = answerKey(userAnswer);
      if (!user || !correct.endsWith("s")) return false;
      if (`${user}s` === correct) return true;

      const words = user.split(" ");
      if (!words.length) return false;
      words[words.length - 1] = `${words[words.length - 1]}s`;
      return words.join(" ") === correct;
    }

    function levenshteinDistance(a, b) {
      const left = String(a || "");
      const right = String(b || "");
      const matrix = Array.from({ length: left.length + 1 }, () => Array(right.length + 1).fill(0));

      for (let i = 0; i <= left.length; i += 1) matrix[i][0] = i;
      for (let j = 0; j <= right.length; j += 1) matrix[0][j] = j;

      for (let i = 1; i <= left.length; i += 1) {
        for (let j = 1; j <= right.length; j += 1) {
          const cost = left[i - 1] === right[j - 1] ? 0 : 1;
          matrix[i][j] = Math.min(
            matrix[i - 1][j] + 1,
            matrix[i][j - 1] + 1,
            matrix[i - 1][j - 1] + cost
          );
        }
      }

      return matrix[left.length][right.length];
    }

    function isLikelySpellingMistake(userAnswer, correctAnswer) {
      const user = answerKey(userAnswer);
      const correct = answerKey(correctAnswer);
      if (!user || !correct) return false;
      if (Math.abs(user.length - correct.length) > 3) return false;

      const userWords = user.split(" ");
      const correctWords = correct.split(" ");
      if (userWords.length === correctWords.length) {
        const closeWords = userWords.filter((word, index) => {
          const expected = correctWords[index];
          const distance = levenshteinDistance(word, expected);
          return distance <= (expected.length <= 5 ? 1 : 2);
        });
        if (closeWords.length === correctWords.length) return true;
      }

      const distance = levenshteinDistance(user, correct);
      return distance <= (correct.length <= 6 ? 1 : 2);
    }

    function isAcceptedSynonym(userAnswer, acceptedAnswers = []) {
      const user = answerKey(userAnswer);
      if (!user) return false;
      return acceptedAnswers.some(answer => answerKey(answer) === user);
    }

    function classifyAnswer(userAnswer, correctAnswer, acceptedAnswers = []) {
      const user = normalizeAnswer(userAnswer);
      const correct = normalizeAnswer(correctAnswer);
      if (!user) return { ok: false, type: "missing", label: "未填答案" };
      if (user === correct || answerKey(user) === answerKey(correct)) return { ok: true, type: "correct", label: "正確" };
      if (isAcceptedSynonym(userAnswer, acceptedAnswers)) return { ok: true, type: "synonym", label: "同義詞正確" };
      if (isMissingArticle(userAnswer, correctAnswer)) return { ok: false, type: "article", label: "遺漏冠詞" };
      if (isMissingPluralS(userAnswer, correctAnswer)) return { ok: false, type: "plural", label: "遺漏複數 s" };
      if (withoutLeadingArticle(userAnswer) === withoutLeadingArticle(correctAnswer) && normalizeAnswer(userAnswer) !== normalizeAnswer(correctAnswer)) {
        return { ok: false, type: "article", label: "遺漏冠詞" };
      }
      if (isLikelySpellingMistake(userAnswer, correctAnswer)) return { ok: false, type: "spelling", label: "拼寫錯誤" };
      return { ok: false, type: "wrong", label: "答案錯誤" };
    }

    function mistakeClass(type) {
      return {
        missing: "mistake-missing",
        wrong: "mistake-wrong",
        spelling: "mistake-spelling",
        article: "mistake-article",
        plural: "mistake-plural"

    }

    function chineseNumber(value) {

    function paragraphLabelParts(exercise, paragraphIndex) {
      const lastIndex = exercise.paragraphs.length - 1;
      if (paragraphIndex === 0) return { zh: "引言", en: "Introduction" };
      if (paragraphIndex === lastIndex) return { zh: "結論", en: "Conclusion" };
      const bodyNumber = paragraphIndex;
      return {

    }

    function modeLabel(mode) {

        blank: "標準模式",

        end: "顯示結尾字母",

      }[mode] || "Practice";
    }

    function maskWord(word, mode) {
      const letters = [...String(word || "")];
      if (!letters.length) return "";
      if (mode === "start") return `${letters[0]}${"_".repeat(Math.max(0, letters.length - 1))}`;
      if (mode === "end") return `${"_".repeat(Math.max(0, letters.length - 1))}${letters[letters.length - 1]}`;
      if (mode === "both") {
        if (letters.length === 1) return letters[0];
        return `${letters[0]}${"_".repeat(Math.max(0, letters.length - 2))}${letters[letters.length - 1]}`;
      }
      return "_____________";
    }

    function answerHint(answer, mode) {
      const clean = String(answer || "").trim();
      if (!clean) return "_____________";
      if (!["start", "end", "both"].includes(mode)) return "_____________";
      return clean.replace(/[\p{L}\p{N}]+/gu, word => maskWord(word, mode));
    }

    function blankInputWidth(answer) {
