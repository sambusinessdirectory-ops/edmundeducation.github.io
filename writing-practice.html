    function stripLearningPrefix(text) {
      return String(text || "").trim().replace(/^(Example|Excerpt|In the essay):\s*/i, "").replace(/^節錄：\s*/, "");
    }

    function learningAnchorKey(line) {
      let key = stripLearningPrefix(line)
        .replace(/^\d+\.\s+/, "")
        .replace(/^Collocation:\s*/i, "")
        .replace(/^Structure:\s*/i, "")
        .trim();
      if (/\s=\s/.test(key)) key = key.split(/\s=\s/)[0].trim();
      return key;
    }

    function learningSlug(value) {
      return String(value || "")
        .toLowerCase()
        .replace(/&/g, " and ")
        .replace(/[^a-z0-9\u3400-\u9fff]+/g, "-")
        .replace(/^-+|-+$/g, "");
    }

    function learningAnchorId(tabKey, key) {
      return `learn-${learningSlug(tabKey)}-${learningSlug(key)}`;
    }

    function collectLearningTargets(blocks = [], tabKey = "") {
      const targets = new Map();
      blocks.forEach((block, blockIndex) => {
        if (blockIndex === 0) return;
        String(block.text || "").split(/\n\s*\n/g).forEach(group => {
          const visibleLines = group.split("\n").map(line => line.trim()).filter(Boolean);
          if (!visibleLines.length) return;
          const key = learningAnchorKey(visibleLines[0]);
          if (!key) return;
          targets.set(learningSlug(key), learningAnchorId(tabKey, key));
        });
      });
      return targets;
    }

    function regexEscape(value) {
      return String(value || "").replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
    }

    function grammarHighlightSpecs(key) {
      const lower = key.toLowerCase();
      const specs = [];
      if (lower.includes("feel + adjective + by")) specs.push(/\bfeel\s+[\w-]+\s+by\b/gi);
      if (lower.includes("more by a than by b")) specs.push("more by", "than by");
      if (lower.includes("allow + object + to")) specs.push(/\ballow\s+[\w-]+\s+to\b/gi);
      if (lower.includes("less likely to")) specs.push("less likely to");
      if (lower.includes("have fewer chances to")) specs.push("have fewer chances to");
      if (lower.includes("make + object")) specs.push(/\bmake\s+.+?\s+feel\b/gi);
      if (lower.includes("where relative")) specs.push("where");
      if (lower.includes("be judged by")) specs.push(/\b(?:are|is|be)\s+judged(?:\s+\w+)?\s+by\b/gi);
      if (lower.includes("who relative")) specs.push(/\bwho\s+\w+\b/gi);
      if (lower.includes("the same + noun + as")) specs.push(/\bthe same\b/gi, /\bas\b/gi);
      if (lower.includes("may feel that")) specs.push("may feel that");
      if (lower.includes("much like")) specs.push("much like");
      if (lower.includes("whose + noun")) specs.push(/\bwhose\s+\w+\b/gi);
      if (lower.includes("remind + object + that")) specs.push(/\breminds?\s+.+?\s+that\b/gi);
      if (lower.includes("something + comparative")) specs.push(/\bsomething\s+\w+\s+than\b/gi);
      if (lower.includes("the most obvious one is that")) specs.push("The most obvious one is that");
      if (lower.includes("use + noun + to")) specs.push(/\buse\s+\w+\s+to\b/gi);
      if (lower.includes("if + passive")) specs.push(/^If\b.+?\bcontrolled\b/gi);
      if (lower.includes("such as")) specs.push("such as");
      if (lower.includes("rather than")) specs.push("rather than");
      if (lower.includes("although")) specs.push("Although");
      if (lower.includes("be meant to")) specs.push(/\b(?:are|is|be)\s+meant\s+to\b/gi);
      if (lower.includes("when + clause")) specs.push("when");
      if (lower.includes("for + noun phrase")) specs.push(/^For\b.+?,/gi);
      if (lower.includes("parallel verbs")) specs.push("restrict personal expression", "create financial pressure");
      if (lower.includes("while also")) specs.push("while also");
      if (lower.includes("one major advantage is that")) specs.push("One major advantage is that");
      return specs;
    }

    function unitHighlightSpecs(visibleLines) {
      const specs = [];
      const firstKey = learningAnchorKey(visibleLines[0] || "");
      const collocationLine = visibleLines.find(line => /^Collocation:\s*/i.test(line));
      if (collocationLine) specs.push(learningAnchorKey(collocationLine));
      const explicitExcerpt = visibleLines.find(line => /^(?:Excerpt|In the essay):\s*/i.test(line) || /^節錄：/.test(line));
      if (explicitExcerpt) specs.push(stripLearningPrefix(explicitExcerpt));
      if (isLiteraryDeviceHeading(visibleLines[0] || "")) {
        const literaryExcerpt = visibleLines.slice(1).find(line =>
          /[A-Za-z]{3,}/.test(line)
          && !/^(?:Device|Example|Excerpt|In the essay|用途|效果|原因|象徵內容|對照雙方|重複詞語|結構)：?/i.test(line)
        );
        if (literaryExcerpt) specs.push(stripLearningPrefix(literaryExcerpt));
      }
      if (visibleLines.some(line => /^Device:/i.test(line))) {
        visibleLines.forEach((line, index) => {
          if (!/^Excerpt:/i.test(line) && !/^節錄：/.test(line)) return;
          const inlineExcerpt = stripLearningPrefix(line);
          const nextLineExcerpt = visibleLines[index + 1] || "";
          const excerpt = inlineExcerpt || nextLineExcerpt;
          if (excerpt) specs.push(excerpt);
        });
      }

      if (firstKey) {
        specs.push(firstKey);
        specs.push(...grammarHighlightSpecs(firstKey));
        const trimmedPattern = firstKey
          .replace(/\s*\+\s*(V1|V3|noun phrase|noun|clause|object|adjective|list|base verb|person\/object|someone|subject|verb|modal verb|V-ing|comparative adjective)\b/gi, "")
          .replace(/\s{2,}/g, " ")
          .trim();
        if (trimmedPattern && trimmedPattern !== firstKey) specs.push(trimmedPattern);
      }

      return specs.filter(Boolean);
    }

    function highlightedTextHtml(text, specs = []) {
      const source = String(text || "");
      const ranges = [];
      const addRange = (start, end) => {
        if (start < 0 || end <= start) return;
        if (ranges.some(range => Math.max(start, range.start) < Math.min(end, range.end))) return;
        ranges.push({ start, end });
      };

      specs.forEach(spec => {
        if (typeof spec === "string") {
          const needle = spec.trim();
          if (!needle || needle.length < 2) return;
          const regex = new RegExp(regexEscape(needle), "gi");
          let match;
          while ((match = regex.exec(source))) addRange(match.index, match.index + match[0].length);
          return;
        }
        if (spec instanceof RegExp) {
          const flags = spec.flags.includes("g") ? spec.flags : `${spec.flags}g`;
          const regex = new RegExp(spec.source, flags);
          let match;
          while ((match = regex.exec(source))) addRange(match.index, match.index + match[0].length);
        }
      });

      if (!ranges.length) return escapeHtml(source);
      ranges.sort((a, b) => a.start - b.start);
      let cursor = 0;
      return ranges.map(range => {
        const before = escapeHtml(source.slice(cursor, range.start));
        const marked = `<mark class="learning-highlight">${escapeHtml(source.slice(range.start, range.end))}</mark>`;
        cursor = range.end;
        return before + marked;
      }).join("") + escapeHtml(source.slice(cursor));
    }

    function learningLineKind(line) {
      const text = line.trim();
      if (!text) return "empty";
      if (/^→\s*/.test(text)) return "logic-step";
      if (/^使用例子\s*=/.test(text)) return "logic-examples";
      if (/^\d+\.\s+/.test(text)) return "numbered";
      if (/^(推理路線|核心概念|使用例子|邏輯鏈[一二三四]：)/.test(text)) return "label";
      if (/^(Function 功能|Key sentence|Why it works|Main ideas?|Supporting details?|Examples Used|Reasoning Chain|Core Concepts)(?:\s*[:：])?/i.test(text)) return "label";
      if (/^(Cause [12]|Solution [12])[:：]/i.test(text)) return "label";
      if (/^(Background|Thesis Statement|Topic Sentence|Supporting Detail|Logic Chain|Conclusion|Reiterating Arguments|Final Summary|Adjectives|Adverbs|Grammar involved|School Rules|Equality|School Identity|Individuality|Cost|Argument|Collocation Overview|Detailed Collocation Analysis)\b/i.test(text)) return "label";
      if (/^Example:/i.test(text)) return "example";
      if (/^(?:Excerpt|In the essay):/i.test(text) || /^節錄：/.test(text)) return "excerpt";
      if (/^(Structure|Explanation|Meaning|Function|Analysis|Reason|Use|Effect|Student imitation|Student example|Common mistake|Pedagogical note|Other examples|Related patterns|Opposite structure|Note|Device):/i.test(text)) return "meta";
      if (/^(用途|效果|原因|象徵內容|對照雙方|重複詞語|結構)：/.test(text)) return "meta";
      if (/^（.*）$/.test(text) || (/[\u3400-\u9FFF]/.test(text) && !/[A-Za-z]{3,}/.test(text))) return "chinese";
      if (/\s=\s/.test(text)) return "term";
      return "english";
    }

    function linkedTermHtml(key, context = {}) {
      const target = context.targets?.get(learningSlug(key));
      const label = escapeHtml(key);
      if (!target) return `<span class="term-key">${label}</span>`;
      return `<a class="term-key term-link" href="#${escapeHtml(target)}">${label}</a>`;
    }

    function verbFormHtml(text) {
      return escapeHtml(text)
        .replace(/\b(base verb|past tense|past participle|-ing form)\b/g, '<span class="verb-form-label">$1</span>')
        .replace(/\b(Do|Did|Done|Doing)\b/g, '<span class="verb-form-example">$1</span>');
    }

    function grammarHeadingHtml(text) {
      const match = text.match(/^(\d+\.\s+)(.+?)(?:\s+([\u3400-\u9fff].*))?$/);
      if (!match) return escapeHtml(text);
      const [, numberPrefix, englishPattern, chineseMeaning = ""] = match;
      return `${escapeHtml(numberPrefix)}<span class="grammar-pattern">${escapeHtml(englishPattern.trim())}</span>${chineseMeaning ? `<span class="grammar-meaning">${escapeHtml(chineseMeaning.trim())}</span>` : ""}`;
    }

    function renderLearningLine(line, context = {}) {
      const kind = learningLineKind(line);
      const text = stripLearningPrefix(line);
      if (!text) return "";

      if (context.tabKey === "grammar" && kind === "term" && /^[Vv][\w-]*$/.test(text.split(/\s=\s/)[0].trim())) {
        const [key, ...meaningParts] = text.split(/\s=\s/);
        return `
          <div class="learning-line term">
            <span class="term-key">${escapeHtml(key)}</span>
            <span class="term-meaning">= ${verbFormHtml(meaningParts.join(" = "))}</span>
          </div>
        `;
      }

      if (kind === "term") {
        const [key, ...meaningParts] = text.split(/\s=\s/);
        return `
          <div class="learning-line term">
            ${linkedTermHtml(key, context)}
            <span class="term-meaning">= ${escapeHtml(meaningParts.join(" = "))}</span>
          </div>
        `;
      }

      if (context.tabKey === "grammar" && kind === "numbered") {
        return `<div class="learning-line numbered">${grammarHeadingHtml(text)}</div>`;
      }

      if (kind === "logic-step") {
        const stepText = text.replace(/^→\s*/, "");
        const chineseStep = /[\u3400-\u9FFF]/.test(stepText) && !/[A-Za-z]{3,}/.test(stepText);
        return `
          <div class="learning-line logic-step${chineseStep ? " chinese-step" : ""}">
            <span class="logic-arrow">→</span>
            <span>${escapeHtml(stepText)}</span>
          </div>
        `;
      }

      if (kind === "logic-examples") {
        const examples = text.replace(/^使用例子\s*=\s*/, "");
        return `
          <div class="learning-line logic-examples">
            <span class="logic-examples-title">使用例子</span>
            <span class="logic-examples-text">${escapeHtml(examples)}</span>
          </div>
        `;
      }

      const shouldHighlight = kind === "example"
        || kind === "excerpt"
        || /^Student example:/i.test(text)
        || /^(?:Collocation|Verb phrase):/i.test(text)
        || (context.tabKey === "literaryDevices" && kind === "english");
      let html = shouldHighlight
        ? highlightedTextHtml(text, context.highlightSpecs || [])
        : escapeHtml(text);
      if (kind === "example" && !html.includes('class="learning-highlight"')) {
        html = `<mark class="learning-highlight">${escapeHtml(text)}</mark>`;
      }
      return `<div class="learning-line ${escapeHtml(kind)}">${html}</div>`;
    }

    function renderLearningUnit(lines, context = {}) {
      const visibleLines = lines.map(line => line.trim()).filter(Boolean);
      if (!visibleLines.length) return "";

      const firstKind = learningLineKind(visibleLines[0]);
      const allShort = visibleLines.every(line => line.length <= 34 && !/\s=\s/.test(line));
      if (visibleLines.length > 7 && allShort) {
        const hasChipLabel = firstKind === "label";
        const chipLines = hasChipLabel ? visibleLines.slice(1) : visibleLines;
        return `
          <div class="learning-unit">
            ${hasChipLabel ? `<div class="learning-line label">${escapeHtml(visibleLines[0])}</div>` : ""}
            <div class="learning-chip-grid">
              ${chipLines.map(line => {
                const target = context.targets?.get(learningSlug(line));
                const chip = `<span class="learning-chip">${escapeHtml(line)}</span>`;
                return target ? `<a class="learning-chip-link" href="#${escapeHtml(target)}">${chip}</a>` : chip;
              }).join("")}
            </div>
          </div>
        `;
      }

      const compact = visibleLines.length <= 3 && (firstKind === "term" || (firstKind === "numbered" && context.tabKey !== "grammar")) ? " compact" : "";
      const key = learningAnchorKey(visibleLines[0]);
      const shouldAnchor = context.blockIndex > 0 && key;
      const id = shouldAnchor ? ` id="${escapeHtml(learningAnchorId(context.tabKey || currentEssayTab, key))}"` : "";
      const lineContext = {
        ...context,
        highlightSpecs: unitHighlightSpecs(visibleLines)
      };
      return `<div class="learning-unit${compact}"${id}>${visibleLines.map(line => renderLearningLine(line, lineContext)).join("")}</div>`;
    }

    function isLiteraryDeviceHeading(line) {
      return /^(analogy|simile-like comparison|metaphor|conceptual metaphor|idiomatic metaphor|image-based metaphor|personification|symbolism|dead metaphor|metaphorical phrasing|situational imagery|visual imagery|auditory imagery|concrete examples|visual contrast|image-based explanation|contrastive phrasing|contrastive structure|contrastive ending|antithesis|contrast pair|rather than|juxtaposition|parallelism|parallel verbs|the rule of three|repetition|lexical repetition|rhetorical concession|cumulative sentence|hedging language|softeners|intensifier|intensifiers|tonal modifier|balanced tone|balanced argument|balanced concession|formal argumentative tone|evaluative language|persuasive maxim|cause-and-effect reasoning|practical consequence|concession)\b/i.test(line.trim());
    }

    function splitLearningGroups(text = "", context = {}) {
      if (context.tabKey !== "literaryDevices") {
        return String(text).split(/\n\s*\n/g).map(group => group.split("\n"));
      }
      if (context.atomicGroups) {
        return String(text)
          .split(/\n\s*\n/g)
          .map(group => group.split("\n"))
          .filter(group => group.some(line => line.trim()));
      }

      const groups = [];
      let current = [];
      String(text).split("\n").forEach(line => {
        const trimmed = line.trim();
        if (!trimmed) return;
        if (current.length && isLiteraryDeviceHeading(trimmed)) {
          groups.push(current);
          current = [];
        }
        current.push(line);
      });
      if (current.length) groups.push(current);
      return groups;
    }

    function renderLearningText(text = "", context = {}) {
      return splitLearningGroups(text, context)
        .map(group => renderLearningUnit(group, context))
        .join("");
    }

    function renderLearningBlocks(blocks = [], tabKey = currentEssayTab, options = {}) {
      const targets = collectLearningTargets(blocks, tabKey);
      return `
        <div class="learning-blocks">
          ${blocks.map((block, blockIndex) => `
            <section class="learning-block tone-${escapeHtml(block.tone || "blue")}">
              <h3>${escapeHtml(block.title)}${block.subtitle ? `<span>${escapeHtml(block.subtitle)}</span>` : ""}</h3>
              <div class="learning-block-content">${renderLearningText(block.text || "", { tabKey, blockIndex, targets, ...options })}</div>
            </section>
          `).join("")}
        </div>
      `;
    }

    function renderSynonymGuide(exercise) {
      const guide = Array.isArray(exercise?.synonymGuide) ? exercise.synonymGuide : [];
      if (!guide.length) {
        return `<p class="note-text">本篇文章暫時未設定同義詞接受表。</p>`;
      }
      return `
        <div class="synonym-guide">
          <div class="synonym-row header">
            <strong>題號</strong>
            <strong>原答案</strong>
            <strong>可接受同義詞</strong>
            <strong>謹慎接受</strong>
          </div>
          ${guide.map(row => `
            <div class="synonym-row">
              <strong>${escapeHtml(row.number)}</strong>
              <strong>${escapeHtml(row.original)}</strong>
              <span>${escapeHtml(row.strong.join(", "))}</span>
              <span>${escapeHtml(row.caution.join(", "))}</span>
            </div>
          `).join("")}
        </div>
      `;
    }

    function essayTextTokens(value) {
      return String(value || "").match(/[\p{L}\p{N}]+(?:[’'][\p{L}\p{N}]+)*(?:-[\p{L}\p{N}]+)*|[^\p{L}\p{N}]+/gu) || [];
    }

    function essayDisplayLineText(line) {
      if (line && typeof line === "object") return String(line.text || "").trim();
      return String(line || "").trim();
    }

    function essayDisplayBlocks(exercise) {
      const leadLines = Array.isArray(exercise?.essayLeadLines)
        ? exercise.essayLeadLines.map(essayDisplayLineText).filter(Boolean)
        : [];
      const closingLines = Array.isArray(exercise?.essayClosingLines)
        ? exercise.essayClosingLines.map(essayDisplayLineText).filter(Boolean)
        : [];
      return [
        ...leadLines.map((text, index) => ({
          text,
          className: index === 0 ? "essay-letter-title" : "essay-letter-salutation"
        })),
        ...exercise.paragraphs.map(paragraph => ({ text: plainParagraph(paragraph), className: "" })),
        ...closingLines.map((text, index) => ({
          text,
          className: `essay-letter-closing${index === closingLines.length - 1 ? " essay-letter-signature" : ""}`
        }))
      ];
    }

    function essayDisplayParagraphHtml(className, html) {
      return `<p${className ? ` class="${escapeHtml(className)}"` : ""}>${html}</p>`;
    }

    function renderTimedEssay(exercise) {
      const displayBlocks = essayDisplayBlocks(exercise);
      const entry = essayAudioEntry(exercise);
      const timingWords = Array.isArray(entry?.words) ? entry.words : [];
      const displayWords = displayBlocks
        .flatMap(block => essayTextTokens(block.text))
        .filter(token => ESSAY_WORD_PATTERN.test(token));
      const timingsMatch = timingWords.length === displayWords.length
        && timingWords.every((row, index) => Array.isArray(row) && row[0] === displayWords[index]);

      if (!timingsMatch) {
        return displayBlocks
          .map(block => essayDisplayParagraphHtml(block.className, escapeHtml(block.text)))
          .join("");
      }

      let wordIndex = 0;
      return displayBlocks.map(block => {
        const html = essayTextTokens(block.text).map(token => {
          if (!ESSAY_WORD_PATTERN.test(token)) return escapeHtml(token);
          const index = wordIndex;
          wordIndex += 1;
          return `<span class="essay-word" data-essay-word-index="${index}" title="由此字開始播放">${escapeHtml(token)}</span>`;
        }).join("");
        return essayDisplayParagraphHtml(block.className, html);
      }).join("");
    }

    function renderTranslationSections(sections = []) {
      const allowedTones = new Set(["blue", "green", "cyan", "purple", "orange", "red", "gold"]);
      return `
        <div class="learning-blocks translation-sections">
          ${sections.map(section => {
            const tone = allowedTones.has(section?.tone) ? section.tone : "blue";
            const units = Array.isArray(section?.units)
              ? section.units
              : Array.isArray(section?.items)
                ? section.items
                : Array.isArray(section?.sentences)
                  ? section.sentences
                  : [];
            return `
              <section class="learning-block translation-section tone-${escapeHtml(tone)}">
                <h3>${escapeHtml(section?.title || "Translation")}${section?.subtitle ? `<span>${escapeHtml(section.subtitle)}</span>` : ""}</h3>
                <div class="learning-block-content translation-section-content">
                  ${units.map(unit => {
                    const label = Array.isArray(unit) ? unit[0] : unit?.label || unit?.role || unit?.heading || "";
                    const english = Array.isArray(unit) ? unit[1] : unit?.english || unit?.en || unit?.text || "";
                    const chinese = Array.isArray(unit) ? unit[2] : unit?.chinese || unit?.zh || unit?.translation || "";
                    return `
                      <article class="learning-unit translation-unit">
                        ${label ? `<div class="translation-role">${escapeHtml(label)}</div>` : ""}
                        ${english ? `<p class="translation-english" lang="en">${escapeHtml(english)}</p>` : ""}
                        ${chinese ? `<p class="translation-chinese" lang="zh-Hant">${escapeHtml(chinese)}</p>` : ""}
                      </article>
                    `;
                  }).join("")}
                </div>
              </section>
            `;
          }).join("")}
        </div>
      `;
    }

    function renderTabContent(exercise) {
      if (currentEssayTab === "essay") {
        return renderTimedEssay(exercise);
      }

      if (currentEssayTab === "synonyms") {
        return renderSynonymGuide(exercise);
      }

      if (currentEssayTab === "translation" && Array.isArray(exercise.translationSections) && exercise.translationSections.length) {
        return renderTranslationSections(exercise.translationSections);
      }

      const learningBlocks = exercise.learningContent?.[currentEssayTab];
      if (learningBlocks) {
        return renderLearningBlocks(learningBlocks, currentEssayTab, {
          atomicGroups: exercise.learningContentAtomicGroups === true
        });
      }

      if (currentEssayTab === "translation") {
        return (exercise.translation || []).map(paragraph => `<p class="translation-paragraph">${escapeHtml(paragraph)}</p>`).join("");
      }

      const items = exercise.studyTabs?.[currentEssayTab] || [];
      return renderStudyList(items);
    }

    function renderResultHistory(exercise) {
      const results = getSavedPracticeResults(exercise.id).slice(0, 8);
      return `
        <div class="result-history">
          <h3>已儲存成績</h3>
          <div class="history-list">
            ${results.length ? results.map(result => `
              <div class="history-row">
                <strong>${escapeHtml(exactDateTime(result.createdAt))} | 第 ${escapeHtml(result.round)} 輪 | ${escapeHtml(result.styleLabel || [result.difficultyLabel, result.mode ? modeLabel(result.mode) : result.modeLabel].filter(Boolean).join(" · "))}</strong>
                <span>${escapeHtml(result.mistakes)} 個錯誤 / ${escapeHtml(result.total)} 題 | 錯誤率：${escapeHtml(result.mistakeRate)}% | ${result.completed ? "已完成" : "需要重溫"}</span>
              </div>
            `).join("") : `<p class="note-text">暫時未有已儲存成績。</p>`}
          </div>
        </div>
      `;
    }

    function currentEssayTabLabel() {
      const tab = essayTabOrder.find(item => item.key === currentEssayTab) || essayTabOrder[0];
      return `${tab.zh} / ${tab.en}`;
    }

    function essayAudioEntry(exercise = currentExercise()) {
      const manifest = window.EDMUND_WRITING_AUDIO || {};
      if (!exercise?.id || !Object.prototype.hasOwnProperty.call(manifest, exercise.id)) return null;
      const entry = manifest[exercise.id];
      return entry && typeof entry === "object" && entry.path ? entry : null;
    }

    function essayAudioRateLabel(rate) {
      return `${Number(rate)}X`;
    }

    function syncEssayAudioRateButtons() {
      document.querySelectorAll("[data-essay-audio-rate]").forEach(button => {
        const active = Number(button.getAttribute("data-essay-audio-rate")) === selectedEssayAudioRate;
        button.classList.toggle("active", active);
        button.setAttribute("aria-pressed", String(active));
      });
    }

    function setEssayAudioRate(value) {
      const rate = Number(value);
      if (!ESSAY_AUDIO_RATES.includes(rate)) return false;
      selectedEssayAudioRate = rate;
      try {
        localStorage.setItem(ESSAY_AUDIO_RATE_KEY, String(rate));
      } catch (error) {
        console.warn("Could not save the essay audio speed:", error);
      }
      if (activeEssayAudio) {
        activeEssayAudio.defaultPlaybackRate = rate;
        activeEssayAudio.playbackRate = rate;
      }
      syncEssayAudioRateButtons();
      return true;
    }

    function syncEssayHighlightToggle() {
      const button = document.querySelector("[data-toggle-essay-highlight]");
      if (!button) return;
      button.classList.toggle("active", essayHighlightEnabled);
      button.setAttribute("aria-pressed", String(essayHighlightEnabled));
      const state = button.querySelector("[data-essay-highlight-state]");
      if (state) state.textContent = essayHighlightEnabled ? "ON" : "OFF";
    }

    function setEssayHighlightEnabled(enabled) {
      essayHighlightEnabled = Boolean(enabled);
      try {
        localStorage.setItem(ESSAY_AUDIO_HIGHLIGHT_KEY, String(essayHighlightEnabled));
      } catch (error) {
        console.warn("Could not save the essay highlight setting:", error);
      }
      syncEssayHighlightToggle();
      if (!essayHighlightEnabled) {
        stopEssayHighlightLoop({ clear: true });
      } else if (activeEssayAudio && !activeEssayAudio.paused && !activeEssayAudio.ended) {
        startEssayHighlightLoop();
      } else {
        updateEssayHighlightNow();
      }
    }

    function stopEssayHighlightLoop({ clear = false } = {}) {
      if (activeEssayHighlightFrame) cancelAnimationFrame(activeEssayHighlightFrame);
      activeEssayHighlightFrame = 0;
      if (clear) {
        document.querySelector(".essay-word.is-spoken")?.classList.remove("is-spoken");
        activeEssayWordIndex = -1;
      }
    }

    function setEssayWordHighlight(index) {
      if (!essayHighlightEnabled) {
        stopEssayHighlightLoop({ clear: true });
        return;
      }
      if (index === activeEssayWordIndex) return;
      document.querySelector(".essay-word.is-spoken")?.classList.remove("is-spoken");
      activeEssayWordIndex = index;
      if (index < 0) return;
      const word = document.querySelector(`[data-essay-word-index="${index}"]`);
      if (!word) return;
      word.classList.add("is-spoken");
    }

    function essayWordIndexAtTime(words, currentTime) {
      let low = 0;
      let high = words.length - 1;
      let result = -1;
      while (low <= high) {
        const middle = Math.floor((low + high) / 2);
        if (Number(words[middle]?.[1]) <= currentTime) {
          result = middle;
          low = middle + 1;
        } else {
          high = middle - 1;
        }
      }
      if (result < 0) return -1;
      const wordEnd = Number(words[result]?.[2]);
      // Do not leave the previous word glowing through a real sentence pause.
      // A tiny grace period prevents flicker in natural gaps between words.
      return Number.isFinite(wordEnd) && currentTime > wordEnd + 0.08 ? -1 : result;
    }

    function updateEssayHighlightNow() {
      if (!essayHighlightEnabled || !activeEssayAudio) {
        stopEssayHighlightLoop({ clear: true });
        return;
      }
      const words = essayAudioEntry()?.words;
      if (Array.isArray(words) && words.length) {
        setEssayWordHighlight(essayWordIndexAtTime(words, activeEssayAudio.currentTime));
      }
    }

    function startEssayHighlightLoop() {
      stopEssayHighlightLoop();
      if (!essayHighlightEnabled) {
        stopEssayHighlightLoop({ clear: true });
        return;
      }
      const tick = () => {
        if (!activeEssayAudio || activeEssayAudio.paused || activeEssayAudio.ended) {
          activeEssayHighlightFrame = 0;
          return;
        }
        updateEssayHighlightNow();
        activeEssayHighlightFrame = requestAnimationFrame(tick);
      };
      tick();
    }

    function syncEssayAudioButton() {
      const button = document.querySelector("[data-play-essay-audio]");
      if (!button) return;
      const label = button.querySelector("[data-essay-audio-label]");
      const exercise = currentExercise();
      const isCurrent = Boolean(exercise?.id && activeEssayAudioExerciseId === exercise.id);
      const playing = Boolean(isCurrent && activeEssayAudio && !activeEssayAudio.paused && !activeEssayAudio.ended);
      const resumable = Boolean(isCurrent && activeEssayAudio && activeEssayAudio.paused && activeEssayAudio.currentTime > 0 && !activeEssayAudio.ended);
      const text = playing ? "暫停朗讀" : resumable ? "繼續朗讀" : "朗讀文章";
      if (label) label.textContent = text;
      button.classList.toggle("is-playing", playing);
      button.setAttribute("aria-pressed", String(playing));
      button.setAttribute("aria-label", text);
      button.setAttribute("title", `${text} · 播放後可按空白鍵暫停或繼續`);
      syncEssayAudioRateButtons();
      syncEssayHighlightToggle();
    }

    function stopEssayAudio() {
      stopEssayHighlightLoop({ clear: true });
      if (activeEssayAudio) {
        activeEssayAudio.onplay = null;
        activeEssayAudio.onpause = null;
        activeEssayAudio.onended = null;
        activeEssayAudio.onerror = null;
        activeEssayAudio.pause();
        activeEssayAudio.removeAttribute("src");
        activeEssayAudio.load();
      }
      activeEssayAudio = null;
      activeEssayAudioExerciseId = "";
      syncEssayAudioButton();
    }

    function startEssayAudioAt(exercise, entry, startTime = 0) {
      if (!exercise || !entry) return false;
      stopEssayAudio();
      const audio = new Audio();
      activeEssayAudio = audio;
      activeEssayAudioExerciseId = exercise.id;
      audio.preload = "metadata";
      const path = String(entry.path);
      audio.src = window.EDMUND_AUDIO_URL ? window.EDMUND_AUDIO_URL(path) : path;
      audio.currentTime = Math.max(0, Number(startTime) || 0);
      audio.defaultPlaybackRate = selectedEssayAudioRate;
      audio.playbackRate = selectedEssayAudioRate;
      audio.preservesPitch = true;
      audio.onplay = () => {
        syncEssayAudioButton();
        startEssayHighlightLoop();
      };
      audio.onpause = () => {
        stopEssayHighlightLoop();
        syncEssayAudioButton();
      };
      audio.onended = () => {
        stopEssayHighlightLoop({ clear: true });
        activeEssayAudio = null;
        activeEssayAudioExerciseId = "";
        syncEssayAudioButton();
      };
      audio.onerror = () => {
        console.warn("Essay audio could not be loaded:", audio.error);
        stopEssayAudio();
      };
      try {
        const playResult = audio.play();
        if (playResult && typeof playResult.catch === "function") {
          playResult.catch(error => {
            console.warn("Essay audio playback failed:", error);
            syncEssayAudioButton();
          });
        }
        return true;
      } catch (error) {
        console.warn("Essay audio playback failed:", error);
        stopEssayAudio();
        return false;
      }
    }

    function playEssayAudioFromWord(index) {
      const exercise = currentExercise();
      const entry = essayAudioEntry(exercise);
      const timing = entry?.words?.[Number(index)];
      if (!exercise || !entry || !Array.isArray(timing)) return false;
      const startTime = Math.max(0, Number(timing[1]) || 0);

      if (activeEssayAudio && activeEssayAudioExerciseId === exercise.id) {
        activeEssayAudio.currentTime = startTime;
        updateEssayHighlightNow();
        if (!activeEssayAudio.paused && !activeEssayAudio.ended) return true;
        try {
          const playResult = activeEssayAudio.play();
          if (playResult && typeof playResult.catch === "function") {
            playResult.catch(error => console.warn("Essay audio seek playback failed:", error));
          }
          return true;
        } catch (error) {
          console.warn("Essay audio seek playback failed:", error);
          return false;
        }
      }

      return startEssayAudioAt(exercise, entry, startTime);
    }

    function playOrToggleEssayAudio() {
      const exercise = currentExercise();
      const entry = essayAudioEntry(exercise);
      if (!exercise || !entry) return false;

      if (activeEssayAudio && activeEssayAudioExerciseId === exercise.id) {
        if (!activeEssayAudio.paused && !activeEssayAudio.ended) {
          activeEssayAudio.pause();
          return true;
        }
        if (!activeEssayAudio.ended && activeEssayAudio.currentTime > 0) {
          const resumeResult = activeEssayAudio.play();
          if (resumeResult && typeof resumeResult.catch === "function") {
            resumeResult.catch(error => console.warn("Essay audio resume failed:", error));
          }
          return true;
        }
      }

      return startEssayAudioAt(exercise, entry, 0);
    }

    function renderPracticeInput(part, targetIds) {
      if (!targetIds.has(part.id)) return escapeHtml(part.answer);

      const mistakeMap = resultByBlankId();

      const value = practiceState?.answers?.[part.id] || "";
      const disabled = practiceState?.submitted ? "disabled" : "";
      const classes = ["inline-answer"];
      if (mistake) classes.push(mistakeClass(mistake.type));
      const resultLabel = mistake
        ? `<span class="inline-result">${escapeHtml(mistake.label)} | ${escapeHtml(part.answer)}</span>`
        : "";

      return `<span class="blank-number">(${escapeHtml(part.number)})</span><input class="${classes.join(" ")}" style="width:${blankInputWidth(part.answer)}px" type="text" data-answer-id="${escapeHtml(part.id)}" value="${escapeHtml(value)}" placeholder="${escapeHtml(answerHint(part.answer, practiceState?.mode))}" autocomplete="off" ${disabled}>${resultLabel}`;
    }

    function renderPracticeSentence(sentence, targetIds, heading = "", translationLines = []) {
      const sentenceHtml = sentence.parts.map(part => {
        if (isBlankPart(part)) return renderPracticeInput(part, targetIds);
        return escapeHtml(part);
      }).join("");

      return `
        <div class="sentence-card">
          ${heading ? `<strong>${escapeHtml(heading)}</strong>` : ""}
          <p>${sentenceHtml}</p>
          ${renderPracticeTranslation(translationLines)}
        </div>

    function renderPracticeBody(exercise, targets) {
      const targetIds = new Set(targets.map(target => target.id));
      const selectedParagraphs = new Set(normalizeSelectedParagraphs(exercise, practiceState.selectedParagraphs));
      const paragraphs = practiceParagraphsForExercise(exercise, practiceState.difficultyKey || "");
      const sentenceMode = practiceState.round > 1 || practiceState.mode === "sentence";

      if (sentenceMode) {
        const sentenceKeys = new Set(getPracticeSentenceKeys(exercise));
        const cards = [];
        paragraphs.forEach((paragraph, paragraphIndex) => {
          paragraph.sentences.forEach(sentence => {
            if (!sentenceKeys.has(sentence.key)) return;
            cards.push(renderPracticeSentence(
              sentence,
              targetIds,
              `${paragraphPlainLabel(exercise, paragraphIndex)} | 第 ${sentence.sentenceIndex + 1} 句`,
              practiceTranslationLinesForSentence(exercise, paragraphIndex, sentence)
            ));
          });
        });
        return `<div class="sentence-grid">${cards.join("")}</div>`;
      }

      const leadLines = Array.isArray(exercise?.essayLeadLines)
        ? exercise.essayLeadLines.map(essayDisplayLineText).filter(Boolean)
        : [];
      const closingLines = Array.isArray(exercise?.essayClosingLines)
        ? exercise.essayClosingLines.map(essayDisplayLineText).filter(Boolean)
        : [];
      return `
        <div class="practice-text">
          ${leadLines.map((line, index) => `
            <div class="practice-paragraph practice-fixed-line">
              <p class="${index === 0 ? "essay-letter-title" : "essay-letter-salutation"}">${escapeHtml(line)}</p>
              ${renderPracticeTranslation(practiceTranslationLinesForEnglish(exercise, line))}
            </div>
          `).join("")}
          ${paragraphs.map((paragraph, paragraphIndex) => {
            if (!selectedParagraphs.has(paragraphIndex)) return "";
            const paragraphHtml = paragraph.sentences.map(sentence => sentence.parts.map(part => {
              if (isBlankPart(part)) return renderPracticeInput(part, targetIds);
              return escapeHtml(part);
            }).join("")).join(" ");
            return `
              <div class="practice-paragraph">
                <p>${paragraphHtml}</p>
                ${renderPracticeTranslation(practiceTranslationLinesForParagraph(exercise, paragraphIndex))}
              </div>
            `;
          }).join("")}
          ${closingLines.map((line, index) => `
            <div class="practice-paragraph practice-fixed-line">
              <p class="essay-letter-closing${index === closingLines.length - 1 ? " essay-letter-signature" : ""}">${escapeHtml(line)}</p>
              ${renderPracticeTranslation(practiceTranslationLinesForEnglish(exercise, line))}
            </div>
          `).join("")}
        </div>
      `;
    }

    function renderExerciseView() {

        stopEssayAudio();
        panel.innerHTML = currentWritingUtilityView === "bookmarks"
          ? renderWritingBookmarksView()
          : renderWritingProgressionView();

    function showExercise(sectionKey) {
      currentWritingUtilityView = "";
      currentExerciseSectionKey = sectionKey;
      currentPathwayLevel = hasWritingPathway(sectionKey) ? "" : "exercise";
      currentEssayTypeKey = "";
      resetDseWritingPathwayState();
      resetGovernmentWritingPathwayState();
      currentExerciseId = "";

      practiceState = null;
      showAppPanel("exercise");
    }

    function startPracticeSetup() {
      const exercise = currentExercise();
      if (!exercise) return;
      practiceState = defaultPracticeState(exercise);
      renderExerciseView();
    }

    function startPracticeMode(mode, difficultyKey = "") {
      const exercise = currentExercise();
      if (!exercise || !practiceState) return;
      if (!practiceModesForExercise(exercise).some(option => option.key === mode)) return;
      const difficulty = practiceDifficultyForExercise(exercise, difficultyKey || practiceState.difficultyKey || "");
      if (hasPracticeDifficultySets(exercise) && !difficulty) return;
      const savedAnswers = syncPracticeAnswersFromDom();
      const selectedParagraphs = normalizeSelectedParagraphs(exercise, practiceState.selectedParagraphs);
      const activeDifficultyKey = difficulty?.key || "";
      const targets = getExerciseBlanks(exercise, {
        selectedParagraphs,
        difficultyKey: activeDifficultyKey
      });
      if (!targets.length) return;
      practiceState = {
        ...practiceState,
        screen: "practice",
        mode,
        difficultyKey: activeDifficultyKey,
        round: 1,
        selectedParagraphs,
        sentenceKeys: null,
        targetBlankIds: null,
        answers: savedAnswers,
        submitted: false,
        lastResult: null
      };
      renderExerciseView();
    }

    function submitPracticeRound() {
      const exercise = currentExercise();
      if (!exercise || !practiceState) return;
      const targets = getPracticeTargets(exercise);
      const answers = syncPracticeAnswersFromDom();

      const mistakes = [];
      targets.forEach(target => {
        const userAnswer = answers[target.id] || "";
        const acceptedAnswers = [
          ...(target.strongSynonyms || []),
          ...(target.cautionSynonyms || [])
        ];
        const classification = classifyAnswer(userAnswer, target.answer, acceptedAnswers);
        if (!classification.ok) {
          mistakes.push({
            blankId: target.id,
            number: target.number,
            type: classification.type,
            label: classification.label,
            userAnswer,
            correctAnswer: target.answer,
            paragraphLabel: target.paragraphLabel,
            paragraphIndex: target.paragraphIndex,
            sentenceKey: target.sentenceKey,
            sentenceText: target.sentenceText
          });
        }
      });

      const selectedParagraphs = normalizeSelectedParagraphs(exercise, practiceState.selectedParagraphs);
      const hasFullParagraphCoverage = practiceState.round === 1
        && !practiceState.sentenceKeys?.length
        && !practiceState.targetBlankIds?.length;
      const paragraphIndexesInThisRound = hasFullParagraphCoverage
        ? selectedParagraphs
        : [...new Set(targets.map(target => target.paragraphIndex).filter(Number.isInteger))];
      const perfectParagraphIndexes = paragraphIndexesInThisRound.filter(paragraphIndex => {
        const paragraphTargets = targets.filter(target => target.paragraphIndex === paragraphIndex);
        return paragraphTargets.length > 0
          && !mistakes.some(mistake => mistake.paragraphIndex === paragraphIndex);
      });
      if (perfectParagraphIndexes.length) {
        markWritingParagraphsMastered(exercise.id, perfectParagraphIndexes);
      }

      const result = {
        schemaVersion: 2,
        id: `${exercise.id}-${Date.now()}-${practiceState.round}`,
        exerciseId: exercise.id,
        exerciseTitle: exercise.title,
        studentName: currentUser?.name || "Guest",
        round: practiceState.round,
        mode: practiceState.mode,
        modeLabel: modeLabel(practiceState.mode),
        difficultyKey: practiceState.difficultyKey || "",
        difficultyLabel: practiceDifficultyLabel(exercise, practiceState.difficultyKey || ""),
        styleLabel: practiceStyleLabel(exercise),
        selectedParagraphs,
        perfectParagraphIndexes,
        coverage: hasFullParagraphCoverage ? "full-paragraph" : "remedial-completion",
        total: targets.length,
        correct: Math.max(0, targets.length - mistakes.length),
        mistakes,
        mistakeRate: targets.length ? Math.round((mistakes.length / targets.length) * 100) : 0,
        completed: mistakes.length === 0,
        createdAt: Date.now()
      };

      savePracticeResult({
        ...result,
        mistakes: mistakes.length,
        mistakeDetails: mistakes
      });

      practiceState = {
        ...practiceState,
        answers,
        submitted: true,
        lastResult: result
      };
      renderExerciseView();
    }

    function startNextPracticeRound() {
      const exercise = currentExercise();
      const mistakes = practiceState?.lastResult?.mistakes || [];
      if (!exercise || !mistakes.length) return;
      const sentenceKeys = [...new Set(mistakes.map(mistake => mistake.sentenceKey))];
      const targetBlankIds = mistakes.map(mistake => mistake.blankId);
      practiceState = {
        ...practiceState,
        screen: "practice",
        round: practiceState.round + 1,
        mode: "sentence",
        sentenceKeys,
        targetBlankIds,
        answers: {},
        submitted: false,
        lastResult: null
      };
      renderExerciseView();
    }

    function updatePracticeParagraph(index, checked) {
      const exercise = currentExercise();
      if (!exercise || !practiceState) return;
      syncPracticeAnswersFromDom();
      const selected = new Set(normalizeSelectedParagraphs(exercise, practiceState.selectedParagraphs));
      if (checked) selected.add(index);
      else selected.delete(index);
      if (!selected.size) selected.add(index);
      practiceState.selectedParagraphs = [...selected].sort((a, b) => a - b);
      renderExerciseView();
    }

    function updateSupabaseStatus(message, tone = "") {
      const status = document.querySelector("[data-sync-status]");
      if (!status) return;
      status.textContent = message;
      status.className = `sync-pill ${tone}`.trim();
    }

    async function ensureSupabaseSession() {
      const sessionResult = await supabaseClient.auth.getSession();
      let session = sessionResult.data?.session || null;
      if (!session) {
        const signInResult = await supabaseClient.auth.signInAnonymously();
        if (signInResult.error) throw signInResult.error;
        session = signInResult.data?.session || null;
      }
      if (!session?.user?.id) throw new Error("No Supabase user session was created.");
    }

    async function callSupabaseRpc(name, args = {}) {
      if (!supabaseClient) throw new Error("Supabase client is not available.");
      await ensureSupabaseSession();
      const { data, error } = await supabaseClient.rpc(name, args);
      if (error) throw error;
      return data;
    }

    function studentFromSupabase(row) {
      return normalizeStudent({
        id: row.id,
        name: row.name,
        password: "已保護 - 請使用更改密碼重設",
        createdAt: row.created_at ? new Date(row.created_at).getTime() : Date.now(),
        access: row.access || defaultAccess()
      });
    }

    async function initSupabaseState() {
      if (!supabaseClient) {
        updateSupabaseStatus("Supabase: local backup", "warning");
        return;
      }

      updateSupabaseStatus("Supabase: connecting", "warning");
      try {
        await ensureSupabaseSession();
        updateSupabaseStatus("Supabase: live", "live");
        if (currentUser?.role === "admin" && adminPasswordForSession) {
          await loadStudentsFromSupabase();
        }
      } catch (error) {
        console.warn("Supabase anonymous session failed:", error);
        updateSupabaseStatus("Supabase: enable Auth", "error");
      }
    }

    async function loadStudentsFromSupabase() {
      if (!adminPasswordForSession) return [];
      try {
        const rows = await callSupabaseRpc("writing_admin_list_students", {
          p_admin_name: ADMIN_NAME,
          p_admin_password: adminPasswordForSession
        });
        studentsCache = (rows || []).map(studentFromSupabase);
        studentsLoadedFromSupabase = true;
        renderStudents();
        renderStudentProfile();
        return studentsCache;
      } catch (error) {
        console.warn("Could not load Supabase writing students:", error);
        updateSupabaseStatus("Supabase: writing SQL needed", "error");
        studentsLoadedFromSupabase = false;
        return getStudents();
      }
    }

    async function loadPasswordLogsFromSupabase(studentName) {
      if (!studentName || !adminPasswordForSession) return;
      try {
        const rows = await callSupabaseRpc("writing_admin_get_password_logs", {
          p_admin_name: ADMIN_NAME,
          p_admin_password: adminPasswordForSession,
          p_student_name: studentName
        });
        studentPasswordLogsCache[studentName] = (rows || []).map(row => ({
          studentName: row.student_name,
          changedBy: row.changed_by,
          changedAt: row.changed_at ? new Date(row.changed_at).getTime() : Date.now()
        }));
      } catch (error) {
        console.warn("Could not load writing password logs:", error);
      }
    }

      return readJson(STUDENTS_KEY, []).map(normalizeStudent).filter(student => student.name);

    function restoreSession() {
      const session = readJson(SESSION_KEY, null);
      if (!session?.name || !session?.role) return false;
      currentUser = session;

        adminPasswordForSession = localStorage.getItem(ADMIN_SESSION_PASSWORD_KEY) || "";

    function isAdmin() {
      return currentUser?.role === "admin";
    }

    function canAccess(sectionKey) {
      if (isAdmin()) return true;
      return currentUser?.access?.[sectionKey] !== false;
    }

    function normalizeWritingSearchText(value) {
      return String(value || "")
        .normalize("NFKC")
        .replace(/[’]/g, "'")
        .toLowerCase()
        .replace(/[^a-z0-9一-鿿]+/g, " ")
        .trim();
    }

    function writingSearchTokens(value) {
      return normalizeWritingSearchText(value).split(/\s+/).filter(Boolean);
    }

    function writingSearchMatches(haystack, tokens) {
      if (!tokens.length) return false;
      const normalized = normalizeWritingSearchText(haystack);
      return tokens.every(token => normalized.includes(token));
    }

    function sectionKeyForWritingExercise(exerciseId) {
      const id = String(exerciseId || "");
      if (!id) return "";
      const dseIds = Object.values(dseWritingQuestionsByYear)
        .flat()
        .map(question => question.exerciseId)
        .filter(Boolean);
      if (dseIds.includes(id)) return "dse-writing";
      for (const [sectionKey, pathway] of Object.entries(writingPathways)) {
        if ((pathway.departments || []).some(department => (department.deckIds || []).includes(id))) return sectionKey;
        if ((pathway.tasks || []).some(task => {
          if ((task.deckIds || []).includes(id)) return true;
          return (task.essayTypes || []).some(type => (type.deckIds || []).includes(id));
        })) return sectionKey;
      }
      return writingSections.some(section => section.key === id) ? id : "";
    }

    function searchableWritingExercises() {
      return Object.entries(writingExercises).map(([exerciseId, exercise]) => {
        const sectionKey = sectionKeyForWritingExercise(exerciseId);
        const prompt = Array.isArray(exercise?.questionPrompt)
          ? exercise.questionPrompt.join(" ")
          : String(exercise?.questionPrompt || "");
        return { exerciseId, exercise, sectionKey, haystack: `${exercise?.title || ""} ${prompt}` };
      }).filter(row => row.sectionKey && canAccess(row.sectionKey));
    }

    function renderWritingSearchResults(query = "") {
      const list = document.querySelector("[data-writing-search-results]");
      if (!list) return;
      const tokens = writingSearchTokens(query);
      if (!tokens.length) {
        list.innerHTML = "";
        return;
      }
      const sectionResults = writingSections
        .filter(section => canAccess(section.key))
        .filter(section => writingSearchMatches(`${section.label} ${section.subline} ${section.key}`, tokens))
        .slice(0, 8);
      const exerciseResults = searchableWritingExercises()
        .filter(row => writingSearchMatches(row.haystack, tokens))
        .slice(0, 14);
      if (!sectionResults.length && !exerciseResults.length) {
        list.innerHTML = '<p class="writing-search-empty">找不到已開放寫作練習內的相關範疇或文章。</p>';
        return;
      }
      list.innerHTML = `
        ${sectionResults.length ? `<div class="writing-search-section-label">寫作範疇</div>${sectionResults.map(section => `
          <button class="writing-search-result" type="button" data-writing-search-section="${escapeHtml(section.key)}">
            <span><strong>${escapeHtml(section.label)} ${escapeHtml(section.subline)}</strong><small>${escapeHtml(section.key)}</small></span><em>進入</em>
          </button>`).join("")}` : ""}
        ${exerciseResults.length ? `<div class="writing-search-section-label">文章</div>${exerciseResults.map(row => `
          <div class="writing-search-result-wrap">
            <button class="writing-search-result" type="button" data-writing-search-exercise="${escapeHtml(row.exerciseId)}" data-writing-search-section="${escapeHtml(row.sectionKey)}">

    async function login(username, password) {
      const trimmedName = username.trim();
      if (supabaseClient) {
        try {
          if (trimmedName === ADMIN_NAME) {
            const adminRows = await callSupabaseRpc("writing_admin_login", {
              p_name: trimmedName,
              p_password: password
            });
            if (Array.isArray(adminRows) && adminRows.length) {
              adminPasswordForSession = password;
              resetWritingPersonalState();
              setSession({ name: ADMIN_NAME, role: "admin", access: defaultAccess(), createdAt: Date.now() });
              await loadStudentsFromSupabase();
              showAppPanel("admin-panel");
              updateSupabaseStatus("Supabase: live", "live");
              return true;
            }
          }

          const studentRows = await callSupabaseRpc("writing_student_login", {
            p_name: trimmedName,
            p_password: password
          });
          if (Array.isArray(studentRows) && studentRows.length) {
            const student = studentRows[0];
            studentSessionToken = student.session_token;
            currentUser = {
              id: student.id,
              name: student.name,
              role: "student",
              access: { ...defaultAccess(), ...(student.access || {}) },
              createdAt: student.created_at ? new Date(student.created_at).getTime() : Date.now(),
              sessionToken: studentSessionToken
            };
            setSession(currentUser);
            await loadWritingStudentState();
            showAppPanel("dashboard");
            updateSupabaseStatus("Supabase: live", "live");
            return true;
          }
        } catch (error) {
          console.warn("Supabase writing login failed:", error);
          updateSupabaseStatus("Supabase: writing SQL needed", "error");
        }
      }

      const student = getStudents().find(item => item.name === trimmedName && item.password === password);
      if (student) {
        setSession({ name: student.name, role: "student", access: student.access, createdAt: student.createdAt });
        await loadWritingStudentState();
        showAppPanel("dashboard");
        return true;
      }

      return false;
    }

    function tileHtml(section) {
      const locked = !canAccess(section.key);
      const classes = ["tile"];
      if (locked) classes.push("locked");
      if (section.tone === "emerald") classes.push("emerald-tile");
      if (section.tone === "orange") classes.push("orange-tile");
      if (section.tone === "red") classes.push("red-tile");
      return `
        <button class="${classes.join(" ")}" type="button" data-writing-section="${escapeHtml(section.key)}" ${locked ? "aria-disabled=\"true\"" : ""}>
          <span class="tile-label">
            <span class="tile-line">${escapeHtml(section.label)}</span>
            <span class="tile-line tile-subline">${escapeHtml(section.subline)}</span>
          </span>
          ${locked ? "<small>尚未開放</small>" : ""}
        </button>
      `;
    }

      return `

          <span class="tile-label">
            <span class="tile-line">${escapeHtml(label)}</span>

    async function saveStudentAccessToSupabase(student) {
      if (!student || !adminPasswordForSession) return false;
      try {
        const rows = await callSupabaseRpc("writing_admin_set_student_access", {
          p_admin_name: ADMIN_NAME,
          p_admin_password: adminPasswordForSession,
          p_student_name: student.name,
          p_access: student.access
        });
        const updated = Array.isArray(rows) && rows[0] ? studentFromSupabase(rows[0]) : student;
        studentsCache = getStudents().map(item => item.name === updated.name ? updated : item);
        studentsLoadedFromSupabase = true;
        updateSupabaseStatus("Supabase: live", "live");
        return true;
      } catch (error) {
        console.warn("Could not save writing student access:", error);
        updateSupabaseStatus("Supabase: access save failed", "error");
        return false;
      }
    }

    async function setAllAccess(value) {
      const student = getSelectedStudent();
      if (!student) return;
      const students = getStudents();
      const target = students.find(item => item.name === student.name);
      if (!target) return;
      writingSections.forEach(section => {
        target.access[section.key] = value;
      });
      if (studentsLoadedFromSupabase) {
        const ok = await saveStudentAccessToSupabase(target);
        if (!ok) return;
      } else {
        saveStudents(students);
      }
      renderStudentProfile();
    }

      if (!student) return;
      const students = getStudents();
      const target = students.find(item => item.name === student.name);
      if (!target) return;
      target.access[sectionKey] = checked;

        const ok = await saveStudentAccessToSupabase(target);
        if (!ok) return;
      } else {
        saveStudents(students);
      }
      renderStudentProfile();
    }

    function setupCustomCursor() {

      window.addEventListener("mousemove", event => {
        cursor.style.left = `${event.clientX}px`;
        cursor.style.top = `${event.clientY}px`;
        cursor.style.opacity = "1";
      });

      window.addEventListener("mouseleave", () => {
        cursor.style.opacity = "0";
      });
    }

    function setupEvents() {
      document.querySelector("[data-login-form]")?.addEventListener("submit", async event => {
        event.preventDefault();
        const status = document.querySelector("[data-login-status]");
        const formData = new FormData(event.currentTarget);
        if (status) status.textContent = "正在檢查登入資料...";
        const ok = await login(String(formData.get("username") || ""), String(formData.get("password") || ""));
        if (!ok && status) status.textContent = "用戶名稱或密碼不正確。";
        if (ok && status) status.textContent = "";
      });

      document.querySelector("[data-student-form]")?.addEventListener("submit", async event => {
        event.preventDefault();
        const status = document.querySelector("[data-admin-status]");
        const formData = new FormData(event.currentTarget);
        const name = String(formData.get("studentName") || "").trim();
        const password = String(formData.get("studentPassword") || "").trim();
        if (!name || !password) return;

        if (status) status.textContent = "Saving to Supabase...";
        if (studentsLoadedFromSupabase) {
          try {
            await callSupabaseRpc("writing_admin_upsert_student", {
              p_admin_name: ADMIN_NAME,
              p_admin_password: adminPasswordForSession,
              p_student_name: name,
              p_student_password: password,
              p_access: defaultAccess()
            });
            await loadStudentsFromSupabase();
          } catch (error) {
            console.warn("Could not add writing student:", error);
            if (status) status.textContent = "Could not save this student to Supabase. Please run the writing SQL.";
            updateSupabaseStatus("Supabase: account save failed", "error");
            return;
          }
        } else {
          const students = getStudents().filter(student => student.name !== name);
          students.push({ name, password, createdAt: Date.now(), access: defaultAccess() });
          saveStudents(students);
        }
        selectedStudentName = name;
        event.currentTarget.reset();
        if (status) status.textContent = `Added ${name}.`;
        renderStudents();
        renderStudentProfile();
      });

      document.addEventListener("submit", async event => {
        const passwordForm = event.target.closest("[data-password-form]");
        if (!passwordForm) return;
        event.preventDefault();
        const studentName = passwordForm.getAttribute("data-password-form");
        const formData = new FormData(passwordForm);
        const newPassword = String(formData.get("newPassword") || "").trim();
        if (!newPassword) return;

        if (studentsLoadedFromSupabase) {
          try {
            const changed = await callSupabaseRpc("writing_admin_change_student_password", {
              p_admin_name: ADMIN_NAME,
              p_admin_password: adminPasswordForSession,
              p_student_name: studentName,
              p_new_password: newPassword
            });
            if (!changed) throw new Error("Supabase did not change the password.");
            await loadPasswordLogsFromSupabase(studentName);
            passwordForm.reset();
            renderStudentProfile();
            return;
          } catch (error) {
            console.warn("Could not change writing student password:", error);
            updateSupabaseStatus("Supabase: password save failed", "error");
            return;
          }
        }

        const students = getStudents();
        const target = students.find(student => student.name === studentName);
        if (!target) return;
        const oldPassword = target.password;
        target.password = newPassword;
        saveStudents(students);
        savePasswordLogs([
          ...getPasswordLogs(),
          { studentName, oldPassword, newPassword, changedAt: Date.now(), changedBy: ADMIN_NAME }
        ]);
        passwordForm.reset();
        renderStudentProfile();
      });

      document.addEventListener("submit", event => {
        const searchForm = event.target.closest("[data-writing-search-form]");
        if (searchForm) {
          event.preventDefault();
          document.querySelector("[data-writing-search-results] button")?.click();
          return;
        }
        const practiceForm = event.target.closest("[data-practice-form]");
        if (!practiceForm) return;
        event.preventDefault();
        submitPracticeRound();
      });

      document.addEventListener("click", async event => {
        const togglePassword = event.target.closest("[data-toggle-password]");
        if (togglePassword) {
          const input = document.querySelector(togglePassword.getAttribute("data-toggle-password"));
          if (input) input.type = input.type === "password" ? "text" : "password";
        }

        if (event.target.closest("[data-logout]")) {
          showLogin();
          return;
        }

        const bookmarkButton = event.target.closest("[data-writing-bookmark]");
        if (bookmarkButton) {
          toggleWritingBookmark(bookmarkButton.getAttribute("data-writing-bookmark") || "");
          return;
        }

        if (event.target.closest("[data-toggle-current-writing-bookmark]")) {
          toggleWritingBookmark(currentExerciseId);
          return;
        }

        const utilityButton = event.target.closest("[data-writing-utility]");
        if (utilityButton) {
          currentWritingUtilityView = utilityButton.getAttribute("data-writing-utility") || "";
          currentExerciseSectionKey = "";
          currentPathwayLevel = "";
          currentEssayTypeKey = "";
          resetDseWritingPathwayState();
          resetGovernmentWritingPathwayState();
          currentExerciseId = "";
          practiceState = null;
          showAppPanel("exercise");
          return;
        }

        const bookmarkedExerciseButton = event.target.closest("[data-open-writing-bookmark]");
        if (bookmarkedExerciseButton) {
          openWritingExerciseById(bookmarkedExerciseButton.getAttribute("data-open-writing-bookmark") || "");
          return;
        }

        const progressionExerciseButton = event.target.closest("[data-open-writing-progression]");
        if (progressionExerciseButton) {
          openWritingExerciseById(progressionExerciseButton.getAttribute("data-open-writing-progression") || "");
          return;
        }

        if (event.target.closest("[data-open-dashboard]")) {
          currentWritingUtilityView = "";
          currentExerciseSectionKey = "";
          currentPathwayLevel = "";
          currentEssayTypeKey = "";
          resetDseWritingPathwayState();
          resetGovernmentWritingPathwayState();
          currentExerciseId = "";
          practiceState = null;
          showAppPanel("dashboard");
        }

        const breadcrumbButton = event.target.closest("[data-writing-breadcrumb-index]");
        if (breadcrumbButton) {
          navigateWritingBreadcrumb(breadcrumbButton.getAttribute("data-writing-breadcrumb-index"));
          return;
        }

        const searchExerciseButton = event.target.closest("[data-writing-search-exercise]");
        if (searchExerciseButton) {
          openWritingExerciseFromSearch(
            searchExerciseButton.getAttribute("data-writing-search-section") || "",
            searchExerciseButton.getAttribute("data-writing-search-exercise") || ""
          );
          return;
        }

        const searchSectionButton = event.target.closest("[data-writing-search-section]");
        if (searchSectionButton) {
          const sectionKey = searchSectionButton.getAttribute("data-writing-search-section") || "";
          if (canAccess(sectionKey)) showExercise(sectionKey);
          return;
        }

        const writingSectionButton = event.target.closest("[data-writing-section]");
        if (writingSectionButton) {
          const sectionKey = writingSectionButton.getAttribute("data-writing-section");
          if (writingSectionButton.getAttribute("aria-disabled") === "true" || !canAccess(sectionKey)) return;
          showExercise(sectionKey);
          return;
        }

        if (event.target.closest("[data-back-dashboard]")) {
          currentWritingUtilityView = "";
          currentExerciseSectionKey = "";
          currentPathwayLevel = "";
          currentEssayTypeKey = "";
          resetDseWritingPathwayState();
          resetGovernmentWritingPathwayState();
          currentExerciseId = "";
          practiceState = null;
          showAppPanel("dashboard");
          return;
        }

        if (event.target.closest("[data-back-writing-pathway]")) {
          currentExerciseId = "";
          currentEssayTab = "essay";
          practiceState = null;
          if (currentExerciseSectionKey === "dse-writing") {
            currentPathwayLevel = currentDseWritingYear ? "dse-questions" : currentDseWritingPart ? "dse-years" : "";
          } else if (currentExerciseSectionKey === "government-writing") {
            currentPathwayLevel = currentGovernmentDepartmentKey ? "government-department" : "";
          } else {
            currentPathwayLevel = currentEssayTypeKey ? "category" : "task-2";
          }
          renderExerciseView();
          return;
        }

        const dseWritingPartButton = event.target.closest("[data-open-dse-writing-part]");
        if (dseWritingPartButton) {
          if (dseWritingPartButton.getAttribute("aria-disabled") === "true") return;
          currentDseWritingPart = dseWritingPartButton.getAttribute("data-open-dse-writing-part") || "";
          currentDseWritingYear = "";
          currentPathwayLevel = "dse-years";
          currentExerciseId = "";
          practiceState = null;
          renderExerciseView();
          return;
        }

        const dseWritingYearButton = event.target.closest("[data-open-dse-writing-year]");
        if (dseWritingYearButton) {
          if (dseWritingYearButton.getAttribute("aria-disabled") === "true") return;
          currentDseWritingYear = dseWritingYearButton.getAttribute("data-open-dse-writing-year") || "";
          currentPathwayLevel = "dse-questions";
          currentExerciseId = "";
          practiceState = null;
          renderExerciseView();
          return;
        }

        const pathwayTaskButton = event.target.closest("[data-open-pathway-task]");
        if (pathwayTaskButton) {
          if (pathwayTaskButton.getAttribute("aria-disabled") === "true") return;
          const taskKey = pathwayTaskButton.getAttribute("data-open-pathway-task") || "";
          currentPathwayLevel = taskKey === "task-2" ? "task-2" : "";
          currentEssayTypeKey = "";
          currentExerciseId = "";
          renderExerciseView();
          return;
        }

        const essayTypeButton = event.target.closest("[data-open-essay-type]");
        if (essayTypeButton) {
          if (essayTypeButton.getAttribute("aria-disabled") === "true") return;
          currentEssayTypeKey = essayTypeButton.getAttribute("data-open-essay-type") || "";
          currentPathwayLevel = "category";
          currentExerciseId = "";
          renderExerciseView();
          return;
        }

        const governmentDepartmentButton = event.target.closest("[data-open-government-department]");
        if (governmentDepartmentButton) {
          if (governmentDepartmentButton.getAttribute("aria-disabled") === "true") return;
          const departmentKey = governmentDepartmentButton.getAttribute("data-open-government-department") || "";
          const pathway = writingPathways[currentExerciseSectionKey];
          if (!getGovernmentDepartment(pathway, departmentKey)) return;
          currentGovernmentDepartmentKey = departmentKey;
          currentPathwayLevel = "government-department";
          currentExerciseId = "";
          practiceState = null;
          renderExerciseView();
          return;
        }

        const writingDeckButton = event.target.closest("[data-open-writing-deck]");
        if (writingDeckButton) {
          const deckId = writingDeckButton.getAttribute("data-open-writing-deck") || "";
          if (!exerciseById(deckId)) return;
          currentExerciseId = deckId;
          currentEssayTab = "essay";
          practiceState = null;
          renderExerciseView();
          return;
        }

        if (event.target.closest("[data-pathway-back]")) {
          if (currentExerciseSectionKey === "dse-writing") {
            if (currentPathwayLevel === "dse-questions") {
              currentPathwayLevel = "dse-years";
              currentDseWritingYear = "";
            } else if (currentPathwayLevel === "dse-years") {
              currentPathwayLevel = "";
              resetDseWritingPathwayState();
              resetGovernmentWritingPathwayState();
            } else {
              currentPathwayLevel = "";
            }
          } else if (currentExerciseSectionKey === "government-writing") {
            currentPathwayLevel = "";
            resetGovernmentWritingPathwayState();
          } else if (currentPathwayLevel === "category") {
            currentPathwayLevel = "task-2";
            currentEssayTypeKey = "";
          } else {
            currentPathwayLevel = "";
          }
          currentExerciseId = "";
          practiceState = null;
          renderExerciseView();
          return;
        }

        const resetWritingPathButton = event.target.closest("[data-reset-writing-path]");
        if (resetWritingPathButton) {
          const exerciseIds = String(resetWritingPathButton.getAttribute("data-reset-writing-path") || "")
            .split(",")
            .map(item => item.trim())
            .filter(Boolean);
          clearPracticeResultsForExerciseIds(exerciseIds);
          renderExerciseView();
          return;
        }

        if (event.target.closest("[data-back-essay]")) {
          practiceState = null;
          currentEssayTab = "essay";
          renderExerciseView();
          return;
        }

        if (event.target.closest("[data-open-practice]")) {
          startPracticeSetup();
          return;
        }

        const essayWord = event.target.closest("[data-essay-word-index]");
        if (essayWord) {
          playEssayAudioFromWord(essayWord.getAttribute("data-essay-word-index"));
          return;
        }

        if (event.target.closest("[data-toggle-essay-highlight]")) {
          setEssayHighlightEnabled(!essayHighlightEnabled);
          return;
        }

        const essayAudioRateButton = event.target.closest("[data-essay-audio-rate]");
        if (essayAudioRateButton) {
          setEssayAudioRate(essayAudioRateButton.getAttribute("data-essay-audio-rate"));
          return;
        }

        if (event.target.closest("[data-play-essay-audio]")) {
          playOrToggleEssayAudio();
          return;
        }

        if (event.target.closest("[data-export-study-pdf]")) {
          exportCurrentStudyPdf();
          return;
        }

        if (event.target.closest("[data-toggle-practice-translation]")) {
          if (practiceState) {
            syncPracticeAnswersFromDom();
            practiceState.showTranslation = !practiceState.showTranslation;
            renderExerciseView();
          }
          return;
        }

        if (event.target.closest("[data-select-full-essay]")) {
          const exercise = currentExercise();
          if (exercise && practiceState) {
            practiceState.selectedParagraphs = allParagraphIndexes(exercise);
            renderExerciseView();
          }
          return;
        }

        if (event.target.closest("[data-toggle-paragraph-selector]")) {
          if (practiceState) {
            practiceState.selectorOpen = !practiceState.selectorOpen;
            renderExerciseView();
          }
          return;
        }

        const essayTabButton = event.target.closest("[data-essay-tab]");
        if (essayTabButton) {
          currentEssayTab = essayTabButton.getAttribute("data-essay-tab") || "essay";
          renderExerciseView();
          return;
        }

        const modeButton = event.target.closest("[data-start-practice-mode]");
        if (modeButton) {
          startPracticeMode(
            modeButton.getAttribute("data-start-practice-mode") || "blank",
            modeButton.getAttribute("data-practice-difficulty") || ""
          );
          return;
        }

        if (event.target.closest("[data-back-practice-mode]")) {
          const exercise = currentExercise();
          if (exercise && practiceState) {
            const savedAnswers = syncPracticeAnswersFromDom();
            practiceState = {
              ...practiceState,
              screen: "mode",
              selectedParagraphs: normalizeSelectedParagraphs(exercise, practiceState.selectedParagraphs),
              selectorOpen: practiceState.selectorOpen,
              answers: savedAnswers,
              submitted: false,
              lastResult: null
            };
            renderExerciseView();
          }
          return;
        }

        if (event.target.closest("[data-next-practice-round]")) {
          startNextPracticeRound();
          return;
        }

        if (event.target.closest("[data-restart-practice]")) {
          startPracticeSetup();
          return;
        }

        if (event.target.closest("[data-admin-panel-shortcut]")) {
          showAppPanel("admin-panel");
        }

        if (event.target.closest("[data-return-admin]")) {
          returnToAdminAccount();
        }

        if (event.target.closest("[data-admin-switch]")) {
          await openAdminSwitchModal();
        }

        if (event.target.closest("[data-close-admin-switch]")) {
          closeAdminSwitchModal();
        }

        if (event.target === document.querySelector("[data-admin-switch-modal]")) {
          closeAdminSwitchModal();
        }

        const adminSwitchStudentButton = event.target.closest("[data-admin-switch-student]");
        if (adminSwitchStudentButton) {
          await switchAdminToStudent(adminSwitchStudentButton.getAttribute("data-admin-switch-student"));
        }

        const selectButton = event.target.closest("[data-select-student]");
        if (selectButton) {
          selectedStudentName = selectButton.getAttribute("data-select-student");
          if (studentsLoadedFromSupabase) await loadPasswordLogsFromSupabase(selectedStudentName);
          renderStudentProfile();
        }

        const removeButton = event.target.closest("[data-remove-student]");
        if (removeButton) {
          const name = removeButton.getAttribute("data-remove-student");
          if (!window.confirm(`確定要移除學生帳戶「${name}」嗎？`)) return;
          if (studentsLoadedFromSupabase) {
            try {
              const deleted = await callSupabaseRpc("writing_admin_delete_student", {
                p_admin_name: ADMIN_NAME,
                p_admin_password: adminPasswordForSession,
                p_student_name: name
              });
              if (!deleted) throw new Error("Supabase did not delete the student.");
              await loadStudentsFromSupabase();
            } catch (error) {
              console.warn("Could not remove writing student:", error);
              updateSupabaseStatus("Supabase: delete failed", "error");
              return;
            }
          } else {
            saveStudents(getStudents().filter(student => student.name !== name));
          }
          if (selectedStudentName === name) selectedStudentName = "";
          renderStudents();
          renderStudentProfile();
        }

        const setAllButton = event.target.closest("[data-set-all-access]");
        if (setAllButton) {
          await setAllAccess(setAllButton.getAttribute("data-set-all-access") === "true");
        }
      });

      document.addEventListener("change", async event => {
        const accessToggle = event.target.closest("[data-toggle-access]");
        if (accessToggle) {
          await saveAccessChange(accessToggle.getAttribute("data-toggle-access"), accessToggle.checked);
        }

        const paragraphToggle = event.target.closest("[data-practice-paragraph]");
        if (paragraphToggle) {
          updatePracticeParagraph(Number(paragraphToggle.getAttribute("data-practice-paragraph")), paragraphToggle.checked);
        }
      });

      document.addEventListener("input", event => {
        const searchInput = event.target.closest("[data-writing-search-input]");
        if (searchInput) {
          renderWritingSearchResults(searchInput.value);
          return;
        }
        const answerInput = event.target.closest("[data-answer-id]");
        if (!answerInput || !practiceState) return;
        practiceState.answers = {
          ...(practiceState.answers || {}),
          [answerInput.getAttribute("data-answer-id")]: answerInput.value
        };
      });

      document.addEventListener("keydown", event => {
        if (event.code !== "Space" || event.repeat || !activeEssayAudio) return;
        const target = event.target;
        if (target?.closest?.("input, textarea, select, button, a, [contenteditable='true']")) return;
        event.preventDefault();
        playOrToggleEssayAudio();
      });

      window.addEventListener("pagehide", stopEssayAudio);
      document.addEventListener("visibilitychange", () => {
        if (document.visibilityState === "hidden") stopEssayAudio();
      });
    }

    async function init() {
      prepareWritingExercises();
      setupCustomCursor();
      setupEvents();
      const restored = restoreSession();
      await initSupabaseState();
      if (restored && currentUser) {
        if (currentUser.role === "student") await loadWritingStudentState();
        showAppPanel(currentUser.role === "admin" ? "admin-panel" : "dashboard");
      } else {
        showLogin();
      }
    }

    init();
  </script>
</body>
</html>
