  <script>
    // Change your admin password here.
    const ADMIN_PASSWORD = "edmundmusic";

    const POSTS_KEY = "edmundMusicPosts";
    const AUTH_KEY = "edmundMusicLoggedIn";
    const POSTS_PER_LOAD = 12;

    let activeFilter = "All";
    let visiblePostCount = POSTS_PER_LOAD;

    const seedPosts = [];

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function plainExcerpt(value) {
      return String(value).replace(/\s+/g, " ").trim().slice(0, 150);
    }

    function getStoredPosts() {
      try {
        return JSON.parse(localStorage.getItem(POSTS_KEY) || "[]");
      } catch {
        return [];
      }
    }

    function saveStoredPosts(posts) {
      localStorage.setItem(POSTS_KEY, JSON.stringify(posts));
    }

    function postTimestamp(post) {
      if (Number.isFinite(Number(post.createdAt))) return Number(post.createdAt);

      const idTime = String(post.id || "").match(/(\d{10,})/);
      if (idTime) return Number(idTime[1]);

      const parsedDate = Date.parse(post.date || "");
      return Number.isFinite(parsedDate) ? parsedDate : 0;
    }

    function sortPosts(posts) {
      return [...posts].sort((a, b) => postTimestamp(b) - postTimestamp(a));
    }

    function getAllPosts() {
      return sortPosts([
        ...getStoredPosts().map(post => ({ ...post, isCustom: true })),
        ...seedPosts.map(post => ({ ...post, isCustom: false }))
      ]);
    }

    function minutesRead(body) {
      const words = String(body).trim().split(/\s+/).filter(Boolean).length;
      return `${Math.max(1, Math.ceil(words / 180))} mins read`;
    }

    function todayLabel() {
      return new Date().toLocaleDateString("en-GB", {
        day: "2-digit",
        month: "short",
        year: "numeric"
      });
    }

    function heroBackground(image) {
      const safeImage = String(image || "Singer Montage.jpeg").replaceAll('"', "%22");
      return `linear-gradient(180deg, rgba(0,0,0,0.08), rgba(0,0,0,0.78)), url("${safeImage}")`;
    }

    function renderFeatured(posts = getAllPosts()) {
      const hero = document.querySelector("[data-featured-hero]");
      if (!hero) return;

      const post = posts[0];
      if (!post) {
        hero.hidden = true;
        hero.removeAttribute("style");
        hero.innerHTML = "";
        return;
      }

      hero.hidden = false;
      hero.style.backgroundImage = heroBackground(post.image);
      hero.innerHTML = `
        <a class="hero-link" href="music-post.html?id=${encodeURIComponent(post.id)}" data-post-link data-post-id="${escapeHtml(post.id)}">
          <div class="hero-copy">
            <span class="tag-pill">${escapeHtml(post.tag || "英文流行曲歌詞賞析")}</span>
            <h1>${escapeHtml(post.title)}</h1>
            <p class="hero-subtitle">${escapeHtml(plainExcerpt(post.body))}${plainExcerpt(post.body).length >= 150 ? "..." : ""}</p>
            <div class="hero-meta">
              <strong>${escapeHtml(post.author || "Edmund Sir")}</strong>
              ${escapeHtml(post.date || "")} ・ ${escapeHtml(post.minutes || "")}
            </div>
          </div>
        </a>
        ${post.isCustom ? `<button class="delete-post" type="button" data-delete-post="${escapeHtml(post.id)}">Delete</button>` : ""}
      `;
    }

    function renderFilters(posts) {
      const row = document.querySelector("[data-filter-row]");
      if (!row) return;

      const tags = ["All", ...Array.from(new Set(posts.map(post => post.tag).filter(Boolean)))];
      if (tags.length <= 1) {
        row.hidden = true;
        row.innerHTML = "";
        activeFilter = "All";
        return;
      }

      if (!tags.includes(activeFilter)) activeFilter = "All";
      row.hidden = false;
      row.innerHTML = tags.map((tag, index) => `
        <button class="filter-button${tag === activeFilter ? " is-active" : ""}" type="button" data-filter="${escapeHtml(tag)}">${escapeHtml(tag)}</button>
      `).join("");

      row.querySelectorAll("[data-filter]").forEach(button => {
        button.addEventListener("click", () => {
          activeFilter = button.dataset.filter || "All";
          row.querySelectorAll("[data-filter]").forEach(item => item.classList.remove("is-active"));
          button.classList.add("is-active");
          renderPosts(activeFilter, true);
        });
      });
    }

    function postCard(post, index = 0) {
      return `
        <article class="post-card-wrap" style="--post-index: ${index % POSTS_PER_LOAD};">
          <a class="post-card" href="music-post.html?id=${encodeURIComponent(post.id)}" data-post-link data-post-id="${escapeHtml(post.id)}">
            <div class="post-card-image">
              <img src="${escapeHtml(post.image)}" alt="">
              <span class="tag-pill">${escapeHtml(post.tag)}</span>
            </div>
            <p class="post-meta">${escapeHtml(post.date)} ・ ${escapeHtml(post.minutes)}</p>
            <h3 class="post-title">${escapeHtml(post.title)}</h3>
            <p class="post-excerpt">${escapeHtml(plainExcerpt(post.body))}...</p>
            <div class="post-author">
              <span class="author-dot">E</span>
              <span>${escapeHtml(post.author || "Edmund Sir")}</span>
            </div>
          </a>
          ${post.isCustom ? `<button class="delete-post" type="button" data-delete-post="${escapeHtml(post.id)}">Delete</button>` : ""}
        </article>
      `;
    }

    function updateLoadMore(totalVisiblePosts) {
      const button = document.querySelector("[data-load-more]");
      if (!button) return;

      button.hidden = totalVisiblePosts <= visiblePostCount;
    }

    function renderPosts(filter = activeFilter, reset = false) {
      const grid = document.querySelector("[data-post-grid]");
      const search = document.querySelector("[data-search]");
      if (!grid) return;

      if (reset) visiblePostCount = POSTS_PER_LOAD;
      activeFilter = filter || "All";

      const query = (search?.value || "").trim().toLowerCase();
      const featuredPost = getAllPosts()[0];
      let posts = getAllPosts();

      if (featuredPost) {
        posts = posts.filter(post => post.id !== featuredPost.id);
      }

      if (activeFilter !== "All") {
        posts = posts.filter(post => post.tag === activeFilter);
      }

      if (query) {
        posts = posts.filter(post => `${post.title} ${post.tag} ${post.body}`.toLowerCase().includes(query));
      }

      const visiblePosts = posts.slice(0, visiblePostCount);
      updateLoadMore(posts.length);

      grid.innerHTML = posts.length
        ? visiblePosts.map(postCard).join("")
        : `<p class="empty-state">暫時未有符合條件的文章。</p>`;
    }

    function refreshBlog(reset = true) {
      const posts = getAllPosts();
      renderFeatured(posts);
      renderFilters(posts);
      renderPosts(activeFilter, reset);
    }

    function setLoggedIn(isLoggedIn) {
      sessionStorage.setItem(AUTH_KEY, isLoggedIn ? "yes" : "no");
      updateAuthUi();
    }

    function isLoggedIn() {
      return sessionStorage.getItem(AUTH_KEY) === "yes";
    }

    function updateAuthUi() {
      const adminPanel = document.querySelector("[data-admin-panel]");
      const loginButton = document.querySelector("[data-login-button]");
      const loggedIn = isLoggedIn();

      if (adminPanel) adminPanel.hidden = !loggedIn;
      if (loginButton) loginButton.textContent = loggedIn ? "Log Out" : "Log In";
      document.body.classList.toggle("is-admin", loggedIn);
    }

    function openLogin() {
      const modal = document.querySelector("[data-login-modal]");
      const input = document.querySelector("#admin-password");
      const error = document.querySelector("[data-login-error]");
      if (error) error.textContent = "";
      if (modal) modal.hidden = false;
      setTimeout(() => input?.focus(), 0);
    }

    function closeLogin() {
      const modal = document.querySelector("[data-login-modal]");
      if (modal) modal.hidden = true;
    }

    async function readImageFile(file) {
      const dataUrl = await new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });

      return await new Promise(resolve => {
        const image = new Image();
        image.onload = () => {
          const maxWidth = 1000;
          const scale = Math.min(1, maxWidth / image.width);
          const canvas = document.createElement("canvas");
          canvas.width = Math.round(image.width * scale);
          canvas.height = Math.round(image.height * scale);
          const context = canvas.getContext("2d");
          context.drawImage(image, 0, 0, canvas.width, canvas.height);
          resolve(canvas.toDataURL("image/jpeg", 0.76));
        };
        image.onerror = () => resolve(dataUrl);
        image.src = dataUrl;
      });
    }

    function setupLogin() {
      const loginButton = document.querySelector("[data-login-button]");
      const loginForm = document.querySelector("[data-login-form]");
      const closeButton = document.querySelector("[data-close-login]");

      loginButton?.addEventListener("click", () => {
        if (isLoggedIn()) {
          setLoggedIn(false);
          return;
        }
        openLogin();
      });

      closeButton?.addEventListener("click", closeLogin);

      loginForm?.addEventListener("submit", event => {
        event.preventDefault();
        const formData = new FormData(loginForm);
        const password = String(formData.get("password") || "");
        const error = document.querySelector("[data-login-error]");

        if (password === ADMIN_PASSWORD) {
          setLoggedIn(true);
          closeLogin();
          loginForm.reset();
          document.querySelector("#create")?.scrollIntoView({ behavior: "smooth", block: "start" });
        } else if (error) {
          error.textContent = "Password does not match.";
        }
      });
    }

    function setupBlogForm() {
      const form = document.querySelector("[data-blog-form]");
      const imageInput = document.querySelector("[data-image-input]");
      const preview = document.querySelector("[data-image-preview]");

      imageInput?.addEventListener("change", async () => {
        const file = imageInput.files?.[0];
        if (!file || !preview) return;
        const image = await readImageFile(file);
        preview.innerHTML = `<img src="${image}" alt="">`;
      });

      form?.addEventListener("reset", () => {
        setTimeout(() => {
          if (preview) preview.textContent = "Image preview";
        }, 0);
      });

      form?.addEventListener("submit", async event => {
        event.preventDefault();
        if (!isLoggedIn()) {
          openLogin();
          return;
        }

        const formData = new FormData(form);
        const file = formData.get("image");
        if (!(file instanceof File) || !file.size) return;

        const body = String(formData.get("body") || "").trim();
        const image = await readImageFile(file);
        const createdAt = Date.now();
        const post = {
          id: `music-${createdAt}`,
          title: String(formData.get("title") || "").trim(),
          tag: String(formData.get("tag") || "").trim(),
          image,
          body,
          createdAt,
          date: todayLabel(),
          minutes: minutesRead(body),
          author: "Edmund Sir"
        };

        const storedPosts = getStoredPosts();
        try {
          saveStoredPosts([post, ...storedPosts]);
        } catch {
          alert("This browser could not permanently save the post, likely because localStorage is full. The post will still open now, but it may not stay in the blog list after refresh.");
        }
        preparePostForNavigation(post);
        form.reset();
        if (preview) preview.textContent = "Image preview";
        activeFilter = "All";
        refreshBlog(true);
        window.location.href = `music-post.html?id=${encodeURIComponent(post.id)}`;
      });
    }

    function preparePostForNavigation(post) {
      const payload = JSON.stringify({
        type: "edmundMusicPost",
        post
      });

      window.name = payload;

      try {
        sessionStorage.setItem("edmundMusicActivePost", payload);
      } catch {}
    }

    function setupPostActions() {
      const loadMoreButton = document.querySelector("[data-load-more]");

      loadMoreButton?.addEventListener("click", () => {
        visiblePostCount += POSTS_PER_LOAD;
        renderPosts(activeFilter, false);
      });

      document.addEventListener("click", event => {
        const deleteButton = event.target.closest("[data-delete-post]");
        if (deleteButton) {
          event.preventDefault();
          event.stopPropagation();

          if (!isLoggedIn()) {
            openLogin();
            return;
          }

          const id = deleteButton.getAttribute("data-delete-post");
          if (!id || !confirm("Delete this post?")) return;

          const nextPosts = getStoredPosts().filter(post => post.id !== id);
          saveStoredPosts(nextPosts);
          refreshBlog(true);
          return;
        }

        const postLink = event.target.closest("[data-post-link]");
        if (!postLink) return;

        const id = postLink.getAttribute("data-post-id");
        const post = getAllPosts().find(item => item.id === id);
        if (post) preparePostForNavigation(post);
      });
    }

    function setupSearch() {
      const search = document.querySelector("[data-search]");
      search?.addEventListener("input", () => renderPosts(activeFilter, true));
    }

    function setupCustomCursor() {
      const cursor = document.querySelector(".custom-cursor");
      if (!cursor || !window.matchMedia("(pointer: fine)").matches) return;

      window.addEventListener("mousemove", event => {
        cursor.style.left = `${event.clientX}px`;
        cursor.style.top = `${event.clientY}px`;
        cursor.style.opacity = "1";
      });

      window.addEventListener("mouseleave", () => {
        cursor.style.opacity = "0";
      });
    }

    refreshBlog(true);
    updateAuthUi();
    setupLogin();
    setupBlogForm();
    setupPostActions();
    setupSearch();
    setupCustomCursor();
  </script>
  <script src="page-loader.js?v=20260501-f4f0e9-plain"></script>
